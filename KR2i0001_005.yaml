body:
  text: 夫差內傳第五十一年夫差北伐齊齊使大夫高氏謝吳師曰齊孤立寡國倉庫空虛民人離散齊以吳為彊輔今未往告急而吳見伐請伏國人於郊不敢陳戰爭之辭惟吳哀齊之不濫也吳師即還十二年夫差復北伐齊越王聞之率衆以朝於吳而以重寶厚獻太宰嚭嚭喜受越之賂愛信越殊甚日夜為言於吳王王信用嚭之計伍胥大懼曰是棄吾也乃往諫曰夫越在心腹之病不前除其疾今信浮辭僞詐而貪齊破齊譬由磐石之田無立其苗也願王釋齊而前越不然悔之無及吳王不聽使子胥使於齊通期戰之會子胥謂其子曰我數諫王王不我用今見吳之亡矣汝與吾俱亡亡無為也乃屬其子於齊鮑氏而還太宰嚭既與子胥有隙因讒之曰子胥為彊暴力諫願王少厚焉王曰寡人知之未興師會魯使子貢聘於吳十三年齊大夫陳成恆欲弒簡公陰憚高國鮑晏故前興兵伐魯魯君憂之孔子患之召門人而謂之曰諸侯有相伐者丘常恥之夫魯父母之國也丘墓在焉今齊將伐之子無意一出耶子路辭出孔子止之子張子石請行孔子弗許子貢辭出孔子遣之子貢北之齊見成恆因謂曰夫魯者難伐之國而君伐過矣成恆曰魯何難伐也子貢曰其城薄以卑其池狹以淺其君愚而不仁其大臣僞而無用其士民又惡甲兵之事此不可與戰君不若伐吳夫吳城厚而崇池廣以深甲堅士選器飽弩徑又使明大夫守之此易伐也成恆忿然作色曰子之所難人之所易也子之所易人之所難也而以教恆何也子貢曰臣聞君三封而三不成者大臣有所不聽者也今君又欲破魯以廣齊隳魯以自尊而君功不與焉是君上驕主心下恣群臣而求以成大事難矣且夫上驕則犯臣驕則爭此君上於主有遽而下與大臣交爭也如此則君立於齊危於纍卵故曰不如伐吳且吳王剛猛而毅能行其令百姓習於戰守將明於法禁齊遇為擒必矣今君悉四境之中出大臣以環之人民外死大臣內空是君上無彊敵之臣下無黔首之士孤主制齊者君也成恆曰善雖然吾兵已在魯之城下矣若去而之吳大臣將有疑我之心為之奈何子貢曰君按兵無伐請為君南見吳王請之救魯而伐齊君因以兵迎之成恆許諾子貢南見吳王謂吳王曰臣聞之王者不絶世而霸者無彊敵千鈞之重加銖兩而移今以萬乘之齊而私千乘之魯而與吳爭彊臣竊為君恐焉且夫救魯顯名也伐齊大利也義存亡魯實害暴齊而威彊晉則王不疑也吳王曰善雖然吾嘗與越戰棲之會稽入臣於吳不即誅之三年使歸夫越君賢主也苦身勞力夜以接日內飾其政外事諸侯必將有報我之心子待我伐越而聽子子貢曰不可夫越之彊不過於魯吳之彊不過於齊主以伐越而不聽臣齊亦已私魯矣且畏小越而惡彊齊不勇也見小利而忘大害不智也臣聞仁人不困厄以廣其德智者不棄時以舉其功王者不絶世以立其義且夫畏越如此臣請東見越王使出師以從下吏吳王大悅子貢東見越王王聞之除道郊迎身御至舍而問曰此僻狹之國蠻夷之民大夫何索然若不辱乃至於此子貢曰君處故來越王勾踐再拜稽首曰孤聞之禍與福為鄰今大夫之弔孤孤之福矣孤敢不問其說子貢曰臣今者見吳王告以救魯而伐齊其心申其志畏越且夫無報人之志而使人疑之者拙也有報人之意而使人知之者殆也事未發而聞之者危也三者舉事之大忌也越王再拜曰孤少失前人內不自量與吳人戰軍敗身辱遺先人恥遁逃出走上棲會稽下守海濱唯魚鱉見矣今大夫辱弔而身見之又發玉聲以教孤孤賴天之賜也敢不承教子貢曰臣聞之明主任人不失其能直士舉賢不容於世故臨財分利則使仁涉患犯難則使勇用智圖國則使賢正天下定諸侯則使聖兵強而不能行其威勢在上位而不能施其政令於下者其君幾乎難矣臣竊自擇可與成功而至王者其惟臣幾乎今吳王有伐齊晉之志君無愛重器以喜其心無惡卑辭以盡其禮而伐齊齊必戰不勝君之福也彼戰而勝必以其兵臨晉騎士鋭兵弊乎齊重寶車騎羽毛盡乎晉則君制其餘矣越王再拜曰昔者吳王分其民之衆以殘吾國殺敗吾民鄙吾百姓夷吾宗廟國為墟棘身為魚鱉孤之怨吳深於骨髓而孤之事吳如子之畏父弟之敬兄此孤之死言也今大夫有賜故孤敢以疑請遂言之孤身不安重席口不嘗厚味目不視美色耳不聽雅音既已三年矣焦唇乾舌苦身勞力上事群臣下養百姓願一與吳交戰於天下平原之野正身臂而奮吳越之士繼踵連死肝腦塗地者孤之願也思之三年不可得也今內量吾國不足以傷吳外事諸侯而不能也願空國棄群臣變容貌易姓名執箕帚養牛馬以事之孤雖知要領不屬手足異處四支布陳為鄉邑笑孤之意出焉今大夫有賜是存亡國而興死人也孤賴先人之賜敢不待令乎子貢曰夫吳王之為人也貪功名而不知利害越王慥然避位子貢曰臣觀吳王為數戰伐士卒不恩大臣內引讒人益衆夫子胥為人精誠中廉外明而知時不以身死隱君之過正言以忠君直行以為國其身死而不聽太宰嚭為人智而愚彊而弱巧言利辭以固其身善為詭詐以事其君知其前而不知其後順君之過以安其私是殘國傷君之佞臣也越王大悅子貢去越王送之金百鎰寶劍一良馬二子貢不受至吳謂吳王曰臣以下吏之言告於越王越王大恐曰昔者孤身不幸少失前人內不自量抵罪於吳軍敗身辱逋逃出走棲於會稽國為墟莽身為魚鱉賴大王之賜使得奉俎豆修祭祀死且不敢忘何謀之敢慮其志甚恐將使使者來謝於王子貢館五日越使果來曰東海役臣勾踐之使者臣種敢修下吏少聞於左右昔孤不幸少失前人內不自量抵罪上國軍敗身辱逋逃出走棲於會稽賴王賜得奉祭祀死且不忘今竊聞大王將興大義誅彊救弱困暴齊而撫周室故使賤臣以奉前王所藏器甲二十領屈盧之矛步光之劍以賀軍吏若將遂大義弊邑雖小請悉四方之內士卒三千人以從下吏孤請躬被堅執鋭以前受矢石君臣死無所恨矣吳王大悅乃召子貢曰越使果來請出士卒三千其君又從之與寡人伐齊可乎子貢曰不可夫空人之國悉人之衆又從其君不仁也君受其幣許其師而辭其君即可吳王許諾子貢去之晉見定公曰臣聞之慮不預定不可以應卒兵不預辨不可以勝敵今吳齊將戰戰而不勝越亂之必矣與戰而勝必以其兵臨晉君為之奈何定公曰何以待之子貢曰修兵伏卒以待之晉君許之子貢返魯吳王果興九郡之兵將與齊戰道出胥門因過姑胥之臺忽晝假寐於姑胥之臺而得夢及窹而起其心恬然悵焉乃命太宰嚭告曰寡人晝臥有夢覺而恬然悵焉請占之得無所憂哉夢入章明宮見兩䥶蒸而不炊兩黑犬嘷以南嘷以北兩鋘殖吾宮墻流水湯湯越吾宮堂後房鼓震篋篋有鍛工前園橫索生梧桐子為寡人占之太宰嚭曰美哉王之興師伐齊也臣聞章者德鏘鏘也明者破敵聲聞功朗明也兩䥶蒸而不炊者大王聖德氣有餘也兩黑犬嘷以南嘷以北者四夷已服朝諸侯也兩鋘殖宮墻者農夫就成田夫耕也湯湯越宮堂者鄰國貢獻財有餘也後房篋篋鼓震有鍛工者宮女悅樂琴瑟和也前園橫索生梧桐者樂府鼓聲也吳王大悅而其心不已召王孫駱問曰寡人忽晝夢為豫陳之王孫駱曰臣鄙淺於道不能博大今王所夢臣不能占其有所知者東掖門亭長長城公弟公孫聖聖為人少而好游長而好學多見博觀知鬼神之情狀願王問之王乃遣王孫駱往請公孫聖曰吳王晝臥姑胥之臺忽然感夢覺而悵然使子占之急詣姑胥之臺公孫聖伏地而泣有頃而起其妻從旁謂聖曰子何性鄙希睹人主卒得急召涕泣如雨公孫聖仰天嘆曰悲哉非子之所能知也今日壬午時加南方命屬上天不得逃亡伏地而泣者非但自哀誠傷吳王妻曰子以道自達於主有道當行上以諫王下以約身今聞急召憂惑潰亂非賢人所宜公孫聖曰愚哉女子之言也吾受道十年隱身避害欲終壽命不意卒得急召中世自棄故悲與子相離耳遂去詣姑胥臺吳王曰寡人將北伐齊魯道出胥門過姑胥之臺忽然晝夢子為占之其言吉凶公孫聖曰臣不言身名全言之必死百段於王前然忠臣不顧其軀乃仰天歎曰臣聞好船者必溺好戰者必亡臣好直言不顧於命願王圖之臣聞章者戰不勝敗走慞偟也明者去昭昭就冥冥也入門見䥶蒸而不炊者大王不得火食也兩黑犬嘷以南嘷以北者黑者陰也北者匿也兩鋘殖宮牆者越軍入吳國伐宗廟掘社稷也流水湯湯越宮堂者宮空虛也後房鼓震篋篋者坐太息也前園橫索生梧桐者梧桐心空不為用器但為盲僮與死人俱葬也願大王按兵修德無伐於齊則可銷也遣下吏太宰嚭王孫駱解冠幘肉袒徒跣稽首謝於勾踐國可安存也身可不死矣吳王聞之索然作怒乃曰吾天之所生神之所使顧力士石番以鐵鎚擊殺之聖乃仰頭向天而言曰吁嗟天知吾之冤乎忠而獲罪身死無辜以葬我以為直者不如相隨為柱提我至深山後世相屬為聲響於是吳王乃使門人提之蒸丘豺狼食汝肉野火燒汝骨東風數至飛揚汝骸骨肉縻爛何能為聲響哉太宰嚭趨進曰賀大王喜災已滅矣因舉行觴兵可以行吳王乃使太宰嚭為右校司馬王孫駱為左校司馬及從勾踐之師伐齊伍子胥聞之諫曰臣聞興十萬之衆奉師千里百姓之費國家之出日數千金不念士民之死而爭一日之勝臣以為危國亡身之甚且與賊居不知其禍外復求怨徼幸他國猶治救瘑疥而棄心腹之疾發當死矣瘑疥皮膚之疾不足患也今齊陵遲千里之外更歷楚趙之界齊為疾其疥耳越之為病乃心腹也不發則傷動則有死願大王定越而後圖齊臣之言決矣敢不盡忠臣今年老耳目不聰以狂惑之心無能益國竊觀金匱第八其可傷也吳王曰何謂也子胥曰今年七月辛亥平旦大王以首事辛歲位也亥陰前之辰也合壬子歲前合也利以行武武決勝矣然德在合斗擊丑丑辛之本也大吉為白虎而臨辛功曹為太常所臨亥大吉得辛為九醜又與白虎并重有人若以此首事前雖小勝后必大敗天地行殃禍不久矣吳王不聽遂九月使太宰嚭伐齊軍臨北郊吳王謂嚭曰行矣無忘有功無赦有罪愛民養士視如赤子與智者謀與仁者友太宰嚭受命遂行吳王召大夫被離問曰汝常與子胥同心合志并慮一謀寡人興師伐齊子胥獨何言焉被離曰子胥欲盡誠於前王自謂老狂耳目不聰不知當世之所行無益吳國王遂伐齊齊與吳戰於艾陵之上齊師敗績吳王既勝乃使行人成好於齊曰吳王聞齊有沒水之慮帥軍來觀而齊興師蒲草吳不知所安集設陳為備不意頗傷齊師願結和親而去齊王曰寡人處此北邊無出境之謀今吳乃濟江淮踰千里而來我壤土戮我衆庶賴上帝哀存國猶不至顛隕王今讓以和親敢不如命吳齊遂盟而去吳王還乃讓子胥曰吾前王履德明聖達於上帝垂功用力為子西結彊讎於楚今前王譬若農夫之艾殺四方蓬蒿以立名于荊蠻斯亦大夫之力今大夫昏耄而不自安生變起詐怨惡而出出則罪吾士衆亂吾法度欲以妖孽挫衄吾師賴天降衷齊師受服寡人豈敢自歸其功乃前王之遺德神靈之祐福也若子於吳則何力焉伍子胥攘臂大怒釋劍而對曰昔吾前王有不庭之臣以能遂疑計惡不陷於大難今王播棄黎老所患外不憂此孤僮之謀非霸王之事天所未棄必趨其小喜而近其大憂王若覺窹吳國世世存焉若不覺寤吳國之命斯促矣員不忍稱疾辟易乃見王之為擒員誠前死掛吾目於門以觀吳國之喪吳王不聽坐於殿上獨見四人向庭相背而倚王怪而視之群臣問曰王何所見王曰吾見四人相背而倚聞人言則四分走矣子胥曰如王言將失衆矣吳王怒曰子言不祥子胥曰非惟不祥王亦亡矣後五日吳王復坐殿上望見兩人相對北向人殺南向人王問群臣見乎曰無所見子胥曰王何見王曰前日所見四人今日又見二人相對北向人殺南向人子胥曰臣聞四人走叛也北向殺南向臣殺君也王不應吳王置酒文臺之上群臣悉在太宰嚭執政越王侍坐子胥在焉王曰寡人聞之君不賤有功之臣父不憎有力之子今太宰嚭為寡人有功吾將爵之上賞越王慈仁忠信以孝事於寡人吾將復增其國以還助伐之功於衆大夫如何群臣賀曰大王躬行至德虛心養士群臣並進見難爭死名號顯著威震四海有功蒙賞亡國復存霸功王事咸被群臣於是子胥據地垂涕曰於乎哀哉遭此默默忠臣掩口讒夫在側政敗道壞諂諛無極邪說僞辭以曲為直舍讒攻忠將滅吳國宗廟既夷社稷不食城郭丘墟殿生荊棘吳王大怒曰老臣多詐為吳妖孽乃欲專權擅威獨傾吳國寡人以前王之故未忍行法今退自計無沮吳謀子胥曰今臣不忠不信不得為前王之臣臣不敢愛身恐吳國之亡矣昔者桀殺關龍逢紂殺王子比干今大王誅臣參於桀紂大王勉之臣請辭矣子胥歸謂被離曰吾貫弓接矢於鄭楚之界越渡江淮自致於斯前王聽從吾計破楚見凌之讎欲報前王之恩而至於此吾非自惜禍將及汝被離曰未諫不聽自殺何益何如亡乎子胥曰亡臣安往吳王聞子胥之怨恨也乃使人賜屬鏤之劍子胥受劍徒跣褰裳下堂中庭仰天呼怨曰吾始為汝父忠臣立吳設謀破楚南服徑越威加諸侯有霸王之功今汝不用吾言反賜我劍吾今日死吳宮為墟庭生蔓草越人掘汝社稷安忘我乎昔前王不欲立汝我以死爭之卒得汝之願公子多怨於我我徒有功於吳今乃忘我定國之恩反賜我死豈不謬哉吳王聞之大怒曰汝不忠信為寡人使齊託汝子於齊鮑氏有我外之心急令自裁孤不使汝得有所見子胥把劍仰天嘆曰自我死後後世必以我為忠上配夏殷之世亦得與龍逢比干為友遂伏劍而死吳王乃取子胥尸盛以鴟夷之器投之於江中言曰胥汝一死之後何能有知即斷其頭置高樓上謂之曰日月炙汝肉飄風飄汝眼炎光燒汝骨魚鱉食汝肉汝骨變形灰有何所見乃棄其軀投之江中子胥因隨流揚波依潮來往蕩激崩岸於是吳王謂被離曰汝嘗與子胥論寡人之短乃髡被離而刑之王孫駱聞之不朝王召而問曰子何非寡人而不朝乎駱曰臣恐耳曰子以我殺子胥為重乎駱曰大王氣高子胥位下王誅之臣命何異於子胥臣以是恐也王曰非聽宰嚭以殺子胥胥圖寡人也駱曰臣聞人君者必有敢諫之臣在上位者必有敢言之交夫子胥先王之老臣也不忠不信不得為前王臣吳王中心悷然悔殺子胥豈非宰嚭之讒子胥而欲殺之駱曰不可王若殺嚭此為二子胥也於是不誅十四年夫差既殺子胥連年不熟民多怨恨吳王復伐齊闕為闌溝於商魯之間北屬蘄西屬濟欲與魯晉合攻於黃池之上恐群臣復諫乃令國中曰寡人伐齊有敢諫者死太子友知子胥忠而不用太宰嚭佞而專政欲切言之恐罹尤也乃以諷諫激於王清旦懷丸持彈從後園而來衣夾履濡王怪而問之曰子何為夾衣濡履體如斯也太子友曰適游後園聞秋蜩之聲往而觀之夫秋蟬登高樹飲清露隨風撝撓長吟悲鳴自以為安不知螳螂超枝緣條曳腰聳距而稷其形夫螳螂翕心而進志在有利不知黃雀盈緑林徘徊枝陰𨃂微進欲啄螳螂夫黃雀但知伺螳螂之有味不知臣挾彈危擲蹭蹬飛丸而集其背今臣但虛心志在黃雀不知空坎其旁暗忽坎中陷於深井臣故夾體濡履幾為大王取笑王曰天下之愚莫過於斯但貪前利不覩後患太子曰天下之愚復有甚者魯承周公之末有孔子之教守仁抱德無欲於鄰國而齊舉兵伐之不愛民命惟有所獲夫齊徒舉而伐魯不知吳悉境內之士盡府庫之財暴師千里而攻之夫吳徒知踰境征伐非吾之國不知越王將選死士出三江之口入五湖之中屠我吳國滅我吳宮天下之危莫過於斯也吳王不聽太子之諫遂北伐齊越王聞吳王伐齊使范蠡泄庸率師屯海通江以絶吳路敗太子友於姑熊夷通江淮轉襲吳遂入吳國燒姑胥臺徙其大舟吳敗齊師於艾陵之上還師臨晉與定公爭長未合邊遽乃至以越亂告吳王夫差大懼乃合諸侯而謀曰吾道遼遠無會前進孰利王孫駱曰不如前進則執諸侯之柄以求其志請王屬士以明其令勸之以高位辱之以不從令各盡其死夫差昏乃戒令秣馬食士夜中乃令服兵被甲勒馬銜枚出火於造暗行而進吳師皆文犀長盾扁諸之劍方陳而行中校之軍皆白裳白髦素甲素羽之矰望之若荼王親秉鉞戴旗以陳而立左軍皆赤裳赤髦丹甲朱羽之矰望之若火右軍皆玄裳玄輿黑甲烏羽之矰望之如墨帶甲三萬六千雞鳴而定既陳去晉軍一里天尚未明王乃秉枹親鳴金鼓三軍譁吟以振其旅其聲動天徙地晉師大驚不出反距堅壘乃令童褐請軍曰兩軍邊兵接好日中無期今大國越次而造弊邑之軍壘敢請辭故吳王親對曰天子有命周室卑約諸侯貢獻莫入王府上帝鬼神而不可以告無姬姓之所振懼遣使來告冠蓋不絶於道始周依負於晉故忽於夷狄會晉今反叛如斯吾是以蒲服就君不肯長弟徒以爭彊孤進不敢去君不命長為諸侯笑孤之事君決在今日不得事君亦在今日矣敢煩使者往來孤躬親聽命於藩籬之外童褐將還吳王躡左足與褐決矣及報與諸侯大夫列坐於晉定公前既以通命乃告趙鞅曰臣觀吳王之色類有大憂小則嬖妾嫡子死否則吳國有難大則越人入吳不得還也其意有愁毒之憂進退輕難不可與戰主君宜許之以前期無以爭行而危國也然不可徒許必明其信趙鞅許諾入謁定公曰姬姓於周吳為先老可長以盡國禮定公許諾命童褐復命於是吳王愧晉之義乃退幕而會二國君臣並在吳王稱公前晉侯次之群臣畢盟吳既長晉而還未踰於黃池越聞吳王久留未歸乃悉士衆將踰章山濟三江而欲伐之吳又恐齊宋之為害乃命王孫駱告勞于周曰昔楚不承供貢以辟遠兄弟之國吾前君闔閭不忍其惡帶劍挺鈹與楚昭王相逐於中原天念其忠楚師敗績今齊不賢於楚又不恭王命以遠辟兄弟之國夫差不忍其惡被甲帶劍徑至艾陵天福於吳齊師還鋒而退夫差豈敢自多其功是文武之德所祐助時歸吳不熟於歲遂緣江泝淮闕溝深水出於商魯之間而歸告於天子執事周王答曰伯父令子來乎盟國一人則依矣余實嘉之伯父若能輔余一人則兼受永福周室何憂焉乃賜弓弩王阼以增號諡吳王還歸自黃池息民散兵二十年越王興師伐吳吳與越戰於檇李吳師大敗軍散死者不可勝計越追破吳吳王困急使王孫駱稽首請成如越之來也越王對曰昔天以越賜吳吳不受也今天以吳賜越其可逆乎吾請獻勾甬東之地吾與君為二君乎吳王曰吾之在周禮前王一飯如越王不忘周室之義而使為附邑亦寡人之願也行人請成列國之義惟君王有意焉大夫種曰吳為無道今幸擒之願王制其命越王曰吾將殘汝社稷夷汝宗廟吳王默然請成七反越王不聽二十三年十月越王復伐吳吳國困不戰士卒分散城門不守遂屠吳吳王率群臣遁去晝馳夜走三日三夕達於秦餘杭山胸中愁憂目視茫茫行步猖狂腹餒口饑顧得生稻而食之伏地而飲水顧左右曰此何名也對曰是生稻也吳王曰是公孫聖所言不得火食走慞偟也王孫駱曰飽食而去前有胥山西坂中可以匿止王行有頃因得生瓜已熟吳王掇而食之謂左右曰何冬而生瓜近道人不食何也左右曰謂糞種之物人不食也吳王曰何謂糞種左右曰盛夏之時人食生瓜起居道傍子復生秋霜惡之故不食吳王歎曰子胥所謂旦食者也謂太宰嚭曰吾戮公孫聖投胥山之巔吾以畏責天下之慚吾足不能進心不能往太宰嚭曰死與生敗與成故有避乎王曰然曾無所知乎子試前呼之聖在當即有應吳王止秦餘杭山呼曰公孫聖三反呼聖從山中應曰公孫聖三呼三應吳王仰天呼曰寡人豈可返乎寡人世世得聖也須臾越兵至三圍吳范蠡在中行左手提鼓右手操枹而鼓之吳王書其矢而射種蠡之軍辭曰吾聞狡兔以死良犬就烹敵國如滅謀臣必亡今吳病矣大夫何慮乎大夫種相國蠡急而攻大夫種書矢射之曰上天蒼蒼若存若亡越君勾踐下臣種敢言之昔天以越賜吳吳不肯受是天所反勾踐敬天而功既得返國今上天報越之功敬而受之不敢忘也且吳有大過六以至於亡王知之乎有忠臣伍子胥忠諫而身死大過一也公孫聖直說而無功大過二也太宰嚭愚而佞言輕而讒諛妄語恣口聽而用之大過三也夫齊晉無返逆行無僭侈之過而吳伐二國辱君臣毀社稷大過四也且吳與越同音共律上合星宿下共一理而吳侵伐大過五也昔越親戕吳之前王罪莫大焉而幸伐之不從天命而棄其仇後為大患大過六也越王謹上刻青天敢不如命大夫種謂越君曰中冬氣定天將殺戮不行天殺反受其殃越王敬拜曰諾今圖吳王將為何如大夫種曰君被五勝之衣帶步光之劍仗屈盧之矛瞋目大言以執之越王曰諾乃如大夫種辭吳王曰誠以今日聞命言有頃吳王不自殺越王復使謂曰何王之忍辱厚恥也世無萬歲之君死生一也今子尚有遺榮何必使吾師衆加刃於王吳王仍未肯自殺勾踐謂種蠡曰二子何不誅之種蠡曰臣人臣之位不敢加誅於人主願主急而命之天誅當行不可久留越王復瞋目怒曰死者人之所惡惡者無罪於天不負於人今君抱六過之罪不知愧辱而欲求生豈不鄙哉吳王乃太息四顧而望言曰諾乃引劍而伏之死越王謂太宰嚭曰子為臣不忠無信亡國滅君乃誅嚭并妻子吳王臨欲伏劍顧謂左右曰吾生既慚死亦愧矣使死者有知吾羞前君地下不忍覩忠臣伍子胥及公孫聖使其無知吾負於生死必連繴組以罩吾目恐其不蔽願復重羅繡三幅以為掩明生不昭我死勿見我形吾何可哉越王乃葬吳王以禮於秦餘杭山卑猶越王使軍士集於我戎之功人一隰土以葬之宰嚭亦葬卑猶之旁
