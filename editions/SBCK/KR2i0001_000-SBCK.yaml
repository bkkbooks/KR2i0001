body:
  text: 重刋吳越春秋序古者列國皆有史官以掌記時事若孔子因魯史以􅁱春秋者是也吳越春秋乃作扵東漢趙曄後世􅀘亡之書耳大抵本國語史記而附以所傳聞者為之元徐天祜謂其去古未遠又越人宜知越之故視他書所記二國事為詳得之矣天祜之所考註亦精當第謂其不類漢文者其字句間或似小說家觀儒林傳稱其所著復有所謂詩細者蔡邕讀而歎息以為長扵論衡今論衡故在也鄙俚恠誕者不少則東漢末亦自有此文氣矣謂其非全書則吳越顛末亦俻矣隋唐經籍誌多二卷意者西施之至吳范蠡之去越乎若附會於䜟緯夢卜之説則固當時所尚而左氏傳春秋亦多述焉不可盡謂其無據也其大㫖誇越之多賢以矜其故都而所編傳乃内吳而外越則又不可曉矣自科舉聲律之學興而古書散佚無留意者雖好古博雅之士歴代經籍志所載亦或不能舉其篇目故有志扵集古者皆在所取也去年秋監察御史寧郷袁公大倫奉命来按吳體正以蠧剔威加而恵流乃本古觀風之法訪吳之故扵吳邑矦任丘鄺廷瑞矦素稱稽古尚文歴舉郡乗所載者以對公問其所本始矦辤焉公乃手出是編授之矦讀之曰命之矣古者使扵其國仕扵其􅀖不能舉其地之故君子耻焉吾乃今知吳山川城郭之所名也吾乃今知封疆因革之所始也吾乃今知民情土俗之所由也吾不忍自私當重梓以行扵吳人俾無忘厥本乃屬郡史馮弋等錄而􅈓之既成走書屬予序盖矦第進士時以予為知已而袁公亦吾榜進士之傑也嗚呼孟軻氏稱入則無法家拂士出則無敵國外患者國恒亡然後知生扵憂患而死扵安樂也觀二國之興而僨僨而興斯昭昭矣驕畏之殊興亡所繫忠䜛之判禍福攸分可畏哉予竊􅏜夫大言無術自暇以怠人者曰大數巳定無庸人力又曰天子有道守在四夷此英雄駕馭之言非臣子思患預防之䇿也禹益儆惕扵三苗之師成康不忘乎戎兵之詰其見遠矣是書所載若胥之忠蠡之智種之謀包胥之論戰孫武之論兵越女之論劔陳音之論弩句踐之畏天自苦臣吳之别辤伐吳之戒語五大夫之自效世亦胡可少哉所載孔子子貢事不可據而其謀則在當時逰説之至髙者也相傳越絶書為子貢撰抑亦有所本云噫書稱軾怒鼃尚足以激士而况讀其書論其世能不少動扵衷者其亦非夫也夫至扵司職方掌外史地里所在必有所因而名附會以成其説者多不可辯騐然與其信乎今不若傳諸古與其徵諸遠不若考乎近是又今日鄺矦崇信此書之意而袁公博古之功不可誣也因附予所欲言為序弘治十四年􅀊在辛酉夏五朔旦賜進士及第翰林國史􅁱撰儒林郎華亭錢福與謙序吳越古稱東南僻逺之􅀖然當其盛彊往往抗衡上國黄池之會夫差欲尊天子自去其僣號稱子以吿令諸侯及越既有吳勾踐大盟四國以共輔王室要其志皆歸扵尊周其知所天矣孔子作春秋雖小國猶錄而書之而况以世言則禹稷之裔以地言則會稽具區其川其浸周職方氏列為九州之首皆足以望天下故記可闕而不傳乎吳越春秋趙曄所著隋唐經籍志皆云十二卷今存者十卷殆非全書二志又云楊方撰吳越春秋削繁作煩唐志五卷皇甫遵撰吳越春秋傳十卷傳字隋志缺此二書今人罕見獨曄書行扵丗曄傳在儒林中觀其所作乃不􅀋漢文按邯鄲李氏圖書十志目亦謂楊方甞刋削曄所為書至皇甫遵遂合二家考正為之傳註又按史記註有徐廣所引吳越春秋語而索􅀮以為今無此語者他如文選註引季子見遺金事吳地記載闔廬時夷亭事及水經註甞載越事數條􅀋皆援據吳越春秋今曄本咸無其文亦無所謂傳註豈楊方所巳刋削而皇甫所未考正者耶曄書最先出東都時去古未甚遠曄又山隂人故綜述視他書所紀二國事為詳取節焉可也其言上稽天時下測物變明微推遠憭若蓍蔡至扵盛衰成敗之迹則彼已君臣反覆上下其論議種蠡諸大夫之謀迭用則霸子胥之諌一不聴則亡皆鑿鑿然可以勸戒萬世豈獨為是􅀖二千年故實哉曄書越舊甞鋟梓􅀊久不復存汴梁劉侯来治越奨厲學校蒐遺文修墜典乃輟義田􅅒羡財重刻于學不鄙諛聞属以考訂且命序其左端夫越人宜知越之故則是舉也扵所闕不為無􅀘遂不得辭厥旣刋正疑訛過不自量復為之音註併考其與傳記同異者附見于下而互存之惜其間文義猶有滯礙不可訓知不敢盡用臆見更定又無皇甫本可證姑􅀙其舊以俟後之君子考焉侯名克昌丗大其字云郡人前進士徐天祜受之序吳越春秋目錄上卷第一吳太伯傳宜王而不王者也吳之後君又未嘗追王之尊元本太伯傳作吳王太伯傳太伯三以天下讓之曰王名不與實稱也今去王字以􅀙其實卷第二吳王壽夢傳卷第三王僚使公子光傳謂使之伐楚耳光即闔閭旣自有傳此云使公元本不曰吳王僚傳而曰王僚使公子光傳盖子光贅也今姑􅀙其舊卷第四闔閭内傳卷第五夫差内傳皆曰外傳内吳而外越何也况曄又越人乎若元本闔閭夫差傳皆曰内傳下卷無余勾踐傳閭夫差二傳獨曰内又何也今不敢􅂺去内外以吳爲内則太伯壽夢王僚三傳不曰内而闔二字姑存之下卷第六越王無余外傳卷第七勾踐入臣外傳􅀙越諸傳亦作外傳云元本越王勾踐入臣獨無外傳字今􅀘其闕姑卷第八勾踐歸國外傳卷第九勾踐隂謀外傳傳書越王而不名不知何義今於隂謀傳去越元本勾踐入臣歸國伐吳諸傳皆書名獨陰謀王二字而書勾踐􅀙諸例也卷第十勾踐伐吳外傳吳越春秋目録徐氏􅀘註第一卷勾吴吳也索隱亦引師古註謂當如顔解但師古云勾吳前註巳引漢地理志顔師古註又按史記註勾吳大之發聲耳淮南子註勾吳吳人語不正言吳而加以猶越爲干越也索隱乃以干越爲於越干與於皆語世壽夢始號勾吳與史記所載太伯時巳號勾吳不勾世本註勾吳太伯始所居地名史記正義曰十九同疑正義誤壽夢宋忠曰孰姑壽夢也夀孰音相近姑之言諸也毛詩已見前註又按史記索隱云系本曰吳孰姑徙勾吳名乗傳舊讀月誰爲姑是以姑爲諸孰姑壽夢一人耳又第四卷陸門八以象天八風水門八以法地八聦法地八卦吳郡圖經續記八聦亦作八卦爲是吳都吳郡志引此書以爲陸門八以象天八風水門八以賦郛郭周帀重城結隅通門二公水道陸衢鄭定公大懼乃令國中辭殺之是爲楚平王十年其後吳破楚入郢乃昭王前註巳正其誤按史年表鄭定公十一年書楚建作十年蓋鄭獻公八年非定公時也申包胥劉伯莊曰包字亦作鮑史記正義包胥姓公孫封於史楚世家亦作申鮑胥註服䖍曰楚大夫王孫包胥申故曰申包胥戰國䇿以爲棼冐勃蘇秦桓公素沉湎胥請救是爲楚昭王十年楚十一年書秦救至卽哀前註已正其誤按史年表秦哀公三十一年書楚包乃三十二年非桓公時也􅊨􅊨􅊨􅊨􅊨􅊨􅊨􅊨􅊨􅊨公三十二年也據此則請救在三十一年秦師至楚嚴王何罪國幾絶按嚴本岀芈姓其先卽楚莊王支孫以謚爲莊姓者嚴字義不通今詳當是莊王謂前王何罪幾至絶國嚴此以莊爲嚴亦避諱追改也也如前漢莊忌忌子助後漢莊光皆避明帝諱改姓第五卷入五湖之中以其周行五百里故以五湖爲名又楊泉五湖賦止已詳見前註又按張勃吳錄云五湖者太湖之别名一水五名今併存之爲太湖而作陸􅀛􅀩云太湖上禀咸池五車之氣故帶劒挺鈹功臣表周􅍳以長鈹擊項籍顔師古註長刃兵爲刀鈹字或作鉟方言錟謂之鈹或曰劒如刀裝者前漢而剱形史記作長鈹鈹鉟同
