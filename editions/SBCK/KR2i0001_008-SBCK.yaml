body:
  text: 吳越春秋勾踐歸國外傳第八越王勾踐臣吳至歸越勾踐七年也蠡入䆠於吳三國語勾踐與范合此書於勾踐五年書入吳事至是歸國首尾三年也年而吳人遣之當魯哀公五年是爲勾踐七年正與此百姓拜之於道曰君王獨無苦矣今王受天之福復於越國霸王之迹自斯而起王曰寡人不慎夭敎無徳於民今勞萬姓擁於岐路將何徳化以報國人顧謂范蠡曰今十有二月己巳之日時加禺中衡陽是謂禺中對于昆吾是謂正中禺音隅禺中時加已也淮南子曰臻于􅀌欲以此到國何如蠡曰大王且留以臣卜日於是范蠡進曰異哉大王之擇日也王當疾趨車馳人走越王䇿馬飛輿遂復宫闕吳封地百里於越東至炭瀆踐稱炭聚載從炭瀆至鍊塘㑹稽志作炭浦越舊經炭瀆在㑹稽縣東六十里越絶曰勾西止周宗南造於山北薄於海越王謂范蠡曰􅀌獲辱連年􅀔足以死得相國之䇿再返南鄉今欲定國立城人民不足其功不可以興爲之柰何范蠡對曰唐虞卜地夏殷封國古公營城周雒威折萬里徳致八極豈直欲破彊敵收鄰國乎越王曰􅀌不能承前君之制修德自守亡衆棲於㑹稽之山請命乞恩受辱被恥囚結吳宫幸來歸國追以百里之封將遵前君之意復於㑹稽之上而宜釋吳之地范蠡曰昔公劉去邰而徳彰於夏亶父讓地而名發於岐今大王欲有立字欲字下當國􅀣都幷敵國之境不處平易切以豉之都據四逹之地將焉於䖍切立霸王之業越王曰寡人之計未有决定欲築城立郭分設里閭欲委屬於相國於是范蠡乃觀天文擬法於紫宫築作小城周千一百二十二歩一圓三方西北立龍飛翼之樓以象天門東南伏漏石竇以象地户陵門四逹以象八風外郭築城而缺西北示服事吳也不敢壅塞内以取吳故缺西北而吳不知也北向稱臣委命吳國左右易處處上聲易音亦不得其位明臣屬也城旣成而怪山自生者琅琊東武海中山也一夕自來故名怪山来一名寶林一名怪山越絶曰􅀛即􅀛山也在府東南二里一名飛山即琅琊東武山一夕移於此山勾踐所起游臺也寰宇記􅀛范蠡曰臣之築城也其應天矣崑崙之象存焉越王曰寡人聞崑崙之山乃地之柱上承皇天氣吐宇内下處后土稟受無外滋聖生神嘔養帝㑹故有五字帝字上當帝處其陽陸三王居其正地吾之國也扁作偏扁疑當天地之壤乗東南之維斗去極北非糞土之城何能與王者比隆盛哉范蠡曰君徒見外未見於内臣乃承天門制城合氣於后土嶽象已設崑崙故出越之霸也越王曰茍如相國之言􅀌之命也范蠡曰天地卒號以著其實名東武起游臺其上東南爲司馬門立增樓層同增與冠其山巓以爲靈臺山上又作三層楼以望雲物水經註怪山者越起靈臺於起離宫於淮陽臺周五百越絶曰離淮陽宫在㑹稽縣東南二里六十步在淮陽里丘越舊經中宿臺在於髙平中指臺馬丘周越絶宿作指云中宿在㑹稽縣東七里六百步在髙平里越舊經駕臺在於成丘馳於離丘越絶駕臺立􅁐於樂野所休謀也十道志樂野勾踐以此野爲􅁐今有樂瀆村越絶曰越王弋獵之處大樂故謂樂野其山上石室越三燕臺在於石室州東南十里越舊經宴臺在齋臺在於襟山無襟山按越境則襟當作稷稷山在㑹稽縣東五十三里越絶曰稷山者勾踐齋戒臺也旣曰齋臺勾踐之出游也休息食室於冰􅌮以備膳羞也一曰氷室所越王乃召相國范蠡大夫種大夫郢問曰􅀌欲以今日上明堂臨國政專恩致令以撫百姓何日可矣惟三聖指上三人謂聖臣也有聖臣范蠡而言子胥曰越紀綱維持范蠡曰今日丙午日也丙陽將也是日吉矣又因良時臣愚以爲可無始有終得天下之中大夫種曰前車已覆後車必戒願王深察范蠡曰夫子故不一二見也吾王今以丙午復初臨政解救其本是一宜夫金制始而火救其終是二宜蓄金之憂轉而及水是三宜君臣有差不失其理是四宜王相聲去俱起天下立矣是五宜臣願急升明堂臨政越王是日立政翼翼小心出不敢奢入不敢侈越王念復吳讎非一旦也苦身勞心夜以接日目臥則攻之以蓼足寒則漬之以水冬常抱氷夏還握火愁心苦志懸膽於户出入嘗之不絶於口中夜灒泣泣而復嘯越王曰吳王好服之離體吾欲采葛所以爲絺綌詩毛氏箋葛使女工織細布獻之以求吳王之心於子何如羣臣曰善乃使國中男女入山采葛踐種葛使越女治葛布獻吳王會稽縣東十里有葛山越絶曰勾以作黃絲之布欲獻之未及遣使吳王聞越王盡心自守食不重味衣不重綵雖有五臺之游未嘗一日登翫吾欲因而賜之以書增之以封東至於勾甬西至於檇李南至於姑末國卞縣南有姑蔑城越之姑蔑至秦屬即春秋越姑蔑之地姑蔑地名有二魯縣今衢州㑹稽爲太末北至於平原今海鹽縣越絶作武原縱橫八百餘里越王乃使大夫種索葛布十萬甘􅁡九党越春秋越韻㑹引吳文笥之􅀋皆以數計則甘􅁡當作丸瓽玉篇瓽丁盎切盆也此党字誤以甘蜜丸欓報吳増封之禮謂欓爲越椒今此書無丸欓二字詳下文文笥七枚狐皮五􅀟􅀳竹十廋百搜今文作艘音騷􅂳總名廋當作搜漢溝洫志漕􅂳五作㮴也或以復封禮吳王得之曰以越僻狄作狹狄當之國無珍今舉其貢貨而以復禮此越小心念功不忘吳之效也夫越本興國千里吾雖封之未盡其國子胥聞之退臥於舎謂侍者曰吾君失其石室之囚縱於南林之中今但因虎豹之野而與荒外之草於吾之心其無損也吳王得葛布之獻乃復增越之封賜羽毛之飾机杖諸侯之服越國大悅采葛之婦傷越王用心之苦乃作苦之詩㑹稽賦註亦引此書曰乃作何苦之詩事􅀋賦引吳越春秋曰乃作若何之歌曰葛不連蔓棻台台貽音我君心苦命更之嘗膽不苦甘如飴所引皆作味若飴事􅀋賦及越舊經令我采葛以作絲飢不遑食四體疲一句文選註引采葛婦詩有闕文也此書無之女工織􅀆不敢遲弱於羅􅀆輕霏霏號絺素􅀆將獻之越王悅兮忘罪除吳王歡兮飛尺書增封益地賜羽竒机杖茵褥諸侯儀羣臣拜舞天顔舒我王何憂能不移於是越王内修其徳外布其道君不名敎臣不名謀民不名使官不名事國中蕩蕩無有政令越王内實府庫墾其田疇民富國彊衆安道泰越王遂師八臣與其四友時問政焉大夫種曰愛民而巳越王曰柰何種曰刑之無害成之無敗生之無殺與之無奪越王曰願聞種曰無奪民所好則利也民不失其時則成之省刑去罰則生之薄其賦歛則與之無多臺游則樂之靜而無苛則喜之民失所好則害之農失其時則敗之有罪不赦則殺之重賦厚歛則奪之多作臺游以罷疲音民則苦之勞擾民力則怒之有樂之無苦喜之無怒二句詳文意上文與之無奪以下當臣聞善爲國者遇民如父母之愛其子如兄之愛其弟聞有飢寒爲之哀見其勞苦爲之悲越王乃緩刑薄罰省其賦歛於是人民殷富皆有帯甲之勇九年正月越王召五大夫而告之曰昔者越國遁棄宗廟身爲窮虜耻聞天下辱流諸侯今寡人念吳猶躃者不忘走盲者不忘視􅀌未知䇿謀惟大夫誨之扶同曰昔者亡國流民天下莫不聞知今欲有計不宜前露其辭臣聞擊鳥之動故前俯伏字文衍此上八猛獸將擊必餌作弭餌當毛帖㐲鷙鳥將搏必卑飛戢翼聖人將動必順辭和衆聖人之謀不可見其象不可知其情臨事而伐故前無剽過之兵後無伏襲之患今大王臨敵破吳宜損少辭無令泄也臣聞吳王兵彊於齊􅀳而怨結於楚大王宜親於齊深結於􅀳隂固於楚而厚事於吳夫吳之志猛驕而自矜必輕諸侯而凌鄰國三國决權還爲敵國必角􅀔交爭越承其弊因而伐之可克也雖五帝之兵無以過此范蠡曰臣聞謀國破敵動觀其符孟津之㑹諸侯曰可武王辭之方今吳楚結讎構怨不解齊雖不親外爲其救􅀳雖不附猶效其義夫内臣謀而决讎其䇿鄰國通而不絶其援斯正吳之興霸諸侯之上尊臣聞峻髙者隤下墜也亦作傾葉茂者摧日中則移月滿則虧四時不並盛五行不俱馳隂陽更唱作倡唱當氣有盛衰故溢堤之水不淹其量熻乾之火不復其熾水靜則無漚瀴之怒火消則無熹毛之􅉯今吳乗諸侯之威以號令於天下不知德薄而恩淺道狹而怨廣權懸而智衰力竭而威折兵挫而軍退士散而衆觧臣請按師整兵待其壞敗隨而襲之兵不血刃士不旋踵吳之君臣爲虜矣臣願大王匿聲無見其動以觀其靜大夫苦成曰夫水能浮草木亦能沉之地能生萬物亦能殺之江海能下谿谷亦能朝之聖人能從衆亦能使之今吳承闔閭之軍制子胥之典敎政平未虧戰勝未敗大夫嚭者狂佞之人逹於䇿慮輕於朝事子胥力於戰伐死於諌議二人權必有壞敗願王虚心自匿無示謀計則吳可㓕矣大夫浩曰今吳君驕臣奢民飽軍勇外有侵境之敵内有爭臣之震其可攻也大夫句如皆作臯如左傳國語曰天有四時人有五勝勝而自以爲獲水徳之瑞前漢律歴志同五徳迭相勝也史歷書秦㓕六國頗推五昔湯武乗四時之利而制夏殷桓繆據五勝之便而列六國此乗其時而勝者也王曰未有四時之利五勝之便願各就職也吳越春秋勾踐歸國外傳第八
