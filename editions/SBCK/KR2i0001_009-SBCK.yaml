body:
  text: 吳越春秋勾踐隂謀外傳第九越王勾踐十年二月越王深念逺思侵辱於吳􅀩天祉福得有返字得下當越國羣臣敎誨各畫一䇿辭合意同勾踐敬從其國已富反越五年未聞敢死之犮或謂諸大夫愛其身惜其軀者乃登漸臺望觀其羣臣有憂與否相國范蠡大夫種句如之屬儼然列坐雖懷憂患不形顔色越王即鳴鍾驚檄作警驚疑當而召羣臣與之盟曰寡人獲辱受恥上愧周王下慙􅀳楚幸􅀩諸大夫之䇿得返國修政富民養士而五年未聞敢死之士雪仇之臣柰何而有功乎羣臣黙然莫對者越王仰天歎曰􅀌聞主憂臣辱主辱臣死今􅀌親被奴虜之厄受囚破之恥不能自輔須賢任仁然後討吳重􅀒諸臣大夫何易見而難使也於是計􅒍年少官卑列坐於後乃舉手而趨蹈席而前進曰謬哉吾王之言也非大夫易見而難使君王之不能使也越王曰何謂計􅒍曰夫官位財幣金賞者君之所輕也操鋒履刃艾刈音命􅄬死者士之所重也今王易字之誤吝同易字不通疑財之所輕而責士之所重何其殆哉於是越王黙然不悅面有愧色即辭羣臣進計􅒍而問曰􅀌之所得士心者何等計􅒍對曰夫君人尊其仁義者治之門也士民者君之根也開門固根莫如正身正身之道謹左右左右者君之所以盛衰者也願王明選左右得賢而已昔太公九聲而足或恐字誤其義未詳磻溪之餓人也西伯任之而王管仲魯之亡囚有貪分之毁多自與鮑叔不以我爲貪知我貧也管仲曰吾始困時嘗與鮑叔賈分財利齊桓得之而霸故傳曰失士者亡得士者昌願王審於左右何患羣臣之不使也越王曰吾使賢任能各殊其事􅀌虛心高望冀聞報復之謀今咸匿聲隱形不聞其語厥咎安在計􅒍曰選賢實士各有一等逺使以難以難事平聲試以效其誠内告以匿以知其信與之論事以觀其智飲之以酒以視其亂酒無量不及亂酒能亂性論語唯指之以使指事使人也曲禮耆指使註以察其能示之以色以别其熊五色以設士盡其實人竭其智知其智盡實則君臣何憂越王曰吾以謀士效實人盡其智而士有未盡進辭有益寡人也計􅒍曰范蠡明而知内文種逺以見外願王請大夫種與深議則霸王之術在矣越王乃請大夫種而問曰吾昔日受夫子之言自免於窮厄之地今欲奉不覊之計以雪吾之宿讎何行而功乎大夫種曰臣聞髙飛之鳥死於美食深泉之魚死於芳餌今欲伐吳必前求其所好參其所願然後能得其實越王曰人之所好雖其願何以定而制之死乎大夫種曰夫欲報怨復讎破吳㓕敵者有九術七術􅊨史記作君王察焉越王曰寡人被辱懷憂内慙朝臣外愧諸侯中心迷惑精神空虚雖有九術安能知之大夫種曰夫九術者湯文得之以王桓穆得之以霸其攻城取邑易於脫屣願大王覽之種曰一曰尊天事􅀑文亦兼􅀑神言之􅀑下當有神字下以求其福二曰重財幣以遺也下同去聲贈其君多貨賄以喜其臣三曰貴糴粟槀以虚其國利所欲以疲其民四曰遺美女以惑其心而亂其謀五曰遺之巧工良材使之起宫室以盡其財六曰遺之䛕臣使之易伐七曰彊其諌臣使之自殺八曰君王國富而備利器九曰利甲兵以承其弊凡此九術君王閉口無傳守之以神取天下不難而况於吳乎越王曰善乃行第一術立東郊以􅀕陽名曰東皇公立西郊以􅀕隂名曰西王母􅀕陵山於㑹稽陵之山陵山禹稱陵陵之名自漢始先秦古書帝王冢皆不祀水澤於江州西境楚東境越不得祀今之江州春秋時爲吳越遼逺亦非當時祀水澤之地州字義當作洲按說文州渚也字本作水澤於其地兼晋以前亦未有江州之名蜀之巴郡古有江州縣又去後人加水以别州縣之字州水中可居者州今作洲蓋事􅀑神一年國不被災越王曰善哉大夫之術願論其餘種曰吳王好起宫室用工不輟王選名山神材奉而獻之越王乃使木工三千餘人入山伐木一年師無所幸作士之士工作思歸皆有怨望之心而歌木客之吟勾踐使水經註得歸工人憂思作木客吟工人伐榮楯欲以獻吳乆不一夜天生神木一􅀟大二十圍長五十尋陽爲文梓隂爲楩柟巧工施校制以規繩雕治圓轉刻削磨礱分以丹青錯畫文章嬰以白璧鏤以黃金狀􅀋龍蛇文彩生光乃使大夫種獻之於吳王曰東海􅃥臣臣􅀌勾踐使臣種敢因下吏聞於左右頼大王之力竊爲小殿有餘材謹再拜獻之吳王大恱天生神木徐天祐曰嘗以其木致於吳而行人之辭乃曰東海役臣獻爲殿之餘材甚不假日夜之所息一夕而大二十圍長五十尋有是哉使兹事而信越夫旣天之産材若是其異人之致飾若是其都而名之曰餘材則非所以禮吳而示有先也且越有五臺未嘗敢上吳王以爲畏法服威奉吳何越之失言而吳之易恱耶越之爲殿亦已忲矣而特以其遺餘子胥諌曰王勿受也昔者桀起靈臺紂起鹿臺隂陽不和寒暑不時五榖不熟天與其災民虛國變遂取㓕亡大王受之必爲越王所戮吳王不聽遂受而起姑蘇之臺三年聚材五年乃成髙見二百里而新作於夫差臺始基於闔廬丈廣八十四丈吳地記曰髙三百行路之人道死巷哭不絶嗟嘻之聲民疲士苦人不聊生越王曰善哉第二術也十一年越王深念永思惟欲伐吳乃請計􅒍問曰吾欲伐吳恐不能破早欲興師惟問於子計􅒍對曰夫興師舉兵必且内蓄五榖實其金銀滿其府庫勵其甲兵凡此四者必察天地之氣原於隂陽明於􅀌虚虚法甲子旬中無戌亥戌亥即爲􅀌辰史􅀛䇿傳日辰不全故有􅀌虚六甲􅀌可以􅀋推劉歆七畧有風􅀱􅀌虛二十卷巳即爲虚蓋旬空爲􅀌對衝爲虚餘五旬審於存亡乃可量敵越王曰天地存亡其要柰何計􅒍曰天地之氣物有死生原隂陽者物貴賤也明􅀌虚者知㑹際也審存亡者别眞僞也越王曰何謂死生眞僞乎計􅒍曰春種八榖夏長而養秋成而聚冬畜而藏夫天時有生生當作春生以四時言則有而不救種是一死也夏長無苖二死也秋成無聚三死也冬藏無畜四死也雖有堯舜之徳無如之何夫天時有生勸者老作者少反氣應數不失厥理一生也留意省察謹除苗穢穢除苗盛二生也前時設備物至則􅀵國無逋稅民無失穗三生也倉已封塗除陳入新君樂臣歡男女及信四生也夫隂陽者太隂所居之歲留息三年貴賤見矣夫􅀌虛者謂天門地户也存亡者君之道德也越王曰何子之年少於物之長也計􅒍曰有美之士不拘長少越王曰善哉子之道也乃仰觀天文集察緯宿星亦曰五緯宿音秀列星也天象定者爲經動者爲緯故五曆象四時以下者上虚設八倉從隂􅀵著置也陟畧切望陽出糶筴作䇿筴通其極計三年五倍越國熾富勾踐歎曰吾之霸矣善計􅒍之謀也十二年越王謂大夫種曰􅀌聞吳王滛而好色惑亂沉湎不領政事因此而謀可乎種曰可破夫吳王滛而好色宰嚭佞以曵心往獻美女其必受之惟王選擇美女二人而進之越王曰善乃使相者國中得苧蘿山鬻薪之女曰西施鄭旦所居十道志勾踐索美女以獻吳王得之諸曁苧蘿山賣薪女也西㑹稽志苧蘿山在諸曁縣南五里輿地志諸曁縣苧蘿山西施鄭旦浣沙石施山下有飾以羅榖教以容歩習於土城在㑹稽縣東越舊經土城里六臨於都巷三年學服而獻於吳乃使相國范蠡進曰越王勾踐竊有二遺女越國洿下困迫不敢稽留謹使臣蠡獻之大王不以鄙陋􅃦容作侵史魏其傳武安貌侵短小謂醜惡也貌不􅀭曰􅃦通作㾛廣韻㾛陋又貌醜或願納以供箕箒之用吳王大悅曰越貢二女乃勾踐之盡忠於吳之證也子胥諫曰不可王勿受也臣聞五色令人目盲五音令人耳聾昔桀易湯而滅紂易文王而亡大王受之後必有殃臣聞越王朝書不倦晦誦竟夜且聚敢死之士數萬是人不死必得其願越王服誠行仁聽諌進賢是人不死必成其名越王夏被毛裘冬御絺綌是人不死必爲對􅂩臣聞賢士國之寳美女國之咎夏亡以妹喜殷亡以妲己周亡以襃姒喜女焉有寵而亡夏紂桀伐有施有施氏以妹焉有寵生伯服逐太子宜臼太子奔申申人與繒西戎攻幽王周於是乎伐有蘇有蘇氏以妲己女焉有寵而亡殷幽王伐有襃有褒人以襃姒女喜音嬉亡妹音末吳王不聽遂受其女越王曰善哉第三術也十三年越王謂大夫種曰􅀌􅀩子之術所圖者吉未嘗有不合也今欲復謀吳柰何種曰君王自陳越國微鄙年榖不登願王請糴以入其意天若棄吳必許王矣越乃使聲上大夫種使聲去吳因宰嚭求見吳王辭曰越國洿下水旱不調年榖不登人民飢乏道荐飢餒願從大王請糴來歲即復太倉惟大王救其窮窘吳王曰越王信誠守道不懷二心今窮歸愬吾豈愛惜財寳奪其所願子胥諌曰不可非吳有越越必有吳吉往則凶來是養生寇而破國家者也與之不爲親不與未成􅁈且越有聖臣范蠡勇以善謀將有修飾攻戰以伺吾間下同去聲觀越王之使使來請糴者非國貧民困而請糴也以入吾國伺吾王間也吳王曰寡人卑服越王而有其衆懷其社稷以愧勾踐勾踐氣服爲駕車却行馬前諸侯莫不聞知今吾使之歸國奉其宗廟復其社稷豈敢有反吾之心乎子胥曰臣聞士窮非難抑心下人其後有激人之色臣聞越王飢餓民之困窮可因而破也今不用天之道順地之理而反輸之食固君之命狐雉之相戯也夫狐卑體而雉信之故狐得其志而雉必死可不愼哉吳王曰勾踐國憂而寡人給之以粟恩往義來其德昭昭亦何憂乎子胥曰臣聞狼子有野心仇讎之人不可親夫虎不可餧以食蝮虺善螫人蟲名一曰蛇不恣其意今大王􅂢國家之福以饒無益之讎棄忠臣之言而順敵人之欲臣必見越之破吳豸疑當作豕蟲無足曰豸鹿游於姑胥之臺荆榛蔓於宫闕願王覽武王伐紂之事也太宰嚭從旁對曰武王非紂王臣也率諸侯以伐其君雖勝殷謂義乎子胥曰武王即成其名矣太宰嚭曰親戮主以爲名吾不忍也子胥曰盗國者封侯盗金者誅令使武王失其理則周何爲三家之表謂意之墓表商容之閭也釋箕子之囚封比干太宰嚭曰子胥爲人臣徒欲干君之好咈君之心以自稱聲去滿君何不知過乎子胥曰太宰嚭固欲以求其親前縱石室之囚受其寳女之遺聲去外交敵國内惑於君大王察之無爲羣小所侮今大王譬若浴嬰兒雖啼無聽宰嚭之言吳王曰宰嚭是子無乃聞寡人言非忠臣之道􅀋於佞䛕之人太宰嚭曰臣聞鄰國有急千里馳救是乃王者封亡國之後五霸輔絶㓕之末者也吳王乃與越粟萬石而令之曰寡人逆羣臣之議而輸於越年豐而歸寡人大夫種曰臣奉使返越歲登誠還吳貸大夫種歸越越國羣臣皆稱萬歲即以粟賞賜羣臣及於萬民二年越王粟稔揀擇精粟而蒸還於吳復還斗斛之數亦使大夫種歸之吳王王得越粟長太息謂太宰嚭曰越地肥沃其種甚嘉可留使吾民植之於是吳種越粟粟種殺而無生者吳民大飢越王曰彼以窮居其可攻也大夫種曰未可國始貧耳忠臣尚在天氣未見須俟其時越王又問相國范蠡曰􅀌有報復之謀水戰則乗舟陸行則乗輿輿舟之利頓於兵弩今子爲寡人謀事莫不謬者乎范蠡對曰臣聞古之聖君莫不習戰用兵然行陣隊伍軍鼓之事吉凶决在其工今聞越有處女出於南林南林在越舊經縣南山隂國人稱善願王請之立可見越王乃使使聘之問以劒㦸之術處女將北見於王道逢一翁自稱曰袁公問於處女吾聞子善劒願一見之女曰妾不敢有所隱惟公試之於是袁公卽杖箖箊竹切吳都賦其竹則篔簹箖箊箖箊竹名箖直尋切箊央魚竹枝上頡橋未墮地女卽捷末公卽挽林内之竹似枯槁未折墮地女接取其未按藝文􅀋聚引吳越春秋䖏女善劒事與此小異曰􅀽子生接以太牢左傳子同生接以太牢註並音捷此書未字當作未捷通作接易晝日三接禮記太􅀽公則飛上樹變爲白猿遂别去見越王越王問曰夫劒之道則如之何女曰妾生􅀷林之中長於無人之野無道不習不逹諸侯竊好擊之道誦之不休妾非受於人也而忽自有之越王曰其道如何女曰其道甚微而易其意甚幽而深道有門户亦有隂陽開門閉户隂衰陽興凡手戰之道内實精神外示安儀見之似好婦奪之似懼虎布􅄱候氣與神俱往杳之若日偏如滕作騰滕當兎追􅄱逐影光若彿彷呼吸往來不及法禁縱橫逆順􅀡復不聞斯道者一人當百百人當萬王欲試之其驗卽見越王卽加女號號曰越女乃命五板之墮長高習之敎軍士五版爲堵五堵爲雉版亦作板詩註一丈爲版五版爲堵左傳是上聲高或人名也此墮字疑當作隊長疑當世有莫能二字勝字上疑當勝越女之劒於是范蠡復進善射者陳音音楚人也越王請音而問曰􅀌聞子善射道何所生音曰臣楚之鄙人嘗歩於射術未能悉知其道越王曰然願子一二其辭音曰臣聞弩生於弓弓生於彈彈起古之孝子越王曰孝子彈者柰何音曰古者人民朴質飢食鳥獸渴飮霧露死則裹以白茅􅄬於中野孝子不忍見父母爲禽獸所食故作彈以守之絶鳥獸之害故歌曰斷竹續竹飛土逐害之謂也於是神農皇帝作黃皇當弦木爲弧剡木爲矢牟夷作矢世本黃帝臣弧矢之利以威四方黃帝之後楚有弧父弧父者生於楚之荆山生不見父母爲兒之時習用弓矢所射無脫以其道傳於羿羿傳逢􅀩逢􅀩傳於楚琴氏琴氏以爲弓矢不足以威天下當是之時諸侯相伐兵刄交錯弓矢之威不能制服琴氏乃橫弓着臂施機設樞名之曰機言機巧也亦言如門户之樞機開闔有節釋名弩柄曰臂鈎弦曰牙牙外曰郭郭下有懸刀合而加之以力然後諸侯可服琴氏傳之楚三侯但云琴氏傳大魏大魏文選註所引與此畧同少異耳傳楚三侯所謂句亶鄂章人號麋侯翼侯魏侯也執疪爲越章王三侯者未僭王號時所稱也熊渠三子長子康爲句亶王紅爲鄂王少子自楚之三侯傳至靈王自稱之楚累世蓋以桃弓棘矢而備鄰國也弧棘矢以共禦王事楚右尹子革曰唯是桃自靈王之後射道分流百家能人用莫得其正臣前人受之於楚五世於臣矣臣雖不明其道惟王試之越王曰弩之狀何法焉陳音曰郭爲方城守臣子也教爲人君命所起也牙爲執法守吏卒也牛爲中將主内裹也關爲守禦檢去止也錡爲侍從聽人主也臂爲道路通所使也弓爲將軍主重負也弦爲軍師禦戰士也矢爲飛客主教使也金爲實敵往不止也衛爲副使正道里也又爲受教知可否也縹爲都尉執左右也敵爲百死不得駭也鳥不及飛獸不暇走弩之所向無不死也臣之愚劣道悉如此越王曰願聞正射之道音曰臣聞正射之道道衆而微古之聖人射弩未發而前名其所中中也射命臣未能如古之聖人請悉其要夫射之道身若戴板頭若激􅆑左蹉右足橫句左手若附枝右手若抱兒舉弩望敵翕心咽煙與氣俱發得其和平神定思去去止分離右手發機左手不知一身異教豈况雄雌此正射持弩之道也願聞望敵儀表投分聲平飛矢之道音曰夫射之道從分望敵合以參連參連前放一矢周禮五射二曰續而去也後三矢連弩有斗石矢有輕重石取一兩其數乃平遠近高下求之銖分道要在斯無有遺言越王曰善盡子之道願子悉以教吾國人音曰道出於天事在於人人之所習無有不神於是乃使陳音教士習射於北郊之外三月軍士皆能用弓弩之巧陳音死越王傷之葬於國西號其葬所曰陳音山宇記曰屬上虞縣非也在山隂縣西南四里寰吳越春秋勾踐隂謀外傳第九
