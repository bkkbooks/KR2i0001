body:
  text: 吳越春秋吳王壽夢傳第二壽夢元年夢已下始有其年史記索隠曰自夀朝周適楚觀諸侯禮樂魯成公會於鍾離公十五年以史記年表考之是為夀夢十鍾離之㑹吴始與中國接事見春秋魯成之國漢置鍾離縣属九江今屬濠州五年此以為元年何也鍾離古塗山氏深問周公禮樂成公悉爲陳前王之禮樂因爲詠歌三代之風壽夢曰孤在夷蠻徒以椎髻爲俗豈有斯之服哉因歎而去曰於乎哉禮也二年楚之亡大夫申公巫臣也子靈適吳以爲行人敎吳射御導之伐楚反而奔晉自晉請使吳教吳用兵見左傳成公七年按巫臣怨楚子也行人掌國賔客之禮籍以待四方之使叛楚使其子狐庸為吳行人非巫臣為行人楚莊王怒使子反將聲去敗吳師二國從斯結讎於是吳始通中國而與諸侯爲敵之始大通吳扵上國蠻夷屬楚者吳盡取五年伐楚敗子反十六年楚㳟作共左傳王怨吳爲巫臣伐之也乃舉兵伐吳至衡山而還杜預曰衡山在吳興烏程縣南楚歸三見左傳襄公三年楚克鳩兹至于衡山取駕此不書日吳人伐楚十七年壽夢以巫臣子狐庸爲相任以國政二十五年壽夢病將卒有子四人長曰諸樊次曰餘祭界切祭側次曰餘昧葛切昧莫次曰季札季札賢壽夢欲立之季札讓曰禮有舊制奈何廢前王之禮而行父子之私乎壽夢乃命諸樊曰我欲傳國及札爾無忘寡人之言諸樊曰周之太王知西伯之聖廢長立少王之道興今欲授國於札臣誠耕於野王曰昔周行之德加於四海今汝於區區之國荆蠻之鄉奚能成天子之業乎且今子不忘前人之言必授國以次及于季札諸樊曰敢不如命壽夢卒子乗卒左傳書夀夢卒杜預曰見春秋襄公十二年秋九月吳子之號夀夢呉諸樊以適正出也適通作嫡長攝行事當國政吳王諸樊元年在位十三年卒是為襄公二十五年此書止載史記年表呉諸樊元年為魯襄公十三年諸樊皆不書元年事餘已除喪讓季札曰昔前王未薨之時嘗晨昧不安吾望其色也意在於季札又復三朝悲吟而命我曰吾知公子札之賢欲廢長立少重發言於口雖然我心已許之然前王不忍行其私計以國付我我敢不從命乎今國者子之國也吾願達前王之義季札謝曰夫適嫡長當國非前王之私乃宗廟社稷之制豈可變乎諸樊曰苟可施於國何先王之命有句太王改爲季歷二伯來入荆蠻遂城爲國周道就成前人誦之不絶於口而子之所習也札復謝曰昔曹公卒公宣庻存適亡子而自立是為成公嫡亡者公子負芻殺太諸侯與曹人不義而立於國子臧芻皆宣公庶子公子欣時也與負聞之行吟而歸曹君懼将立子臧子臧去之以成曹之道左見遂逃奔宋明年反自宋盡致其邑與卿而不出傳魯成公十五年諸侯将見于臧於王而立之札雖不才願附子臧之義吾誠避之呉人固立季札季札不受而耕於野吳人舍聲上之諸樊驕恣輕慢鬼神仰天求死将死命弟餘祭曰必以國及季札乃封季札於延陵號曰延陵季子延陵為毘陵縣晉為毘陵延陵季札之采邑也漢改郡今常州也郡又為晉陵餘祭十二年楚靈王會諸侯伐吳圍朱方誅慶封慶封數爲吳伺祭作察祭當故晉楚伐之也吳王餘祭怒曰慶封窮來奔吳封之朱方八年慶封奔吳左傳襄公二十卒則二十八年賜慶封邑不得是夷昧但句餘或别是一人今按春秋吳句餘予之朱方杜預云句餘吳子夷昧也索隠曰餘祭以二十九年為一人矣世家年表皆在餘祭三年即襄公二十八年也年表旣云餘於明年書閽弑吳子餘祭又年表餘祭四年守閽殺餘祭則句餘非别十七年亦改從四年可也朱方吳邑秦改丹徒今屬鎮江祭四年卒此乃書十二年何也十二十三年皆當刪十字以効不恨士也卽舉兵伐楚取二邑而去十三年楚怨吳爲慶封故伐之心恨不解伐吳至乾谿縣南楚東境在譙國城父吳擊之楚師敗走十七年餘祭卒餘昧立四年卒欲授位季札季札讓逃去曰吾不受位明矣昔前君有命已附子臧之義潔身清行仰高履尚惟仁是處富貴之於我如秋風之過耳遂逃歸延陵吳人立餘昧子州于號爲吳王僚也吳越春秋吳王夀夢傳第二
