front:
  text: 呉越春秋吳太伯傳第一
  hash: sha256:f67ac974e5045de54526343149a5366c5dbb5a3b66f4a1aa8af116b796a7ad43
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2i0001_SBCK_001-1a}
body:
  text: 後漢趙曄撰呉之前君太伯者泰伯論語作后稷之苗裔也后稷其母台氏之女姜嫄姓封邰國晉語曰黄帝以姬水成炎帝以韓詩章句姜姓嫄字說文邰炎帝之後姜台作邰邰國在京兆武功縣所治釐城漢地理志作斄與邰同姜水成故黄帝為姬炎帝為姜是姜者炎帝之姓史記嫄作原爲帝嚳元妃年少未孕出㳺於野見大人跡而觀之中心歡然喜其形像因履而踐之身動意若爲人所感後姙娠恐被淫泆之禍遂祭祀以求謂無子履上帝之跡履帝武是也詩生民篇所謂天猶令有之姜嫄怪而棄于阨狹之巷牛馬過者折作辟折疑當易而避之巷牛羊腓字之詩云誕置之隘復棄于林中適㑹伐木之人多林㑹伐平林詩云誕置之平復置于澤中冰上衆鳥以羽覆之云詩鳥覆翼之誕置之寒氷后稷遂得不死姜嫄以爲神收而養之長因名棄爲兒時好種樹種也樹亦禾黍桑麻五榖相聲去五土之宜靑赤黃黑陵地陸水高下粢稷黍禾蕖麥豆稻各得其理堯遭洪水人民泛濫遂作逐遂疑當高而居堯聘棄使敎民山居隨地造區研也窮營種之術三年餘行人無飢乏之色乃拜棄爲農師封之台號爲后稷姓姬氏后稷就國爲諸侯卒子不窋立曰不窋故城在慶州弘化縣南三里帝王世紀后稷納姞氏生不窋括地志遭夏氏世衰失官奔戎狄之間其孫公劉窋卒子鞠周本紀不公劉立立鞠卒子公劉慈仁行不履生草運車以避葭葦公劉避夏桀於戎狄變易風俗民化其政公劉卒子慶節立其後八世而得古公亶甫僕皇僕子慶節子皇圉世本作亞圉雲都皇甫謐曰雲都亞圉字亞圉子公叔祖類公叔差弗差弗子毁隃世本隃作榆毁隃子公非公非子髙圉髙圉子亞作父甫父通自慶節至是為八世祖類子古公亶甫毛詩史記甫皆脩公劉后稷之業積德行義爲狄人所慕薫鬻戎姤而伐之獯鬻史記作薫鬻孟子作作葷粥音同薫肓漢匈奴傳古公事之以犬馬牛羊其伐不止事以皮幣金玉重寳而亦伐之不止古公問何所欲曰欲其土地古公曰君子不以養害害所養所以養人者害人孟子曰君子不以其國所以亡也而爲身害吾所不居也古公乃杖䇿去邠踰梁山而處岐周新平􅃮徐廣曰曰岐山在扶風羙陽西北其南有周原顔師古曰梁山在夏陽岐山在縣東北有豳亭杜預云豳在新平􅃮縣東北索隠曰豳即邠也又徐廣山縣箭括嶺也羙陽即今岐州岐曰彼君與我何異邠人父子兄弟相帥負老携幼掲釡甑而歸古公居三月成城郭一年成邑二年成都而民五倍其初古公三子長曰太伯次曰仲雍雍一名吳仲虞仲史記作少曰季歷歴即王季也太姜生少子季季歷娶妻太任氏摯仲氏任毛氏箋音泰壬詩大明篇任列女傳太任摯任氏之中女摯國任姓仲中女也史記作太生子昌昌有聖瑞命驗曰季尚書緯帝戸其書云云此盖聖瑞丹書文多不載秋之月中子赤爵㗸丹書入于酆止于昌古公知昌聖欲傳國以及昌曰興王業者其在昌乎因更名曰季歷太伯仲雍望風知指曰歷者適也知古公欲以國及昌古公病二人託名採藥於衡山岳南遂之荆蠻斷髮文身爲夷狄之服示不可用古公卒太伯仲雍歸赴喪畢還荆蠻國民君而事之自號爲勾吳師古註夷俗語發聲猶越為干越也漢地理志太伯奔荆蠻號曰勾呉顔呉人或問何像作據像疑當而爲勾吳太伯曰吾以伯長居國絶嗣者也其當有封者吳仲也故自號勾吳非其方乎荆蠻義之從而歸之者千有餘家共立以爲勾吳數年之間民人殷富遭殷之末世衰中國侯王數用兵恐及於荆蠻故太伯起城周三里二百歩外郭三百餘里在西北隅名曰故吳伯太里平墟今無錫縣境所都謂之吳城在梅人民皆耕田其中古公病將卒令季歷讓國於太伯而三讓不受故云太伯三以天下讓於是季歷蒞政脩先王之業守仁義之道季歷卒子昌立號曰西伯周自后稷封爲王者之後按孔叢子羊容問子思曰殷帝乙之時王季以九命作伯扵西受圭瓉秬鬯之賜故文王因之至太王王季文王此爲諸侯奚得為西伯乎子思曰吾聞諸子夏曰召公分陜謂之召伯也得專征伐此諸侯爲伯猶遵公劉古公之術業於養老天下歸之西伯致太平伯夷自海濱而往西伯卒太子發立王名發武任周召召公奭周公旦而伐殷天下已安乃稱王追謚古公爲大王追封太伯於吳太伯祖卒葬於梅里平墟皇山有太伯冡去墓十里有舊宅其即太伯故城之地劉昭云無錫縣東聚二說不同此云平墟當以劉說爲正井猶存皇覽云太伯墓在呉縣北梅里仲雍立是為呉仲雍仲雍卒子季簡簡子叔達達子周章章子熊熊子遂遂子柯相相子彊鳩夷夷子餘喬疑吾吾子柯廬廬子周繇繇子屈羽羽子夷吾吾子禽處處子專專子頗高高子句畢立作熊遂喬作橋廬史記世家熊子遂史考作柯轉畢作卑作盧專作轉譙周古是時晉獻公滅周北虞虞公以開晉之伐虢氏畢子去齊齊子壽夢立公切史記夢左傳莫同正義而吳益彊稱王凡從太伯至壽夢之世與中國時通朝會而國斯霸焉吳越春秋吳太伯傳第一
