front:
  text: 吳越春秋越王無余外傳第六
  hash: sha256:fd702d5731dffef3f9aaea5e308e25f9c37a753b5304474cd4fe001661ed3950
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2i0001_SBCK_006-1a}
body:
  text: 後漢趙瞱撰越之前君無余者也初受封於越越舊經作無餘無余禹之六世孫少康之庶子夏禹之末封也禹父鯀者帝顓頊之後顓頊之子字熈連帝王世紀曰鯀帝以鯀為顓頊子漢律歷志則曰顓頊五世而生鯀通鑑外紀從之古史山易曰鯀封於崇故國語謂之崇伯鯀史記曰鯀之父帝顓頊世本亦近得之此書以爲顓頊之後曰後者可以通子孫言之也曰太史公以鯀爲顓頊之子其世太廹班同以為五世孫鯀娶於有莘氏之女名曰女嬉年壯未孳嬉於砥山得薏苡而吞之意若爲人所感因而姙孕剖脅而産髙密禹所封國世紀曰鯀妻脩已見流星貫昴夢接意感又吞世本曰鯀娶有辛氏女謂之女志是生髙密宋忠曰髙密之名孔安國謂禹爲名張晏謂禹爲字今並存之神珠薏苡而生禹名文命字密史記以文命爲禹家于西羗地曰石紐石紐在蜀西川也郡人相傳禹以六月六日生在茂州石泉縣其地有禹廟註縣有石紐鄉禹所生也廣柔即今石泉軍元和郡縣志禹汝山廣柔人生於石紐村水經帝堯之時遭洪水滔滔天下沉漬九州閼塞四瀆壅閉帝乃憂中國之不康悼黎元之罹咎乃命四嶽乃舉賢良將任治水自中國至于條方莫薦人帝靡所任四嶽乃舉鯀而薦之於堯帝曰鯀負命毁族不可負音佩違也鯀性狠戾違負教命毁敗善類不可用也尚書堯典作方命圯族史記堯本紀作負命毁族正義曰四嶽曰等之羣臣未有如鯀者堯用治水受命九載功不成帝怒曰朕知不能也乃更求之得舜使攝行天子之政巡狩觀鯀之治水無有形狀乃殛鯀于羽山縣南今海州朐山縣地志在東海郡祝其鯀投于水化爲黃能熊或作因爲羽淵之神寢門子産曰昔堯殛鯀於羽山其神化左傳昭公七年晋侯有疾夢黄熊入於足鼈也按說文及字林皆云能熊屬足似鹿然則能旣熊屬又爲鼈類爲黄熊以入于羽淵杜預解熊音雄獸名亦作能如字一音奴來切三熊白及鼈爲膳豈鯀化爲二物乎作能者勝也東海人祭禹廟不用舜與四嶽舉鯀之子髙密四嶽謂禹曰舜以治水無功舉爾嗣考之勲禹曰俞小子敢悉考績以統天意惟委有任字委字下當而已禹傷父功不成循江泝河盡濟甄曁字之誤甄字不通疑淮乃勞身焦思以行七年聞樂不聽過門不入冠挂不顧履遺不躡功未及成愁然沉思乃案黃帝中經曆蓋聖人所記曰在于九山東南天柱號曰宛委五里一名玉笥山在㑹稽縣東南十赤帝在闕其巖之巔承以文玉覆以磐石其書金簡青玉爲字編以白銀皆瑑其文禹乃東巡登衡嶽血白馬以祭不幸所求禹乃登山仰天而嘯因夢見赤繡衣男子自稱玄夷蒼水使者聞帝使文命于斯故來候之非厥歲月将告以期無爲戲吟故倚歌覆釡之山作釜史黄帝本紀曰合符釜山索隱以爲合諸侯符契圭璋輿地志㑹稽山有石狀如覆鬴謂之覆鬴山一名釡山鬴亦縣北三里非此之釡山也而朝之於釡山在嬀州懐戎東顧謂禹曰欲得我山神書者齋於黃帝巖嶽之下三月庚子登山發石金簡之書存矣禹退又齋三月庚子登宛委山發金簡之書案金簡玉字得通水之理禹未嘗兩徐天祐曰禹治水時未嘗親至南方故也孟子曰禹八年于外而禹貢云作十有至越其至越在㑹計之時非治水時也禹貢記南方山川多與今不合三年而八州平是十二年而八州平十三年而兖州平兖州平在舜受三載乃同或者以爲比禹治水之年通鯀九載言之也馬融曰禹治水及成乃東巡登宛委發金簡之書得通水之理使禹之治水七年而後終之年然則禹之成功不過三四年間耳此書謂勞身焦思七年功未脱乎諸若此類蓋傳疑尚矣得神書始知通水之理不已復返歸嶽乗四載乗船泥行乗橇陸行乗車水行蕝捲丘遥切山行乗攆橇音以行川始於霍山岱衡與霍皆一山二名南嶽衡山又名霍山泰與徊集五嶽詩云信彼南山惟禹甸之遂巡行四瀆與益䕫共謀行到名山大澤召其神而問之山川脉理金玉所有鳥獸昆蟲之類及八方之民俗殊國異域土地里數使益䟽而記之故名之曰山海經禹三十未娶行到塗山縣西北四十五里蘇㑹稽志塗山在山隂氏昭公四年傳穆有塗山之㑹哀公七年傳禹合諸侯于塗山杜預觧鶚演義塗山有四一㑹稽二渝州巴南舊江州三濠州四當塗縣按左法復㑹于是山然則禹與穆王皆嘗㑹諸侯於塗山矣然非必皆壽春並云在壽春東北説者曰今濠州也栁宗元塗山銘序曰周穆遐追遺廟塗君祠廟銘存焉常璩庾仲雍並言禹娶於此越絶等書乃云禹娶也若禹之所娶則未詳何地水經注江州縣水北岸有塗山南有夏禹蓋㑹稽實禹㑹侯計功之地非所娶之國下文兼載白狐九尾之異尤一㑹稽塗山應劭曰在永興北永興今蕭山縣也又與郡志所載不同疑爲可恐時之暮失其度制乃辭云吾娶也必有應矣乃有白狐九尾造於禹禹曰白者吾之服也其九尾者王之證也塗山之歌曰綏綏白狐九尾痝痝我家嘉夷來賔爲王成家成室我造彼昌天人之際於兹則行明矣哉禹因娶塗山謂之女嬌取辛壬癸甲私害公自辛至甲四日復往治水吕氏春秋曰禹娶塗山氏女不以禹行十月女嬌生子啓啓生不見父晝夕􅈱􅈱啼泣禹行使大章歩東西竪亥度南北步自東極至于西淮南子禹使太章慎曰太章竪亥善行人皆禹臣垂竪亥歩自南極盡於北垂許暢八極之廣旋天地之數禹濟江南省水理黃龍負舟舟中人怖駭禹乃啞卦笑言啞啞音同烏格切笑聲易震然而笑曰我受命於天竭力以勞萬民生性也死命也爾何爲者顔色不變謂舟人曰此天所以爲我用龍曵尾舎舟而去南到計於蒼梧於九疑今九疑山在道州寕逺縣南六十里亦名檀弓舜葬于蒼梧之野史記舜死於蒼梧之野葬山蒼梧而見縛人禹捬其背而哭益曰斯人犯法自合如此哭之何也禹曰天下有道民不罹辜天下無道罪及善人吾聞一男不耕有受其飢一女不桑有受其寒吾爲帝統治水土調民安居使得其所今乃罹法如斯此吾得薄不能化民證也故哭之悲耳於是周行㝢内東造絶迹西延積石西南今鄯州龍支縣界地志在金城郡河關縣南踰赤㟁白石山名廣陽水經新安縣南赤㟁水山水曰北過寒谷居之吹律而温氣至左思賦寒谷豊黍吹律以劉向别録燕有黍谷地羙而寒不生五穀鄒子之煖徊崑崙圃一名閬風上曰層城一名天庭地理志在臨羗西即崑崙説曰崑崙之山三級下曰樊桐一名板松中曰玄所出河源察六扈脉地理名金石寫流沙於西隅理地西八十里其沙隨風流行故曰流沙志流沙在居延西北柱佑曰在沙州决弱水於北漢在張液郡刪地理志弱水投之則委靡墊没及底而後止故曰弱丹縣柳宗元曰水散渙無力不能負芥青泉赤淵分入洞穴通江東流至於碣石縣西南今平州之南地志在北平郡驪戎䟽九河於涽淵開五水於東北鑿龍門今河中府龍門縣地志在馮翊夏陽縣闢伊闕對望之若闕伊水歴其間北流故曰伊闕在洛陽西南五十里禹䟽以通水兩山相平易相土觀地分州殊方各進有所納貢民去崎嶇歸於中國堯曰俞以固冀於此乃號禹曰伯禹官曰司空賜姓姒氏領統州伯以巡十二部堯崩禹服三年之䘮如䘮考妣晝哭夜泣氣不屬聲堯禪位于舜舜薦大禹改官司徒内輔虞位外行九伯舜崩禪位命禹禹服三年形體枯槁面目黎黒讓位啇均退處陽山之南潁川陽城是也史記註劉熈曰今隂阿之北萬民不附啇均追就禹之所狀若驚鳥揚天駭魚入淵晝歌夜吟登高號呼曰禹棄我如何所戴禹三年服畢哀民不得已卽天子之位三載考功五年政定周行天下歸還大越登茅山志㑹稽山本名茅山一名苖山史記註禹到大越上苖山十道以朝四方羣臣觀示中州諸侯防風後至斬以示衆示天下悉屬禹也乃大㑹計治國之道内美釡山州慎作鎭慎當之功外演聖德以應天心遂更名茅山曰㑹稽之山因傳國政休養萬民國號曰夏后封有功爵有德惡無細而不誅功無微而不賞天下喁喁若兒思母子歸父而留越恐羣臣不從言曰吾聞食其實者不傷其枝飲其氷者不濁其流吾獲覆釡之書得以除天下之災令民歸於里閭其德彰彰若斯豈可忘乎乃納言聽諌安民治室居靡山伐木爲邑畫作印横木爲門調權衡平斗斛造井示民以爲法度鳯凰棲於樹鸞鳥巢於側麒麟歩於庭百鳥佃於澤遂已耆艾将老歎曰吾晏歲年暮壽將盡矣止絶斯矣命羣臣曰吾百世之後葬我㑹稽之山葦椁桐棺葬㑹稽衣墨子曰禹棺三寸裘三領桐穿壙七尺下無及泉墳高三尺土階三等葬之後曰無改畝以爲居之者樂爲之者苦禹崩之後衆瑞並去天美禹德而勞其功使百鳥還爲民田大小有差進退有行一盛一衰往來有常禹崩傳位與益益服三年思禹未嘗不言喪畢益避禹之子啓於箕山之陽曰嵩髙之北史記註劉熈諸侯去益而朝啓曰吾君帝禹子也啓遂卽天子之位治國於夏遵禹貢之羙悉九州之土以種五榖累歲不絶啓使使以歲時春秋而祭禹以越立宗廟於南山之上禹以下六世而得帝少康少康恐禹祭之絶祀乃封其庻子於越號曰無余余始受封人民山居雖有鳥田之利山上有地理志經註鳥爲之耘春㧞草根秋啄其穢禹井禹祠相傳下有羣鳥耘田也水租貢纔給宗廟祭祀之費乃復隨陵陸而耕種或逐禽鹿而給食無余質朴不設宫室之飾從民所居春秋祠禹墓於㑹稽在㑹稽山上皇覧曰禹冢無余傳世十餘末君微劣不能自立轉從衆庻爲編户之民禹祀斷絶十有餘歲有人生而言語其語曰鳥禽呼嚥喋嚥喋指天向禹墓曰我是無余君之苗未我方修前君祭祀復我禹墓之祀爲民請福於天以通鬼神之道衆民悅喜皆助奉禹祭四時致貢因共封立以承越君之後復夏王之祭安集鳥田之瑞以爲百姓請命自後稍有君臣之義號曰無壬壬生無䁺䁺專心守國不失上天之命無䁺卒或爲夫譚夫譚生元常作允元當常立當吴王壽夢諸樊闔閭之時越之興霸自元常矣十餘世至越世家二敬王元年壬午凡一千五百六十一年吳之伐越見春秋昭公三十二於允常髙氏越史曰夏自少康至桀凡十二世按少康元年壬午至周越之傳國至於允常何止二十餘世耶年敬王十年也至是一千五百七十年矣吳越春秋越王無余外傳第六
