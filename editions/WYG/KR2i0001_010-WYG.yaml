body:
  text: 太康仲廬相少康無余無玉去無余六世無曍夫康元常勾踐興夷不夀不揚無彊魯穆栁有幽公為名王侯自稱為君尊親失琅邪為楚所滅勾踐至王親歴八主格格當作稱霸二百二十四年從無余越國始封至餘善返越國空滅凡一千九百二十二年此書載越世次自勾踐五傳至王無彊以世家考之則十世矣無彊王之侯之子所謂王侯自稱為君或者即王之侯也世家曰王無彊時楚威王興兵大敗越殺無彊盡取越地越以此散徐廣曰周顕王四十六年今自勾踐卒至越亡凡一百五十三年通鑑書之顯王三十五年此云勾踐至于親歴八主稱霸二百二十四年親衆皆失去鄉邪徙於吳為楚所滅與史世家及紀年皆不合若如世家所載則無彊之死衆散久矣非王親時失衆亡國也又記年曰王翳三十三年遷于吳則越之徙吳已久亦非王親時也吳越春秋卷六
