  text: 勾踐伐吳外傳第十勾踐十五年謀伐吳按勾踐七年歸自吳既反國四年即與范蠡謀伐吳自兹四年間必謀之蠡皆以為未可國語記之稍詳至是始伐吳左傳見於哀公十三年正勾踐十五年也謂大夫種曰孤用夫子之䇿免於天虐之誅還歸於國吾誠已説音税下同於國人國人喜悦而子昔日云有天氣即来陳之今豈有應乎種曰吳之所以彊者為有子胥今伍子胥忠諫而死是天氣前見亡國之證也願君悉心盡意以説國人越王曰聴孤説國人之辭寡人不知其力之不足以大國報讎以暴露百姓之骨於中原此則寡人之罪也寡人誠更其術於是乃葬死問傷弔有憂賀有喜送往迎来除民所害然後卑事夫差往宦士三百人於吳吳封孤數百里之地因約吳國父兄昆弟而誓之曰寡人聞古之賢君四方之民歸之若水寡人不能為政将率二三子夫婦以為藩輔令壮者無娶老妻老者無娶壮婦女子十七未嫁其父母有罪丈夫二十不娶其父母有罪将免者免者免身脱也謂生子以告於孤令醫守之生男二貺之以壺酒一犬生女二賜之以壺酒一豚犬陽畜豚隂畜生子三人孤以乳母生子二人孤與一養長子死三年釋吾政季子死三月釋吾政必哭泣葬埋之如吾子也令孤子寡婦疾疹貧病者納官其子欲仕量平聲其居好上聲其衣飽其食而簡鋭之凡四方之士来者必朝而禮之載飯與羮以游國中國中僮子戲而遇孤孤餔而啜之施以愛問其名非孤飯不食非夫人事不衣七年不收國民家有三年之畜男即歌樂女即㑹笑今國之父兄日請於孤曰昔夫差辱吾君王於諸侯長為天下所恥今越國富饒君王節儉請可報恥孤辭之曰昔者我辱也非二三子之罪也如寡人者何敢勞吾國之人以塞吾之宿讎父兄又復請曰誠四封之内盡吾君子子報父仇臣復君隙豈敢有不盡力者乎臣請復戰以除君王之宿讎孤悦而許之大夫種曰臣觀吳王得志於齊晉謂當遂涉吾地以兵臨境今疲師休卒一年而不試以忘於我我不可以怠臣當卜之於天吳民既疲於軍困於戰鬬市無赤米之積國廩空虛其民必有移徙之心寒就蒲當作蠃蒲水草蠃蚌蛤之屬於東海之濵夫占兆人事又見於卜筮王若起師以可㑹之利犯吳之邊鄙未可往也吳王雖無伐我之心亦難動之以怒不如詮其間去聲以知其意越王曰孤不欲有征伐之心國人請戰者三年矣吾不得不從民人之欲今聞大夫種諫難去聲越父兄又諫曰吴可伐勝則滅其國不勝則困其兵吳國有成王與之盟功名聞於諸侯王曰善於是乃大㑹卒臣而令之曰有敢諫伐吳者罪不赦蠡種相謂曰吾諌已不合矣然猶聴君王之令越王㑹軍列士而大誡衆而誓之曰寡人聞古之賢君不患其衆不足而患其志行去聲之少恥也國語註少恥謂進不念功臨難茍免今夫差衣水犀甲者十有三萬人徼外有山犀有水犀水犀之皮有珠甲山犀則無吳以水犀皮飾甲也周禮犀甲夀百年不患其志行之少恥也而患其衆之不足今寡人将助天威吾不欲匹夫之小勇也吾欲士卒進則思賞退則避刑扵是越民父勉其子兄勸其弟曰吳可伐也越王復召范蠡謂曰吳已殺子胥道道當作導䛕者衆吾國之民又勸孤伐吳其可伐乎范蠡曰未可須明年之春然後可耳王曰何也范蠡曰臣觀吳王北㑹諸侯於黄池精兵從王國中空虚老弱在後太子留守兵始出境未逺聞越掩其空虚兵還不難也不如来春其夏六月丙子勾踐復問范蠡曰可伐矣乃發習流二千人俊士四萬君子六千諸御千人史記俊士作教士索隠曰虞書云流宥五刑習流謂流放之罪人使之習戰教士謂常所教練之兵也君子謂君所子養有恩恵者諸御謂諸理事之官在軍有職掌者徐天祐曰笠澤之戰越以三軍潛涉盖以舟師勝此所謂習流是即習水戰之兵若曰使罪人習戰越一小國流放者何至二千人哉以乙酉與吳戰丙戌遂虜殺太子丁亥入吳焚姑胥臺吴告急於夫差夫差方㑹諸侯於黄池恐天下聞之即密不令洩已盟黄池乃使人請成於越勾踐自度未能滅乃與吳平二十一年七月越王復悉國中士卒伐吳按左傳哀公十七年越伐吳吳禦之笠澤實勾踐十九年事此書不當以為二十一年也㑹楚使申包胥聘於越越王乃見包胥曰吴可伐耶申包胥曰臣鄙於䇿謀未足以卜越王曰吴為不道殘我社稷夷吾宗廟以為平原使不得血食吾欲與之徼天之中國語作衷惟是輿馬兵革卒伍既具無以行之誠聞聞當作問於戰何以為可申包胥曰臣愚不䏻知越王固問包胥乃曰夫吳良國也傳賢於諸侯敢問君王之所戰者何越王曰在孤之側者飲酒食肉未嘗不分孤之飲食不致其味聴樂不盡其聲求以報吳願以此戰包胥曰善則善矣未可以戰越王曰越國之中吾博愛以子之忠惠以養之吾今修寛刑欲國語欲作施民所欲去民所惡烏故切憎也稱其善掩其惡遏各切不善也求以報吳願以此戰包胥曰善則善矣未可以戰王曰越國之中富者吾安之貧者吾予之救其不足損其有餘使貧富不失其利求以報吳願以此戰包胥曰善則善矣未可以戰王曰邦國南則距楚西則薄晉北則望齊春秋奉幣玉帛子女以貢獻焉未嘗敢絶求以報吳願以此戰包胥曰善哉無以加斯矣猶未可戰夫戰之道知音智為之始以仁次之以勇斷之君将去聲不知即無權變之謀以别衆寡之數不仁則不得與三軍同饑寒之節齊苦樂之喜不勇則不能斷去就之疑决可否之議於是越王曰敬從命矣冬十月越王乃請八大夫國語越王乃召五大夫問戰奚以而可韋昭解五大夫舌庸苦成大夫種范蠡皋如之屬按此書其辭大畧與國語同而云八大夫則異詳下文止七人豈與楚大夫申包胥共為八大夫耶曰昔吳為不道殘我宗廟夷我社稷以為平原使不血食吾欲徼天之中衷兵革既具無所以行之吾聞於申包胥即已命孤矣敢告諸大夫如何大夫曵庸曰審賞則可戰也審其賞明其信無功不及有功必加則士卒不怠王曰聖哉大夫苦成曰審罰則可戰審罰則士卒望而畏之不敢違命王曰勇哉大夫文種曰審物則可戰審物别是非是非明察人莫能惑王曰辨哉大夫范蠡曰審備則可戰審備慎守以待不虞備設守固必可應難去聲王曰慎哉大夫皋如曰審聲則可戰審於聲音以别清濁清濁者謂吾國君名聞於周室令諸侯不怨於外王曰得哉大夫扶同曰廣恩之分則可戰廣恩以博施知分而不外王曰神哉大夫計􅒍曰候天察地參應其變則可戰天變地應人道便利三者前見則可王曰明哉於是勾踐乃退齋而命國人曰吾将有不虞之議自近及逺無不聞者乃復命有司與國人曰承命有賞皆造國門之期有不從命者吾将有顯戮勾踐恐民不信使以征不義聞於周室令平聲諸侯不恐於外令去聲以下令字皆同國中曰五日之内則吾良人矣過五日之外則非吾之民也又将加之以誅教令既行乃入命於夫人王背音倍下背垣同屏夫人向屛而立王曰自今日之後内政無出外政無入各守其職以盡其信内中辱者則是子境外千里辱者則是子子當作我也吾見子於是以為明誡矣王出宫夫人送王不過屏王因反闔其門填之以土夫人去筓側席而坐安心無容三月不掃王出則復背垣而立大夫向垣而敬王乃令大夫曰食音飼士不均地壤不修使孤有辱於國是子之罪臨敵不戰軍士不死有辱於諸侯功隳扵天下是狐之責自今以往内政無出外政無入吾固誡子大夫敬受命矣王乃出大夫送出垣反闔外宫之門填之以土大夫側席而坐不御五味不答所勸勾踐有命於夫人大夫曰國有守禦乃坐露壇之上列鼓而鳴之軍行成陣即斬有罪者三人以徇於軍令曰不從吾令者如斯矣明日徙軍於郊斬有罪者三人徇之於軍令曰不從吾令者如斯矣王乃令國中不行者與之訣而告之曰爾安土守職吾方往征討我宗廟之讎以謝於二三子令平聲國人各送其子弟於郊境之上軍士各與父兄昆弟取訣國人悲哀皆作離别相去之詞曰躒躁摧長恧兮擢㦸馭殳殳音殊兵器詩伯也執殳周禮殳以積竹八觚長文二尺建於兵車旅賁以先驅説文積竹謂削去白取其青處合之取其有力釋名殳殊也長一文二尺無刃有所撞挃於車上使珠離也所離不降兮以泄我王氣蘇三軍一飛降去聲兮所向皆殂一士判死兮而當百夫道祐有徳兮吳卒自屠雪我王宿恥兮威振八都軍伍難更兮勢如貔貙貔猛獸陸璣曰似虎或曰似羆貙椿俱切似貍能捕獸祭天陸佃曰虎五指為貙行行各努力兮於乎於乎於是觀者莫不悽惻明日復徙軍於境上斬有罪者三人徇之於軍曰有不從令者如此後三日復徙軍於檇李斬有罪者三人以徇於軍曰其淫心匿行匿疑當作慝行去聲不當敵者如斯矣勾踐乃命有司大徇軍曰其有父母無昆弟者来告我我有大事子離父母之養親老之愛赴國家之急子在軍冦之中父母昆弟有在疾病之地吾視之如吾父母昆弟之疾病也其有死亡者吾葬埋殯送之如吾父母昆弟之有死亡葬埋之矣明日又徇於軍曰士有疾病不能隨軍從兵者吾予其醫藥給其麋粥與之同食明日又徇於軍曰筋力不足以勝平聲甲兵志行不足以聴王命者吾輕其重和其任明日旋軍於江南更陳嚴法復誅有罪者五人徇曰吾愛士也雖吾子不能過也即君所子養者及其犯誅自吾子亦不能脱也恐軍士畏法不使自謂未能得士之死力道見鼃張腹而怒将有戰争之氣即為之軾其士卒有問於王曰君何為敬鼃蟲而為之軾勾踐曰吾思士卒之怒久矣而未有稱去聲吾意者今鼃蟲無知之物見敵而有怒氣故為之軾於是軍士聞之莫不懐心樂死人致其命有司将軍大徇軍中曰隊各自令其部部各自令其士歸而不歸處而不處進而不進退而不退左而不左右而不右不如令者斬於是吳悉兵屯於江北越軍於江南越王中分其師以為左右軍皆被兕甲爾雅兕似牛註一角青色皮堅厚可制鎧鎧即甲也周禮兕甲夀二百年又令安廣之人佩石碣之矢張盧生之弩躬率君子之軍六千人以為中陣明日将戰於江乃以黄昏令於左軍銜枚遡江而上五里以須吳兵復令於右軍銜枚踰江十里復須吳兵於夜半使左軍涉江鳴鼓中水以待吳發吳師聞之中大駭相謂曰今越軍分為二師将以夾攻我衆亦即以夜暗中分其師以圍越越王隂使左石軍與吴望戰以大鼓相聞潛伏其私卒六千人銜枚不鼓攻吳吳師大敗左傳載笠澤之戰夾水而陳吴之禦越越之敗吴大概與此畧同越之左右軍乃遂伐之大敗之於囿韋昭曰囿笠澤也史記正義吳地記皆曰笠澤松江之别名又敗之於郊又敗之於津如是三戰三北徑至吳圍吳於西城吴王大懼夜遁越王追奔攻吳兵入於江陽松陵吴地記在松江松陌流溢至此故名欲入胥門来至六七里望吳南城見伍子胥頭巨若車輪目若耀電鬚髪四張射於十里越軍大懼留兵假道即日夜半暴風疾雨雷奔電激飛石揚沙疾如弓弩越軍壊敗松陵却退兵士僵斃人衆分解莫能救止范蠡文種乃稽顙肉袒拜謝子胥願乞假道子胥乃與種蠡夢曰吾知越之必入吳矣故求置吾頭於南門以觀汝之破吳也惟欲以窮夫差令汝入我之國吾心又不忍故為風雨以還汝軍然越之伐吳自是天也吾安能止哉越如欲入更從東門我當為汝開道貫城以通汝路於是越軍明日更從江出入海陽於三道之翟水乃穿東南隅以逹越軍遂圍吳守一年吳師累敗左傳哀公二十年越圍吳是為勾踐二十二年哀公二十二年越滅吳為勾踐二十四年盖首尾三年也國語曰居軍三年吳師自潰越世家亦曰留圍之三年吳師敗與左傳合此書繫其事於一十一年以為圍守一年而滅吳誤也遂棲吳王於姑胥之山吳使王孫駱史記作公孫雄虞翻曰吴大夫國語作王孫雄韋昭曰王孫姓也肉袒膝行而前請成於越王曰孤臣夫差敢布腹心異日得罪於㑹稽夫差不敢逆命得與君王結成以歸今君王舉兵而誅孤臣孤臣唯命是聴意者猶以今日之姑胥曩日之㑹稽也若徼天之中衷得赦其大辟則吳願長為臣妾勾踐不忍其言将許之成范蠡曰㑹稽之事天以越賜吳吳不取今天以吳賜越越可逆命乎且君王早朝晏罷切齒銘骨謀之二十餘年豈不緣一朝之事耶今日得而棄之其計可乎天與不取還受其咎君何忘㑹稽之厄乎勾踐曰吾欲聴子言不忍對其使者范蠡遂鳴鼓而進兵曰王已屬政於執事使者急去不時得罪吴使涕泣而去勾踐憐之使令入謂吳王曰吾置君於甬東給君夫婦三百餘家以沒王世可乎吳王辭曰天降禍於吳國不在前後正孤之身失滅宗廟社稷者吳之土地民臣越既有之孤老矣不能臣王遂伏劒自殺上卷夫差傳亦曰引劒而伏之死吴世家云自剄死越世家止言自殺按左傳吴王曰孤老矣焉能事君乃縊丘明春秋時人所聞當必不謬越絶曰越王與之劒使自圖之吳王乃旬日而自殺意者勾踐雖與之劒而夫差句以縊死耶勾踐已滅吳乃以兵北渡江淮與齊晉諸侯㑹于徐州索隠曰徐音舒徐州齊邑薛縣是也其字従人左氏作舒大事記解題曰徐州即舒州也史記正義曰音舒其字従人致貢於周周元王使人賜勾踐已受命號去還江南以淮上地與楚歸吳所侵宋地與魯泗東方百里當是之時越兵横行於江淮之上諸侯畢賀初學記引吳越春秋曰越王平吳後立賀臺於越此書無之亦闕文也越王還於吳當歸而問於范蠡曰何子言之其合於天范蠡曰此素女之道一言即合大王之事王問為為當作焉實金匱之要在於上下越王曰善哉吾不稱王其可悉乎蠡曰不可昔吳之稱王僣天子之號天變於上日為隂蝕今君遂僣號不歸恐天變復見越王還於吳置酒文臺羣臣為樂音洛乃命樂音岳下同作伐吳之曲樂師曰臣聞即事作操去聲功名作樂君王崇徳誨化有道之國誅無義之人復讎還恥威加諸侯受霸王之功功可象於圖畫徳可刻於金石聲可託於弦管名可留於竹帛臣請引琴而鼓之遂作章暢辭曰屯乎今欲伐吳可未耶大夫種蠡曰吳殺忠臣伍子胥今不伐吳人人當作乂何須大夫種進祝酒其辭曰皇天祐助我王受福良臣集謀我王之徳宗廟輔政鬼神承翼君不忘臣臣盡其力上天蒼蒼不可掩塞觴酒二升萬福無極於是越王黙然無言大夫種曰我王賢仁懐道抱徳滅讎破吴不忘返國賞無所恡羣邪杜塞君臣同和福祐千億觴酒二升萬嵗難極臺上羣臣大悦而笑越王面無喜色范蠡知勾踐愛壤土不惜羣臣之死以其謀成國定必復不須功而返國也故面有憂色而不悦也范蠡從吳欲去恐勾踐未返失人臣之義乃從入越行謂文種曰子来去矣越王必将誅子種不然言蠡復為書遺種曰吾聞天有四時春生冬伐人有盛衰泰終必否知進退存亡而不失其正惟賢人乎蠡雖不才明知進退髙鳥已散良弓将藏狡兎已盡良犬就烹夫越王為人長頸鳥喙鷹視狼步可以共患難而不可共處樂可與履危不可與安子若不去将害扵子明矣文種不信其言越王隂謀范蠡議欲去徼倖三十四年九月丁未范蠡辭於王曰臣聞主憂臣勞主辱臣死義一也今臣事大王前則無滅未萌之端後則無救已傾之禍雖然臣終欲成君霸國故不辭一死一生臣竊自惟乃使於吳王之慚辱蠡所以不死者誠恐讒於太宰嚭成伍子胥之事故不敢前死且須㬰而生夫恥辱之心不可以大承上文而言則大當作久流汗之愧不可以忍幸賴宗廟之神靈大王之威徳以敗為成斯湯武克夏商而成王業者定功雪恥臣所以當席日久臣請從斯辭矣越王惻然泣下霑衣言曰國之士大夫是子國之人民是子使孤寄身託號以俟命矣今子云去欲将逝矣是天之棄越而喪孤也亦無所恃者矣孤竊有言公位乎位當作住分國共之去乎妻子受戮范蠡曰臣聞君子俟時計不數音朔謀死不被疑内不自欺臣既逝矣妻子何法乎王其勉之臣從此辭乃乗扁舟出三江入五湖人莫知其所適范蠡既去越王愀然變色召大夫種曰蠡可追乎種曰不及也王曰奈何種曰蠡去時隂畫六陽畫三日前之神莫能制者𤣥武天空威行孰敢止者度天關涉天梁後入天一前翳神光言之者死視之者狂臣願大王勿復追也蠡終不還矣越王乃收其妻子封百里之地有敢侵之者上天所殃於是越王乃使良工鑄金象范蠡之形置之坐側朝夕論政自是之後計􅒍佯狂大夫曳庸扶同皋如之徒日益疎逺不親於朝大夫種内憂不朝人或讒之於王曰文種棄宰相之位而令君王霸於諸侯今官不加増位不益封乃懐怨望之心憤發於内色變於外故不朝耳異日種諌曰臣所以在在當作蚤朝而晏罷若身疾作者但為吳耳今已滅之王何憂乎越王黙然時魯哀公患三桓欲因諸侯以伐之三桓亦患哀公之怒以故君臣作難去聲哀公奔陘三桓攻哀公公奔又奔越哀公二十七年公如公孫有陘氏乃遂如越史記曰公如陘氏三桓攻公公奔于衛遂如越陘楚地也杜預曰有陘氏即有山氏魯國空虛國人悲之来迎哀公與之俱歸勾踐憂文種之不圗故不為哀公伐三桓也二十五年丙午平旦越王召相國大夫種而問之吾聞知人易自知難其知相國何如人也種曰哀哉大王知臣勇也不知臣仁也知臣忠也不知臣信也臣誠數音朔以損聲色滅淫樂竒説怪諭盡言竭忠以犯大王逆心咈耳必以獲罪臣非敢愛死不言言而後死昔子胥於吳矣夫差之誅也謂臣曰狡兎死良犬烹敵國破謀臣亡范蠡亦有斯言何大王問犯玉門之第八臣見王志也越王黙然不應大夫亦罷哺其耳以成人惡大溲其妻曰君賤一國之相少王禄乎臨食不亨亨當作享哺以惡何句妻子在側匹夫之能自致相國尚何望哉無乃為貪乎何其志忽忽若斯種曰悲哉子不知也吾王既免於患難雪恥於吳我悉徙宅自投死亡之地盡九術之謀於彼為佞在君為忠王不察也乃曰知人易自知難吾答之又無他語是凶妖之證也吾将復入恐不再還與子長訣相求於𤣥㝠之下妻曰何以知之種曰吾見王時正犯玉門之第八也辰尅其日上賊於下是為亂醜必害其良今日尅其辰上賊下止吾命須㬰之間耳越王復召相國謂曰子有隂謀兵法傾敵取國九術之䇿今用三已破彊吳其六尚在子所願幸以餘術為孤前王於地下謀吳之前人於是種仰天歎曰嗟乎吾聞大恩不報大功不還其謂斯乎吾悔不隨范蠡之謀乃為越王所戮吾不食善言故哺以人惡越王遂賜文種屬盧盧當作鏤之劒種得劒又歎曰南陽之宰而為越王之擒自笑曰後百世之末忠臣必以吾為喻矣遂伏劒而死徐天祐曰勾踐脱囚虜之辱苦身勞思君臣相與謀報吳者二十餘年卒以越霸諸臣雖與有力而種蠡之功居多蠡見幾而作可謂明且哲矣種之死也無罪而越王誅之也無名其辭乃曰幸以餘術為孤前王於地下謀吳之前人是何言歟令死者有知謀之地下何益如其無知焉用謀之夫大功不賞而淫刑以報此種所以仰天而歎又自笑也越王葬種於國之西山即臥龍山又名種山一曰重山太平御覽曰種山之名因大夫種以語訛成重也樓船之卒三千餘人造鼎足之羡周禮冢人丘隧註羡道也疏曰天子有隧諸侯以下有羡道史衛世家共伯入釐侯羡索隠曰羡音延延墓道又以戰切始皇紀曰大事畢閉中羡下外羨上卷夫差𫝊羡門當亦與此同義或入三峰之下葬一年伍子胥從海上穿山脅而持種去與之俱浮於海故前潮水潘侯者伍子胥也後重水者大夫種也越王既已誅忠臣霸於關東從瑯邪起觀去聲臺周七里以望東海死士八千人戈船三百艘居無幾射求賢士孔子聞之従弟子奉先王雅琴禮樂奏於越越王乃被唐夷之甲上卷王僚傳被棠銕之甲帶步光之劒杖屈盧之矛典畧曰周有屈盧之矛説文矛酋矛也建扵兵車長二丈周禮酋矛長常有四尺盖十六尺為常益四尺則二丈也出死士以三百人為陣關下孔子有頃到越王曰唯唯夫子何以教之孔子曰丘能術五帝三王之道故奏雅琴以獻之大王徐天祐曰越滅吳之明年大夫種賜劒以死是為勾踐二十五年即魯哀公二十三年也此書謂已誅忠臣居無幾求賢士孔子聞之奉雅琴禮樂奏扵越皆是年事也竊獨以為不然昔者夫子将見趙簡子聞竇鳴犢舜華之死臨河而不濟為其殺賢大夫而諱傷其𩔖也至作為陬操以哀之文種非賢大夫歟使夫子尚在聞種之死愚知其不入越也而况奏雅琴以干時君乎按春秋哀公十六年夏四月書孔丘卒由文種之死上距夫子之卒已八年矣謂夫子以是年入越非也越王喟然歎曰越性脆而愚水行山處以船為車以檝為馬往若飄然去則難從悦兵敢死越之常也夫子何説而欲教之孔子不答因辭而去越王使人如木客山取元常之喪木客山去㑹稽縣十五里越絶曰木客大冢者允常冢也欲徙葬琅邪三穿元常之墓墓中生熛風熛火飛貌風熱如火飛也飛砂石以射人人莫能入水經註冢中分風飛砂射人不得近勾踐曰吾前君其不徙乎遂置而去勾踐乃使使號令齊楚秦晉皆輔周室血盟而去秦桓公不如越王之命按史年表勾踐二十五年是為秦厲共公六年此書為秦桓公不如越王之命非也由勾踐二十五年上距秦桓公之卒盖一百有六年矣桓公當作厲共公云勾踐乃選吳越将士西渡河以攻秦軍士苦之㑹秦怖懼逆自引咎越乃還軍軍人悦樂遂作河梁之詩曰渡河梁兮渡河梁舉兵所伐攻秦王孟冬十月多雪霜隆寒道路誠難當陣兵未濟秦師降諸侯怖懼皆恐惶聲傳海内威逺邦稱霸穆桓齊楚荘天下安寜夀考長悲去歸兮河無梁自越滅吳中國皆畏之二十六年越王以邾子無道而執以歸立其太子何冬魯哀公以三桓之逼来奔越王欲為伐三桓以諸侯大夫不用命故不果耳二十七年冬勾踐寝疾将卒通鑑外紀勾踐三十三年薨謂太子興夷曰吾自禹之後承元常之徳䝉天靈之祐神祇之福從窮越之地籍楚之前鋒以摧吳王之干戈跨江涉淮從晉齊之地功徳巍巍自致扵斯其可不誠乎夫霸者之後難以久立其慎之哉遂卒興夷即位一年卒子翁翁卒子不揚不揚卒子無彊無彊卒子玉玉卒子尊尊卒子親自勾踐至于親共歴八主皆稱霸積年二百二十四年親衆皆失而去琅邪徙扵吳矣自黄帝至少康十世自禹受禪至少康即位六世為一百四十四年少康去顓頊即位四百二十四年黄帝昌意顓頊鮌禹啓
