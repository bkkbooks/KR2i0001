front:
  text: 夢傳第二夀夢元年史記索隠曰自夀夢以下始有其年朝周適楚觀諸侯禮樂魯成公㑹於鍾離鍾離之㑹呉始與中國接事見春秋魯成公十五年以史記年表考之是為夀夢十五年此以為元年何也鍾離古塗山氏之國漢置鍾離縣屬九江今屬濠州深問周公禮樂成公悉為陳前王之禮樂因為詠歌三代之風夀夢曰孤在夷蠻徒以椎髻為俗豈有斯之服哉因歎而去曰於乎哉禮也二年楚之亡大夫申公巫臣子靈也適呉以為行人教呉射御導之伐楚見左傳成公七年按巫臣怨楚子反而奔晉自晉請使呉教呉用兵叛楚使其子狐庸為呉行人非巫臣為行人也行人掌國賔客之禮籍以待四方之使楚荘王怒使子反將去聲敗呉師二國從斯結讐於是呉始通中國而與諸侯為敵蠻夷屬楚者呉盡取之始大通呉於上國五年伐楚敗子反十六年楚恭左傳作共王怨呉為巫臣伐之也乃舉兵伐呉至衡山而還見左傳襄公三年楚克鳩兹至於衡山杜預曰衡山在呉興烏程縣南楚歸三日呉人伐楚取駕此不書十七年夀夢以巫臣子狐庸為相任以國政二十五年夀夢病將卒有子四人長曰諸樊次曰餘祭祭側界切次曰餘昧昧莫葛切次曰季札季札賢夀夢欲立之季札讓曰禮有舊制奈何廢前王之禮而行父子之私乎夀夢乃命諸樊曰我欲傳國及札爾無忘寡人之言諸樊曰周之太王知西伯之聖廢長立少王之道興今欲授國於札臣誠耕於野王曰昔周行之徳加於四海今汝於區區之國荆蠻之鄉奚能成天子之業乎且今子不忘前人之言必授國以次及於季札諸樊曰敢不如命夀夢卒見春秋襄公十二年秋九月呉子乘卒左傳書夀夢卒杜預曰夀夢呉子之號諸樊以適適通作嫡正出也長攝行事當國政呉王諸樊元年史記年表呉諸樊元年為魯襄公十三年諸樊在位十三年卒是為襄公二十五年此書止載元年事餘皆不書已除喪讓季札曰昔前王未薨之時嘗晨昧不安吾望其色也意在於季札又復三朝悲吟而命我曰吾知公子札之賢欲廢長立少重發言於口雖然我心已許之然前王不忍行其私計以國付我我敢不從命乎今國者子之國也吾願逹前王之義季札謝曰夫適嫡長當國非前王之私乃宗廟社稷之制豈可變乎諸樊曰茍可施於國何先王之命有句太王改為季歴二伯來入荆蠻遂城為國周道就成前人誦之不絶於口而子之所習也札復謝曰昔曹公卒宣公庶存適亡適亡者公子負芻殺太子而自立是為成公諸侯與曹人不義而立於國子臧公子欣時也與負芻皆宣公庶子聞之行吟而歸曹君懼将立子臧子臧去之以成曹之道見左傳魯成公十五年諸侯将見子臧於王而立之遂逃奔宋明年反自宋盡致其邑與卿而不出札雖不才願附子臧之義吾誠避之呉人固立季札季札不受而耕於野呉人舎上聲之諸樊驕恣輕慢鬼神仰天求死将死命弟餘祭曰必以國及季札乃封季札於延陵號曰延陵季子延陵季札之采邑也漢改延陵為毘陵縣晉為毘陵郡又為晉陵郡今常州也餘祭十二年楚靈王㑹諸侯伐呉圍朱方誅慶封慶封數為呉伺祭祭當作察故晉楚伐之也呉王餘祭怒曰慶封窮來奔呉封之朱方左傳襄公二十八年慶封奔呉呉句餘子之朱方杜預云句餘呉子夷昧也索隠曰餘祭以二十九年卒則二十八年賜慶封邑不得是夷昧但句餘或别是一人今按春秋於明年書閽弑呉子餘祭又年表餘祭四年守閽殺餘祭則句餘非别為一人矣世家年表皆在餘祭三年即襄公二十八年也年表既云餘祭四年卒此乃書十二年何也十二十三年皆當刪十字十七年亦改從四年可也朱方呉邑秦改丹徒今屬鎮江以效不恨士也即舉兵伐楚取二邑而去十三年楚怨呉為慶封故伐之心恨不解伐呉至乾谿在譙國城父縣南楚東境呉擊之楚師敗走十七年餘祭卒餘昧立四年卒欲授位季札季札讓逃去曰吾不受位明矣昔前君有命已附子臧之義潔身清行仰髙履尚惟仁是處富貴之於我如秋風之過耳遂逃歸延陵呉人立餘昧子州于號為呉王僚也
