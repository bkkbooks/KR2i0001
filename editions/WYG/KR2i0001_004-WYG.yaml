  text: 闔閭内傳第四闔閭左傳作闔廬史世家同元年始任賢使能施恩行恵以仁義聞於諸侯仁未施恩未行恐國人不就諸侯不信乃舉伍子胥為行人以客禮事之而與謀國政闔閭謂子胥曰寡人欲彊國霸王何由而可伍子胥膝進膝行而進出荘子垂淚頓首曰臣楚國之亡虜也父兄棄捐骸骨不葬魂不血食蒙罪受辱来歸命於大王幸不加戮何敢與政事焉闔閭曰非夫子寡人不免於縶禦之使今幸奉一言之教乃至於斯何為中道生進退耶子胥曰臣聞謀議之臣何足處於危亡之地然憂除事定必不為君主所親闔閭曰不然寡人非子無所盡議何得讓乎吾國僻逺顧在東南之地險阻潤濕又有江海之害君無守禦民無所依倉庫不設田疇不墾為之奈何子胥良久對曰臣聞治國之道安君理民是其上者闔閭曰安君治民其術奈何子胥曰凡欲安君治民興霸成王從近制逺者必先立城郭設守備實倉廩治兵庫斯則其術也闔閭曰善夫築城郭立倉庫因地制宜豈有天氣之數以威鄰國者乎子胥曰有闔閭曰寡人委計於子子胥乃使相土甞水象天法地造築大城周迴四十七里陸門八以象天八風水門八以法地八聰築小城周十里陸門三不開東面者欲以絶越明也立閶門者以象天門通閶闔風也史記律書閶闔風居西方閶者倡也闔者藏也立蛇門者以象地戸也已為地户闔閭欲西破楚楚在西北故立閶門以通天氣因復名之破楚門欲東并大越越在東南故立蛇門以制敵國呉在辰其位龍也故小城南門上反羽為兩鯢鱙以象龍角越在已地其位蛇也故南大門上有木蛇北向首内示越屬於呉也城郭以成倉庫以具闔閭復使子胥屈盖餘燭傭習術戰騎射御之巧未有所用請干将鑄作名劒二枚干将者呉人也與歐冶子同師俱能為劒越前来獻三枚闔閭得而寳之以故使劒匠作為二枚一曰干将二曰莫耶莫耶干将之妻也干将作劒采五山之鐵精六合之金英候天伺地隂陽同光百神臨觀天氣下降而金鐵之精不銷淪流於是干将不知其由莫耶曰子以善為劒聞於王使子作劒三月不成其有意乎干将曰吾不知其理也莫耶曰夫神物之化須人而成今夫子作劒得無得其人而後成乎干将曰昔吾師作冶金鐵之𩔖不銷夫妻俱入治爐中然後成物至今後世即山作冶麻絰葌服然後敢鑄金於山今吾作劒不變化者其若斯耶莫耶曰師知爍身以成物吾何難哉於是干将妻乃斷髮剪爪投於爐中使童女童男三百人鼓槖装炭金鐵乃濡遂以成劒陽曰干将隂曰莫耶陽作龜文隂作漫理干将匿其陽出其隂而獻之闔閭甚重既得寳劒適㑹魯使季孫聘於呉闔閭使掌劒大夫以莫耶獻之季孫拔劒之綱中缺者大如黍米歎曰美哉劒也雖上國之師何能加之夫劒之成也呉霸有缺則亡矣我雖好之其可受乎不受而去闔閭既寳莫耶復命於國中作金鈎令曰能為善鈎者賞之百金呉作鈎者甚衆而有之貪王之重賞也殺其二子以血舋通作釁金遂成二鈎獻於闔閭詣宫門而求賞王曰為鈎者衆而子獨求賞何以異於衆夫子之鈎乎作鈎者曰吾之作鈎也貪而殺二子舋成二鈎王乃舉衆鈎以示之何者是也王鈎甚多形體相𩔖不知其所在於是鈎師向鈎而呼二子之名呉鴻扈稽我在於此王不知汝之神也聲絶於口兩鈎俱飛著父之胷呉王大驚曰嗟乎寡人誠負於子乃賞百金遂服而不離身六年欲用兵㑹楚之白喜史記作伯嚭披美切來奔呉王問子胥曰白喜何如人也子胥曰白喜者楚白左傳史記白俱作伯州犂之孫平王誅州犂喜因出奔聞臣在呉而來也闔閭曰州犂何罪子胥曰白州犂楚之左尹號曰郄宛郄當作郤味此書似以伯州犂郤宛為一人按左傳昭公元年楚公子圍殺太宰伯州犂于郟春秋昭公二十七年楚殺其大夫郤宛自是二人又按徐廣曰州犂之子曰郤宛郤宛之子曰伯嚭宛亦姓伯又别氏郤呉世家曰楚誅伯州犂其孫伯嚭奔呉此云伯州犂號郤宛非也事平王平王幸之常與盡日而語襲朝陟遥切旦也而食費無忌望而妬之因謂平王曰王愛幸宛一國所知何不為酒一至宛家以示羣臣於宛之厚平王曰善乃具酒於郄宛之舎無忌教宛曰平王甚毅猛而好兵子必故陳兵堂下門庭宛信其言因而為之及平王往而大驚曰宛何等也無忌曰殆且有篡殺之憂王急去之事未可知平王大怒遂殺郄宛諸侯聞之莫不嘆息喜聞臣在呉故來請見之闔閭見白喜而問曰寡人國僻逺東濵海側聞子前人為楚荆之暴怒費無忌之讒口不逺吾國而來於斯将何以教寡人喜曰楚國之失虜前人無罪横被暴誅臣聞大王收伍子胥之窮厄不逺千里故來歸命惟大王賜其死闔閭傷之以為大夫與謀國事呉大夫被離承宴問子胥曰何見而信喜子胥曰吾之怨與喜同子不聞河上歌乎同病相憐同憂相救驚翔之鳥相隨而集瀨下之水因復俱流胡馬望北風而立越鷰向日而熙誰不愛其所近悲其所思者乎被離曰君之言外也豈有内意以决疑乎子胥曰吾不見也被離曰吾觀喜之為人鷹視虎步専功擅殺之性不可親也子胥不然其言與之俱事呉王二年呉王前既殺王僚又憂慶忌之在鄰國恐合諸侯來伐問子胥曰昔專諸之事於寡人厚矣今聞公子慶忌有計於諸侯吾食不甘味卧不安席以付於子子胥曰臣不忠無行而與大王圖王僚於私室之中今復欲討其子恐非皇天之意闔閭曰昔武王討紂而後殺武庚周人無怨色今若斯議何乃天子子胥曰臣事君王将遂呉統又何懼焉臣之所厚其人者細人也願從於謀呉王曰吾之憂也其敵有萬人之力豈細人之所能謀乎子胥曰其細人之謀事而有萬人之力也王曰其為何誰子以言之子胥曰姓要平聲名離臣昔嘗見曽折辱壮士椒丘訢也王曰辱之奈何子胥曰椒丘訢者東海上人也為齊王使於呉過淮津欲飲馬於津津吏曰水中有神見馬即出以害其馬君勿飲也訢曰壮士所當何神敢干乃使從者飲馬於津水神果取其馬馬沒椒丘訢大怒袒裼持劒入水求神决戰連日乃出眇其一目遂之呉會於友人之喪訢恃其與水水字下當有神字戰之勇也於友人之喪席而輕傲於士大夫言辭不遜有陵人之氣要離與之對坐合坐不忍其溢於力也時要離乃挫訢曰吾聞勇士之鬬也與日戰不移表與神鬼戰者不旋踵與人戰者不逹聲生往死還不受其辱今子與神鬬於水亡馬失御又受眇目之病形殘名勇勇士所恥不即喪命於敵而戀其生猶徽色於我哉於是椒丘訢卒於卒音猝於字疑當作被詰責恨怒竝發暝即往攻要離於是要離席䦨至舎誡其妻曰我辱壮士椒丘訢於大家之喪餘恨蔚蔚當作覘恚暝必來也慎無閉吾門至夜椒丘訢果往見其門不閉登其堂不闗入其室不守放髮僵卧無所懼訢乃手劒而捽要離曰子有當死之過者三子知之乎離曰不知訢曰子辱我於大家之衆一死也歸不闗閉二死也卧不守御三死也子有三死之過欲無得怨要離曰吾無三死之過子有三不肖之愧子知之乎訢曰不知要離曰吾辱子於千人之衆子無敢報一不肖也入門不咳登堂無聲二不肖也前拔子劒手挫捽吾頭乃敢大言三不肖也子有三不肖而威於我豈不鄙哉於是椒丘訢投劒而嘆曰吾之勇也人莫敢眥占者占疑當作覘離乃加吾之上此天下壮士也臣聞要離若斯誠以聞矣呉王曰願承宴而待焉子胥乃見要離曰呉王聞子髙義惟一臨之乃與子胥見呉王王曰子何為者要離曰臣國東千里之人臣細小無力迎風則僵負風則伏大王有命臣敢不盡力呉王心非子胥進此人良久黙然不言要離即進曰大王患慶忌乎臣能殺之王曰慶忌之勇世所聞也筋骨果勁萬人莫當走追奔獸手接飛鳥骨騰肉飛拊膝數百里吾嘗追之於江駟馬馳不及射之闇接矢不可中今子之力不如也要離曰王有意焉臣能殺之王曰慶忌明智之人歸窮於諸侯不下諸侯之士要離曰臣聞安其妻子之樂不盡事君之義非忠也懐家室之愛而不除君之患者非義也臣詐以負罪出奔願王戮臣妻子斷臣右手慶忌必信臣矣王曰諾要離乃詐得罪出奔呉王乃取其妻子焚棄於市要離乃奔諸侯而行怨言以無罪聞於天下遂如衛求見慶忌見曰闔閭無道王子所知今戮吾妻子焚之於市無罪見誅呉國之事吾知其情願因王子之勇闔閭可得也何不與我東之於呉慶忌信其謀後三月揀練士卒遂之呉将渡江於中流要離乃微坐與與當作於上風因風勢以矛鈎其冠順風而刺慶忌慶忌顧且揮之三捽其頭於水中乃加於膝上嘻嘻哉天下之勇士也乃敢加兵刃於我左右欲殺之慶忌止之曰此是天下勇士豈可一日而殺天下勇士二人哉乃誡左右曰可令還呉以旌其忠於是慶忌死要離渡至江陵愍然不行從者曰君何不行要離曰殺吾妻子以事其君非仁也為新君而殺故君之子非義也重其死不貴無義今吾貪生棄行非義也夫人有三惡以立於世吾何面目以視天下之士言訖遂投身於江未絶從者出之要離曰吾寧能不死乎從者曰君且勿死以俟爵禄要離乃自斷手足伏劒而死三年呉将欲伐楚未行伍子胥白喜相謂曰吾等為王養士畫其䇿謀有利於國而王故伐楚出其令託而無興師之意奈何有頃呉王問子胥白喜曰寡人欲出兵於二子何如子胥白喜對曰臣願用命呉王内計二子皆怨楚深恐以兵往破滅而已登臺向南風而嘯有頃而嘆羣臣莫有曉王意者子胥深知王之不足乃薦孫子於王孫子者名武呉人也善為兵法辟隠深居世人莫知其能胥乃明知鑒辯知孫子可以折衝銷敵乃一旦與呉王論兵七薦孫子呉王曰子胥託言進士欲以自納而召孫子問以兵法毎陳一篇王不知口之稱善其意大恱問曰兵法寧可以小試耶孫子曰可可以小試於後宫之女王曰諾孫子曰得大王寵姬二人以為軍隊長各将一隊令三百人皆被甲兠鍪操劒盾竪尹切兵器所以蔽身而立告以軍法隨鼓進退左右迴旋使知其禁乃令曰一鼓皆振二鼓操進三鼓為戰形於是宫女皆掩口而笑孫子乃親自操枹擊鼓三令五申其笑如故孫子顧視諸女連笑不止孫子大怒兩目忽張聲如駭虎髪上衝冠項旁絶纓顧謂執法曰取鈇鑕鈇斧也鑕鐵椹孫子曰約束不明申令不信将之罪也既以約束三令五申卒不却行士之過也軍法如何執法曰斬武乃令斬隊長二人即呉王之寵姬也呉王登臺觀望正見斬二愛姬馳使去聲下之令曰寡人已知将軍用兵矣寡人非此二姬食不甘味宜勿斬之孫子曰臣既已受命為将将法在軍君雖有令臣不受之孫子復為鼓之當左右進退迴旋䂓矩不敢瞬目二隊寂然無敢顧者於是乃報呉王曰兵已整齊願王觀之惟所欲用使赴水火猶無難矣而可以定天下呉王忽然不恱曰寡人知子善用兵雖可以霸然而無所施也将軍罷兵就舎寡人不願孫子曰王徒好其言而不用其實子胥諫曰臣聞兵者凶事不可空試故為兵者誅伐不行兵道不明今大王䖍心思士欲興兵戈以誅暴楚以霸天下而威諸侯非孫武之将而誰能涉淮踰泗越千里而戰者乎於是呉王大恱因鳴鼓會軍集而攻楚孫子為将拔舒殺呉亡将二公子葢餘燭傭謀欲入郢楚都楚文王始自丹陽徙都郢即江陵之紀南城也孫武曰民勞未可恃也楚聞呉使孫子伍子胥白喜為将楚國苦之羣臣皆怨咸言費無忌讒殺伍奢白州犂而呉侵境不絶於寇楚國羣臣有一朝之患於是司馬成乃謂子常曰太傅伍奢左尹白州犂邦人莫知其罪君與王謀誅之流謗於國至於今日其言不絶誠惑之盖聞仁者殺人以掩謗者猶弗為也今子殺人以興謗於國不亦異乎夫費無忌楚之讒口民莫知其過今無辜殺三賢士伍奢伯州犂與郤宛而三以結怨於呉内傷忠臣之心外為鄰國所笑且郄郤伍之家出奔於呉呉新有伍員白喜秉威銳志結讎於楚故彊敵之兵日駭楚國有事子即危矣夫智者除讒以自安愚者受佞以自亡今子受讒國以危矣子常曰是囊之罪也敢不圖之九月子常與昭王共誅費無忌遂滅其族國人乃謗止呉王有女滕玉因謀伐楚與夫人及女㑹蒸魚王前甞半而與女女怒曰王食魚辱我不忍久生乃自殺闔閭痛之葬於國西閶門外鑿池積土文石為椁題湊為中題湊棺木内向也金鼎玉杯銀樽珠襦之寳皆以送女乃舞白鶴於呉市中令萬民随而觀之還使男女與白鶴俱入羡門因發機以掩之殺生以送死國人非之湛盧之劍惡闔閭之無道也乃去而出水行如楚楚昭王卧而寤得呉王湛盧之劍於牀昭王不知其故乃召風湖子越絶湖皆作胡而問曰寡人卧覺而得寳劍不知其名是何劍也風湖子曰此謂湛盧之劒昭王曰何以言之風湖子曰臣聞呉王得越所獻寳劍三枚一曰魚腸二曰磐郢三曰湛盧魚賜之劍已用殺呉王僚也磐郢以送其死女今湛盧入楚也昭王曰湛盧所以去者何也風湖子曰臣聞越王元常左傳史記俱作允常使歐冶子造劍五枚以示薛燭燭對曰魚腸劍逆理不順不可服也臣以殺君子以殺父故闔閭以殺王僚一名磐郢亦曰豪曹不法之物無益於人故以送死一名湛盧五金之英太陽之精寄氣託靈出之有神服之有威可以折衝拒敵然人君有逆理之謀其劍即出故去無道以就有道今呉王無道殺君謀楚故湛盧入楚昭王曰其直幾何風湖子曰臣聞此劍在越之時客有酬其直者有市之鄉三十駿馬千匹萬戸之都二是其一也薛燭對曰赤董之山已令令字當作合無雲若耶之溪深而莫測若耶溪在㑹稽縣南二十五里溪旁即赤堇山一名鑄浦山歐冶子鑄劒之所戰國䇿曰涸若耶而取銅破堇山而取錫張景陽七命曰耶溪之鋌赤山之精皆謂此也羣臣上天歐冶死矣雖傾城量金珠玉盈河猶不能得此寳而况有市之鄉駿馬千匹萬户之都何足言也昭王大恱遂以為寳闔閭聞楚得湛盧之劒因斯發怒遂使孫武伍胥白喜伐楚子胥隂令宣言於楚曰楚用子期為将吾即得而殺之子常用兵吾即去之楚聞之因用子常退子期呉拔六與潛二邑左傳昭公三十一年呉人侵楚伐夷侵潛六始用子胥之謀是為闔閭四年子胥𫝊亦合今此書以為三年何也六古國皋陶之後所封今安豐六安縣是其地潛在六西南今屬安慶有潛山潛水史記潛作􅈞五年呉王以越不從伐楚南伐越越王元常曰呉不信前日之盟棄貢賜之國而滅其交親闔閭不然其言遂伐破檇里左傳昭公三十二年呉伐越始用師於越也是為闔廬五年杜預解自此之前雖疆事小爭未嘗用大兵檇里左傳史記俱作檇李檇音醉杜預曰呉郡嘉興縣南有醉李城六年楚昭王使公子囊瓦按左傳楚公子貞字子囊其孫名瓦字子常此當言公孫不得云公子也伐呉報潛六之役呉使伍胥孫武擊之圍於豫章豫章地名也在江夏之間杜預曰豫章漢東江北地名孔頴逹曰漢書地理志豫章郡名在江南此則在北者土地之名按宋武帝討劉毅遣王鎮惡先襲至豫章口豫章口去江陵城二十里乃知春秋之豫章非今隆興郡名之豫章也呉王曰吾欲乗危入楚都而破其郢不得入郢二子何功於是圍楚師於豫章大破之遂圍巢克之獲楚公子繁守巢大夫以歸為質見左傳定公二年索隠曰當為闔廬七年史年表世家皆書之六年此書似亦因以為據九年呉王謂子胥孫武曰始子言郢不可入今果何如二将曰夫戰借勝以成其威非常勝之道呉王曰何謂也二将曰楚之為兵天下彊敵也今臣與之爭鋒十亡一存而王入郢者天也臣不敢必呉王曰吾欲復擊楚奈何而有功伍胥孫武曰囊瓦者貪而多過於諸侯而唐蔡怨之王必伐得唐蔡何怨二将曰昔蔡昭公朝於楚有美裘二枚善珮二枚各以一枚獻之昭王王服之以臨朝昭公自服一枚子常欲之昭公不與子常三年留之不使歸國唐成公朝楚有二文馬二馬名肅爽駿馬也爽音霜亦曰驌驦子常欲之公不與亦三年止之唐成成當作人相與謀從成公從者請馬以贖成公飲從者酒醉之竊馬而獻子常常乃遣成公歸國羣臣誹謗曰君以一馬之故三年自困願賞竊馬之功於是成公常思報楚君臣未嘗絶口蔡人聞之固請獻裘珮於子常蔡侯得歸如晉告訴以子元與太子質左傳云以其子元與大夫之子為質者是而請伐楚故曰得唐蔡而可伐楚呉王於是使使謂唐蔡曰楚為無道虐殺忠良侵食諸侯困辱二君寡人欲舉兵伐楚願二君有謀唐侯左傳作蔡侯使其子乾為質於呉三國合謀伐楚舎兵兵當作舟呉乗舟從淮來過蔡而舎之於淮汭自豫章與楚夾漢水為陣漢水源出武都沮縣經襄陽至江夏陽安縣入江今漢陽古江夏也子常逐濟漢而陣自小别山至於大别山杜預曰二别在江夏界元和郡縣志小别山在漢陽縣禹貢至於大别今漢陽縣北有大别山地志水􅀴云在安豐者非三不利自知不可進欲奔亡史皇曰今子常無故與王共殺忠臣三人天禍來下王之所致子常不應十月楚二師陣於柏舉柏舉楚地闔閭之弟夫槩晨起請於闔閭曰子常不仁貪而少恩其臣下莫有死志追之必破矣闔閭不許夫槩曰所謂臣行其志不待命者其謂此也遂以其部五千人擊子常大敗奔鄭楚師大亂呉師乘之遂破楚衆楚人未濟漢會楚人食呉因奔而擊破之雍滯左傳作雍澨五戰徑至於郢王追追當作迫於呉寇出固将亡與妹季芈綿婢切楚姓平王女也出河濉河水出崐崙濉與睢同杜預曰睢水出新城昌魏縣東南至枝江縣入江是楚王西走也按水經睢水出梁郡鄢縣酈道元註睢水出陳留縣西蒗蕩渠三說各不同之間楚大夫尹固與王同舟而去呉師遂入郢求昭王王涉濉濟江入于雲中楚有雲夢澤左傳載令尹子文之生䢵夫人棄諸夢中言夢而不及雲今此雲中言雲而不及夢是二澤明矣漢陽圖經雲在江之北夢在江之南暮宿羣盗攻之以戈撃王頭大夫尹固左傳作王孫由于隠王以背受之中肩王懼奔鄖音云江陵有鄖城楚昭王時鄖公所築今松滋也大夫鍾建負季芈以從鄖公辛得昭王大喜欲還之其弟懐怒曰昭王是我讎也欲殺之謂其兄辛曰昔平王殺我父吾殺其子不亦可乎辛曰君討其臣敢讎之者夫乘人之禍非仁也滅宗廢祀非孝也動無令名非智也懐怒不解辛隂與其季弟巢以王奔隨呉兵逐之謂隨君曰周之子孫在漢水上者楚滅之謂天報其禍加罰於楚君何寳之寳當作保周室何罪而隠其賊能出昭王即重惠也隨君卜昭王與呉王不吉乃辭呉王曰今隨之僻小密近於楚楚實存我有盟至今未改若今有難去聲而棄之今且安静楚敢不聴命呉師多其辭乃退是時大夫子期雖與昭王俱亡隂與呉師為市欲出昭王王聞之得免即割子期心以與隨君盟而去呉王入郢止留伍胥以不得昭王乃掘平王之墓出其屍鞭之三百左足踐腹右手抉其目誚之曰誰使汝用讒諛之口殺我父兄豈不寃哉即令闔閭妻昭王夫人伍胥孫武白喜亦妻子常司馬成之妻以辱楚之君臣也遂引軍擊鄭鄭定公前殺太子建而困迫子胥自此鄭定公大懼按太子建之死乃定公時呉師入郢則獻公時此亦云定公誤乃令國中曰有能還呉軍者吾與分國而治漁者之子應募曰臣能還之不用尺兵斗糧得一橈音饒小楫而行歌道中即還矣公乃與漁者之子橈子胥軍将至當道扣橈而歌曰蘆中人如是再子胥聞之愕然大驚曰何等謂與語公為何誰矣曰漁父者子吾國君懼懼令於國有能還呉軍者與之分國而治臣念前人與君相逢於途今從君乞鄭之國子胥歎曰悲哉吾蒙子前人之恩自致於此上天蒼蒼豈敢忘也於是乃釋鄭國還軍守楚求昭王所在日急申包胥亡在山中聞之乃使人謂子胥曰子之報讎其以甚乎子故平王之臣北面事之今於僇屍之辱豈道之極乎子胥曰為我謝申包胥曰日暮路逺倒行而逆施之於道也申包胥知不可乃之於秦求救楚晝馳夜趨足踵蹠踵足後蹠之石切足下也劈裂裳裹膝鶴倚哭於秦庭七日七夜口不絶聲秦桓公按申包胥求救乃秦哀公時此云桓公誤素沉湎不恤國事申包胥哭已歌曰呉為無道封大也豕長蛇以食上國欲有天下政從楚起寡君出在草澤使來告急如此七日桓公桓當作哀大驚楚有賢臣如是呉猶欲滅之寡人無臣若斯者其亡無日矣為賦無衣之詩曰豈曰無衣與子同袍王于興師與子同仇包胥曰臣聞戾徳左傳國語皆作夷徳無厭王不憂鄰國壃埸之患逮呉之未定王其取分扶問切焉若楚遂亡於秦何利則亦亡君之土也願王以神靈存之世以事王秦伯使辭焉曰寡人聞命矣子且就館将圖而告包胥曰寡君今在草野未獲所伏臣何敢即安復立於庭倚墻而哭日夜不絶聲水不入口秦伯為之垂涕即出師而送之十年秦師未出越王元常恨闔閭破之檇里興兵伐呉呉在楚越盗掩襲之左傳定公五年越入呉呉在楚也六月申包胥以秦師至秦使公子子蒲子虎率車五百乘救楚擊呉二子曰吾未知呉道使楚師前與呉戰而即㑹之大敗夫槩即㑹之左傳作自稷㑹之稷楚地也史記亦云敗呉於稷七月楚司馬子乗秦公子子蒲與呉王相守私以間兵伐唐滅之唐從呉伐楚故子胥久留楚求昭王不去夫槩師敗却退九月潛歸自立為呉王闔閭聞之乃釋楚師欲殺夫槩奔楚昭王封夫槩於棠溪左傳史記棠俱作堂司馬彪曰汝南有堂谿亭應劭曰堂谿本房子國闔閭遂歸子胥孫武白喜留與楚師於淮澨秦師又敗呉師楚子期将焚呉軍子西曰吾國父兄身戰暴骨草野焉不收又焚之其可乎子期曰亡國失衆存沒所在又何殺生以愛死死如有知必将乗湮起而助我如其無知何惜草中之骨而亡呉國遂焚而戰呉師大敗子胥等相謂曰彼楚雖敗我餘兵未有所損我者孫武曰吾以呉干戈西破楚逐昭王而屠荆平王墓割戮其屍亦已足矣子胥曰自霸王以來未有人臣報讐加此者也行去矣呉軍去後昭王反國徐天祐曰楚何其多亡臣也析公雍子子靈賁皇奔晉迭為謀主楚是以有繞角靡角巢鄢陵之敗伍舉之奔鄭也将遂奔晉賴聲子有言益其爵禄而反之子孫復仕於楚由是世為忠臣其後伍奢伍尚卒困讒口無罪而父子就戮此子胥之出亡所以報楚入郢讎其舊君而甘心焉是舉也随與鄭亦與有憂而唐卒受禍微申包胥以秦師至楚何以能國詩云讒人㒺極交亂四國其是之謂歟聴言者可以監矣樂師扈子非荆王信讒佞殺伍奢白州犂而寇不絶於境至乃掘平王墓戮屍姦逞以辱楚君臣又傷昭王困迫㡬為天下大鄙然已愧矣乃援琴為楚作窮刼刼疑當作衂之曲以暢暢當作傷君之迫厄之暢逹之暢逹當作而暢逹之也其詞曰王耶王耶何乖烈烈疑當作劣不顧宗廟聴讒孽任用無忌多所殺誅夷白氏族㡬滅二子東奔適呉越呉王哀痛助忉怛垂涕舉兵将西伐伍胥白喜孫武决三戰破郢王奔發留兵縱騎虜荆闕楚荆骸骨遭發掘鞭辱腐屍恥難雪幾危宗廟社稷滅嚴王何罪國幾絶卿士悽愴民惻悷音戾懔悷悲貌呉軍雖去怖不歇願王更隠撫忠節勿為讒口能謗䙝昭王垂涕深知琴曲之情扈子遂不復鼓矣子胥等過溧陽瀨水之上乃長太息曰吾嘗饑於此乞食於一女子女子飼我遂投水而亡将欲報以百金而不知其家乃投金水中而去有頃一老嫗行哭而來人問曰何哭之悲嫗曰吾有女子守居三十不嫁往年擊綿於此遇一窮途君子而輙飯之而恐事泄自投於瀨水今聞伍君來不得其償自傷虚死是故悲耳人曰子胥欲報百金不知其家投金水中而去矣嫗遂取金而歸子胥歸呉呉王聞三帥将至治魚為鱠将到之日過時不至魚臭須臾子胥至闔閭出鱠而食不知其臭王復重為之其味如故呉人作鱠者自闔閭之造也諸将既從還楚因更名閶門曰破楚門復謀伐齊齊子使女為質於呉呉王因為太子波聘齊女齊景公女孟子所謂涕出而女於呉即此也女少思齊日夜號泣因乃為病闔閭乃起北門名曰望齊門令女往逰其上女思不止病日益甚乃至殂落女曰令死者有知必𦵏我於虞山之巔寰宇記常熟虞山有齊女塚以望齊國闔閭傷之正如其言乃𦵏虞山之巔是時太子亦病而死闔閭謀擇諸公子可立者未有定計波太子詳下文則夫差為太子波之子此太子下當又有子字夫差日夜告於伍胥曰王欲立太子非我而誰當立此計在君耳伍子胥曰太子未有定我入則决矣闔閭有頃召子胥謀立太子子胥曰臣聞祀廢於絶後興於有嗣今太子不禄早失侍御今王欲立太子者莫大乎波秦秦字疑衍之子夫差闔閭曰夫夫下當有差字愚而不仁恐不能奉統於呉國子胥曰夫差信以愛人端於守節敦於禮義父死子代經之明文闔閭曰寡人從子立夫差為太子使太子屯兵守楚留止自治宫室立射臺於安里華池在平昌南城宫在長樂越絶曰射臺二一在華池昌里一在安陽里南宫在長樂里按華池南城宫舊傳皆在長洲縣境闔閭出入游卧秋冬治於城中春夏治於城外治姑蘇之臺在呉縣西南三十里有姑蘇山亦名姑胥旦食䱉山越絶作組山晝游蘇臺射於鷗陂馳於游臺興樂石城在呉縣東北呉之絜宫越王獻西子於此走犬長洲有走狗塘田獵之地也斯且闔閭之霸時於是太子定因伐楚破師拔番晉邑漢為鄱陽縣屬九江郡今饒州也徐天祐曰呉楚世為仇敵呉自伐巢以至取番大小二十餘戰楚子重子反一嵗七奔命而昭王即位無嵗不有呉師皆亡臣伍員伯嚭為之也其間釐虺棘櫟麻伍邑之役與庸浦皋舟鵲岸房鍾州來雞父之戰此書皆略而不載云楚懼呉兵復至乃去郢徙于蒍若蒍若字誤當作鄀按左傳定公六年呉太子終纍敗楚舟師楚子期又以陵師敗於繁陽於是乎遷郢於鄀史世家闔閭十一年呉公子夫差伐楚取番楚恐而去郢徙鄀十一年即定公六年杜預曰終纍闔閭子夫差兄史以為夫差索隠謂名異而一人耳此書又以為太子定伐楚拔番而不著其年未詳孰是鄀音若服䖍曰楚邑今襄陽也當此之時呉以子胥白喜孫武之謀西破彊楚北威齊晉南伐於越左傳定公十四年呉伐越勾踐大敗之闔閭傷将指還卒於陘史世家年表皆記之闔閭十九年與傳合此書但云南伐於越而略其事何也
