front:
  text: 越之前君無余者無余禹之六世孫少康之庶子也初受封於越越舊經作無餘夏禹之末封也禹父鯀者帝顓頊之後帝王世紀曰鯀帝顓頊之子字熈連山易曰鯀封於崇故國語謂之崇伯鯀史記曰鯀之父帝顓頊世本亦以鯀為顓頊子漢律厯志則曰顓頊五世而生鯀通鑑外紀従之古史曰太史公以鯀為顓頊之子其世太廹班固以為五世孫近得之此書以為顓頊之後曰後者可以通子孫言之也鯀娶於有莘氏之女名曰女嬉年壮未孳嬉於砥山得薏苡而吞之意若為人所感因而姙孕剖脅而産髙密世本曰鯀娶有莘氏女謂之女志是生髙密宋忠曰髙密禹所封國世紀曰鯀妻脩已見流星貫昴夢接意感又吞神珠薏苡而生禹名文命字密史記以文命為禹之名孔安國謂禹為名張晏謂禹為字今並存之家於西羌地曰石紐石紐在蜀西川也在茂州石泉縣其地有禹廟郡人相傳禹以六月六日生元和郡縣志禹汝山廣柔人生於石紐村水經註縣有石紐鄉禹所生也廣柔即今石泉軍帝堯之時遭洪水滔滔天下沉漬九州閼塞四瀆壅閉帝乃憂中國之不康悼黎元之罹咎乃命四嶽乃舉賢良将任治水自中國至于條方莫薦人帝靡所任四嶽乃舉鯀而薦之於堯帝曰鯀負命毁族不可尚書堯典作方命圯族史記堯本紀作負命毁族正義曰負音佩違也鯀性狼戾違負教命毁敗善𩔖不可用也四嶽曰等之羣臣未有如鯀者堯用治水受命九載功不成帝怒曰朕知不能也乃更求之得舜使攝行天子之政巡狩觀鯀之治水無有形状乃殛鯀于羽山地志在東海郡祝其縣南今海州朐山縣鯀投于水化為黄能或作熊因為羽淵之神左傳昭公七年晉侯有疾夢黄熊入扵寝門子産曰昔堯殛鯀於羽山其神化為黄熊以入于羽淵杜預解熊音雄獸名亦作能如字一音奴来切三足鼈也按説文及字林皆云能熊屬足似鹿然則能既熊屬又為鼈𩔖作能者勝也東海人祭禹廟不用熊白及鼈為膳豈鯀化為二物乎舜與四嶽舉鯀之子髙密四嶽謂禹曰舜以治水無功舉爾嗣考之勲禹曰俞小子敢悉考績以統天意惟委委字下當有任字而已禹傷父功不成循江泝河盡濟甄甄字不通疑暨字之誤淮乃勞身焦思以行七年聞樂不聴過門不入冠挂不顧履遺不躡功未及成愁然沈思乃案黄帝中經厯盖聖人所記曰在于九山東南天柱號曰宛委在㑹稽縣東南十五里一名玉笥山赤帝在闕其巖之巔承以文玉覆以盤石其書金簡青玉為字編以白銀皆瑑其文禹乃東巡登衡嶽血白馬以祭不幸所求禹乃登山仰天而嘯因夢見赤繡衣男子自稱𤣥夷蒼水使者聞帝使丈命于斯故来候之非厥嵗月将告以期無為戲吟故倚歌覆釡之山輿地志㑹稽山有石状如覆鬴謂之覆鬴山一名釡山鬴亦作釜史黄帝本紀曰合符釜山索隠以為合諸侯符契圭璋而朝之於釜山在媯州懐戎縣北三里非此之釜山也東顧謂禹曰欲得我山神書者齋於黄帝巖嶽之下三月庚子登山發石金簡之書存矣禹退又齋三月庚子登宛委山發金簡之書案金簡玉字得通水之理徐天祐曰禹未嘗兩至越其至越在㑹計之時非治水時也禹貢記南方山川多與今不合禹治水時未嘗親至南方故也孟子曰禹八年扵外而禹貢云作十三載乃同或者以為比禹治水之年通鯀九載言之也馬融曰禹治水三年而八州平是十二年而八州平十三年而兖州平兖州平在舜受終之年然則禹之成功不過三四年間耳此書謂勞身焦思七年功未及成乃東巡登宛委發金簡之書得通水之理使禹之治水七年而後得神書始知通水之理不已晚乎諸若此𩔖盖傳疑尚矣復返歸嶽乗四載陸行乗車水行乗船泥行乗橇山行乗檋橇音蕝檋丘遥切以行川始於霍山南嶽衡山又名霍山泰與岱衡與霍皆一山二名徊集五嶽詩云信彼南山惟禹甸之遂巡行四瀆與益􅇪共謀行到名山大澤召其神而問之山川脈理金玉所有鳥獸昆蟲之𩔖及八方之民俗殊國異域土地里數使益疏而記之故名之曰山海經禹三十未娶行到塗山㑹稽志塗山在山隂縣西北四十五里蘇鶚演義塗山有四一㑹稽二渝州已南舊江州三濠州四當塗縣按左氏昭公四年傳穆有塗山之㑹哀公七年𫝊禹合諸侯于塗山杜預解並云在夀春東北説者曰今濠州也栁宗元塗山銘序曰周穆遐追遺法復㑹于是山然則禹與穆王皆嘗㑹諸侯於塗山矣然非必皆夀春也若禹之所娶則未詳何地水經注江州縣水北岸有塗山南有夏禹廟塗君祠廟銘存焉常璩庾仲雍並言禹娶扵此越絶等書乃云禹娶于㑹稽塗山應劭曰在永興北永興今蕭山縣也又與郡志所載不同盖㑹稽實禹㑹侯計功之地非所娶之國下文兼載白狐九尾之異尤為可疑恐時之暮失其度制乃辭云吾娶也必有應矣乃有白狐九尾造扵禹禹曰白者吾之服也其九尾者王之證也塗山之歌曰綏綏白狐九尾厖厖我家嘉夷來賔為王成家成室我造彼昌天人之際於兹則行明矣哉禹因娶塗山謂之女嬌取辛壬癸甲吕氏春秋曰禹娶塗山氏女不以私害公自辛至甲四日復往治水禹行十月女嬌生子啓啓生不見父晝夕呱呱啼泣禹行使大章歩東西豎亥度南北淮南子禹使大章步自東極至于西垂豎亥步自南極盡于北垂許慎曰大章豎亥善行人皆禹臣暢八極之廣旋天地之數禹濟江南省水理黄龍負舟舟中人怖駭禹乃啞鳥格切笑聲易震卦笑言啞啞音同然而笑曰我受命於天竭力以勞萬民生性也死命也爾何為者顔色不變謂舟人曰此天所以為我用龍曳尾舍舟而去南到計於蒼梧檀弓舜葬扵蒼梧之野史記舜死扵蒼梧之野葬於九疑今九疑山在道州寧逺縣南六十里亦名蒼梧山而見縛人禹拊其背而哭益曰斯人犯法自合如此哭之何也禹曰天下有道民不罹辜天下無道罪及善人吾聞一男不耕有受其饑一女不桑有受其寒吾為帝統治水土調民安居使得其所今乃罹法如斯此吾徳薄不能化民證也故哭之悲耳於是周行㝢内東造絶迹西延積石地志在金城郡河關縣西南今邵州龍支縣界南踰赤㟁水經新安縣南白石山名廣陽山水曰赤岸水北過寒谷劉向别録燕有黍谷地羙而寒不生五穀鄒子居之吹律而温氣至左思賦寒谷豐黍吹律煖之也徊崑崙崑崙説曰崑崙之山三級下曰樊桐一名板松中曰𤣥圃一名閬風上曰層城一名天庭地理志在臨羌西即河源所出察六扈脈地理名金石寫流沙於西隅地理志流沙在居延西北杜佑曰在沙州西八十里其沙隨風流行故曰流沙决弱水於北漢地理志弱水在張液郡刪丹縣栁宗元曰水散渙無力不能負芥投之則委靡墊没及底而後止故曰弱青泉赤淵分入洞穴通江東流至於碣石地理在北平郡驪戎縣西南今平州之府疏九河於潛淵開五水於東北鑿龍門地志在馮翊夏陽縣今河中府龍門縣闢伊闕在洛陽西南五十里禹疏以通水兩山相對望之若闕伊水歴其間北流故曰伊闕平易相土觀地分州殊方各進有所納貢民去﨑嶇歸於中國堯曰俞以固冀扵此乃號禹曰伯禹官曰司空賜姓姒氏領統州伯以巡十二部堯崩禹服三年之䘮如䘮考妣晝哭夜泣氣不屬聲堯禪位扵舜舜薦大禹改官司徒内輔虞位外行九伯舜崩禪位命禹禹服三年形體枯槁面目黎黑讓位商均退處陽山之南史記註劉熈曰今潁川陽城是也隂河之北萬民不附商均追就禹之所状若驚鳥揚天駭魚入淵晝歌夜吟登髙號呼曰禹棄我如何所戴禹三年服畢哀民不得已即天子之位三載考功五年政定周行天下歸還大越登茅山史記註禹到大越上苖山十道志㑹稽山本名茅山一名苖山以朝四方羣臣觀示中州諸侯防風後至斬以示衆示天下悉屬禹也乃大㑹計治國之道内美釜山州慎慎當作鎮之功外演聖徳以應天心遂更名茅山曰㑹稽之山因𫝊國政休養萬民國號曰夏后封有功爵有徳惡無細而不誅功無微而不賞天下喁喁若兒思母子歸父而留越恐羣臣不從言曰吾聞食其實者不傷其枝飲其水者不濁其流吾獲覆釜之書得以除天下之災令民歸於里閭其徳彰彰若斯豈可忘乎乃納言聴諫安民治室居靡山伐木為邑畫作印横木為門調權衡平斗斛造井示民以為法度鳯凰棲扵樹鸞鳥巢於側麒麟步於庭百鳥佃於澤遂已耆艾将老歎曰吾晏嵗年暮夀将盡矣止絶斯矣命羣臣曰吾百世之後葬我㑹稽之山葦椁桐棺墨子曰禹葬㑹稽衣裘三領桐棺三寸穿壙七尺下無及泉墳髙三尺土階三等葬之後曰無改畝以為居之者樂為之者苦禹崩之後衆瑞並去天美禹徳而勞其功使百鳥還為民田大小有差進退有行一盛一衰往来有常禹崩傳位與益益服三年思禹未嘗不言䘮畢益避禹之子啟於箕山之陽史記註劉熈曰嵩髙之北諸侯去益而朝啓曰吾君帝禹子也啓遂即天子之位治國於夏遵禹貢之美悉九州之土以種五榖累嵗不絶啓使使以嵗時春秋而祭禹以越立宗廟於南山之上禹以下六世而得帝少康少康恐禹祭之絶祀乃封其庶子於越號曰無余余始受封人民山居雖有鳥田之利地理志山上有禹井禹祠相傳下有羣鳥耘田也水經註鳥為之耘春㧞草根秋啄其穢租貢纔給宗廟祭祀之費乃復隨陵陸而耕種或逐禽鹿而給食無余質朴不設宫室之飾従民所居春秋祠禹墓於㑹稽皇覽曰禹冢在㑹稽山上無余傳世十餘末君微劣不能自立轉従衆庶為編户之民禹祀斷絶十有餘嵗有人生而言語其語曰鳥禽呼嚥喋嚥喋指天向禹墓曰我是無余君之苗末我方修前君祭祀復我禹墓之祀為民請福於天以通鬼神之道衆民悦喜皆助奉禹祭四時致貢因共封立以承越君之後復夏王之祭安集鳥田之瑞以為百姓請命自後稍有君臣之義號曰無壬壬生無䁺䁺專心守國不失上天之命無䁺卒或為夫譚夫譚生元常元當作允常立當吴王夀夢諸樊闔閭之時越之興霸自元常矣越世家二十餘世至扵允常髙氏越史曰夏自少康至桀中十二世按少康元年壬午至周敬王兀年壬午凡一千五百六十一年吴之伐越見春秋昭公三十二年敬王十年也至是二千五百七十年矣越之𫝊國至於元常何止二十餘世耶
