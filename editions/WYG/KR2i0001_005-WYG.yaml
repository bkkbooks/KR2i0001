  text: 夫差内傳第五十一年夫差檀弓註夫音扶差初皆切穀梁註同北伐齊齊使大夫高氏當是高無㔻時將上軍謝呉師曰齊孤立寡國倉庫空虚民人離散齊以呉為彊輔今未往告急而呉見伐請伏國人以郊不敢陳戰爭之辭惟呉哀齊之不濫也呉師即還左傳哀公九年呉子使來徵師伐齊十年呉子使來復徴師是為夫差十年十一年也此二年方謀伐齊而此書於十一年云夫差北伐齊十二年云夫差復北伐齊是二年間呉再伐齊也與傳不合豈十一年呉嘗伐齊齊謝呉師不敢戰至明年復伐乃有艾陵之戰耶十二年夫差復北伐齊左傳哀公十一年公㑹呉子伐齊是為夫差十二年與此書合史世家乃書之夫差十一年誤也越王聞之率衆以朝於呉而以重寳厚獻太宰嚭嚭喜受越之賂愛信越殊甚日夜為言於呉王王信用嚭之計伍胥大懼曰是棄吾也乃進諫曰越在心腹之病不前除其疾今信浮辭偽詐而貪齊破齊譬由磐石之田無立其苗也願王釋齊而前越不然悔之無及呉王不聽使子胥使於齊通期戰之會子胥謂其子曰我數諫王王不我用今見呉之亾矣汝與吾俱亡亡無為也乃屬其子於齊鮑氏而還鮑氏鮑牧也屬其子改姓為王孫氏欲以避呉禍太宰嚭既與子胥有隙因讒之曰子胥為彊暴力諌願王少厚焉王曰寡人知之未興師㑹魯使子貢聘於呉十三年齊大夫陳成恒欲弑簡公隂憚高國鮑晏鮑叔牙晏嬰故前興兵伐魯魯君憂之孔子患之召門人而謂之曰諸侯有相伐者丘常耻之夫魯父母之國也丘墓在焉今齊將伐之子無意一出耶子路辭出孔子止之子張子石請行孔子弗許子貢辭出孔子遣之子貢北之齊見成恒史記子貢傳作田常因謂曰夫魯者難伐之國而君伐過矣成恒曰魯何難伐也子貢曰其城薄以卑其池狹以淺其君愚而不仁大臣無用士惡甲兵不可與戰君不若伐呉夫呉城厚而崇池廣以深甲堅器選士飽弩勁又使明大夫守之此易邦也成恒忿然作色曰子之所難人之所易子之所易人之所難而以教恒何也子貢曰臣聞君三封而三不成者大臣有所不聽者也今君又欲破魯以廣齊隳魯以自尊而君功不與焉是君上驕越絶驕字下有主心二字為是子貢傳同下恣羣臣而求以成大事難矣且夫上驕則犯子貢傳犯作恣者是臣驕則爭此君上於王有遽越絶及子貢傳皆王作主遽作郤郤與隙同而下與大臣交爭如此則君立於齊危於累卵故曰不如伐呉且呉王剛猛而毅能行其令百姓習於戰守明於法禁齊遇為擒必矣今君悉四境之甲出大臣以環之人民外死大臣内空是君上無彊敵之臣下無黔首之士孤主制齊者君也陳恒曰善雖然吾兵已在魯之城下矣吾去之呉大臣將有疑我之心為之奈何子貢曰君按兵無伐請為君南見呉王請之救魯而伐齊君因以兵迎之陳恒許諾子貢南見呉王謂呉王曰臣聞之王者不絶世而霸者無彊敵千鈞之重加銖而移今萬乘之齊而私千乗之魯而與呉爭彊臣竊為君恐焉且夫救魯顯名也伐齊大利也義存亾魯越絶義字下有在字害字上有勇在二字為是害暴齊而威彊晉則王不疑也呉王曰善雖然吾嘗與越戰棲之會稽入臣於呉不即誅之三年使歸夫越君賢主苦身勞力夜以接日内飾其政外事諸侯必將有報我之心子待我伐越而聽子子貢曰不可夫越之彊不過於魯呉之彊不過於齊主以伐越而不聽臣齊亦已私魯矣且畏小越而惡彊齊不勇也見小利而㤀大害不智也臣聞仁人不因居越絶因居作困厄以廣其徳智者不棄時以舉其功王者不絶世以立其義且夫畏越如此臣誠東見越王使出師以從下吏呉王大悦子貢東見越王王聞之除道郊迎身御至舎問曰此僻狹之國蠻夷之民大夫何索然若不辱乃至於此子貢曰君處故來處字不通越絶作弔君故來與下文弔字相應越王勾踐再拜稽首曰孤聞禍與福為鄰今大夫之弔孤之福矣孤敢不問其説子貢曰臣今者見呉王告以救魯而伐齊其心畏越且夫無報人之志而使人疑之拙也有報人之意而使人知之殆也事未發而聞之子貢傳聞之作先聞者是者危也三者舉事之大忌也越王再拜曰孤少失前人内不自量與呉人戰軍敗身辱遁逃上棲㑹稽下守海濱唯魚鼈見矣國語作是見今大夫辱弔而身見之又發玉聲以教孤孤賴天之賜也敢不承教子貢曰臣聞明主任人不失其能直士舉賢不容於世故臨財分利則使仁涉患犯難則使勇用智圖國則使賢正天下定諸侯則使聖兵强而不能行其威勢在上位而不能施其政令於下者其君幾乎難矣臣竊自擇可與成功而至王者惟幾乎惟幾乎越絶作其惟臣幾乎今呉王有伐齊晉之志君無愛重器以喜其心無惡卑辭以盡其禮而伐齊齊必戰不勝君之福也彼戰而勝必以其兵臨晉騎士鋭兵敝乎齊重寳車騎羽毛盡乎晉則君制其餘矣越王再拜曰昔者呉王分其民之衆以殘吾國殺敗吾民鄙吾百姓夷吾宗廟國為墟棘身為魚鼈國語鼈下有餌字孤之怨呉深於骨髓而孤之事呉如子之畏父弟之敬兄此孤之死言也今大夫有賜故孤敢以報情越絶作以疑請者是孤身不安重席口不嘗厚味目不視美色耳不聽雅音既已三年矣焦唇乾舌苦身勞力上事羣臣下養百姓願一與呉交戰於天下平原之野正身臂越絶作整襟交臂而奮呉越之士繼踵連死肝腦塗地者孤之願也思之三年不可得也今内量吾國不足以傷呉外事諸侯而不能也願空國棄羣臣變容貌易姓名執箕帚飬牛馬以事之孤雖知要領不屬手足異處四支布陳為鄉邑笑孤之意出焉今大夫有賜存亾國舉國語舉作興死人孤賴天賜敢不待令乎子貢曰夫呉王為人貪功名而不知利害越王慥然避位子貢曰臣觀呉王為數戰伐士卒不恩國語恩作息大臣内引讒人益衆夫子胥為人精誠中亷外明而知時不以身死隱君之過正言以忠君直行以為國其身死而不聽太宰嚭為人智而愚彊而弱巧言利辭以内其身善為詭詐以事其君知其前而不知其後順君之意以安其私是殘國傷君之佞臣也越王大悦子貢去越王送之金百鎰寳劍一良馬子貢傳馬作矛二子貢不受至呉謂吴王曰臣以下吏之言告於越王越王大恐曰昔者孤身不幸少失前人内不自量抵罪於呉軍敗身辱逋逃出走棲于會稽國為墟莽身為魚鼈越絶鼈下有餌字賴大王之賜使得奉俎豆修祭祀死且不敢􅁯何謀之敢其志甚恐將使使者來謝於王子貢館五日越使果來曰東海役臣勾踐之使者臣種敢修下吏少聞於左右昔孤不幸少失前人内不自量抵罪上國軍敗身辱逋逃㑹稽賴王賜得奉祭祀死且不㤀今竊聞大王興大義誅彊救弱困暴齊而撫周室故使賤臣以奉前王所藏甲二十領屈盧之矛步光之劍以賀君利若將遂大義敝邑雖小請悉四方之内士卒三千人以從下吏請躬被堅執鋭以前受矢石君臣死無所恨矣呉王大悦乃召子貢曰越使果來請出士卒三千其君從之與寡人伐齊可乎子貢曰不可夫空人之國悉人之衆又從其君不仁也受幣許其師辭其君即可呉王許諾子貢去晉見定公曰臣聞慮不預定不可以應卒兵不預辦不可以勝敵今呉齊將戰戰而不勝越亂之必矣與戰而勝必以其兵臨晉君為之奈何定公曰何以待之子貢曰修兵伏卒子貢傳伏作休以待之晉君許之子貢返魯呉王果興九郡之兵將與齊戰道出胥門因過姑胥之臺忽晝假寐於姑胥之臺而得夢及寤而起其心恬然悵焉乃命太宰嚭告曰寡人晝卧有夢覺而恬然悵焉請占之得無所憂哉夢入章明宫見兩䥶音歴鬲屬蒸而不炊兩黑犬嘷以南嘷以北兩鋘音呉刀名錕鋘山出金作刀可切玉殖吾宫墻流水湯湯音商流貌越吾宫堂後房鼓震篋篋有鍛工前園横生梧桐子為寡人占之太宰嚭曰美哉王之興師伐齊也臣聞章者徳鏘鏘也明者破敵聲聞功朗明也兩䥶蒸而不炊者大王聖徳氣有餘也兩黑犬嘷以南嘷以北者四夷已服朝諸侯也兩鋘殖宫墻者農夫就成田夫耕也湯湯越宫堂者鄰國貢獻財有餘也後房篋篋鼓震有鍛工者宫女悦樂琴瑟和也前園横生梧桐者樂府鼓聲也呉王大悦而其心不已召王孫駱問曰寡人忽晝夢為予陳之王孫駱曰臣鄙淺於道不能博大今王所夢臣不能占其有所知者東掖門亭長長城公弟越絶長城公弟作越公弟子公孫聖聖為人少而好游長而好學多見博觀知鬼神之情狀願王問之王乃遣王孫駱往請公孫聖曰呉王晝卧姑胥之臺忽然感夢覺而悵然使子占之急詣姑胥之臺公孫聖伏地而泣有頃而起其妻從旁謂聖曰子何性鄙希睹人主卒得急召弟泣如雨公孫聖仰天嘆曰悲哉非子所知也今日壬午時加南方命屬上天不得逃亾非但自哀誠傷呉王妻曰子以道自達於主有道當行上以諫王下以約身今聞急召憂惑潰亂非賢人所宜公孫聖曰愚哉女子之言也吾受道十年隱身避害欲紹夀命不意卒得急召中世自棄故悲與子相離耳遂去詣姑胥臺呉王曰寡人將北伐齊救魯道出胥門過姑胥之臺忽然晝夢子為占之其言吉凶公孫聖曰臣不言身名全言之必死百段於王前然忠臣不顧其軀乃仰天嘆曰臣聞好船者必溺好戰者必亾臣好直言不顧於命願王圖之臣聞章者戰不勝敗走傽偟也明者去昭昭就㝠㝠也入門見䥶蒸而不炊者大王不得火食也兩黑犬嘷以南嘷以北者黑者隂也北者匿也兩鋘殖宫墻者越軍入呉國伐宗廟掘社稷也流水湯湯越宫堂者宫空虚也後房鼓震篋篋者坐太息也前園横生梧桐者梧桐心空不為用器但為育僮越絶育作甬僮作當者是與死人俱葬也願大王按兵修徳無伐於齊則可銷也遣下吏太宰嚭王孫駱解冠幘肉袒徒跣稽首謝於勾踐國可安存也身可不死矣呉王聞之索然作怒乃曰吾天之所生神之所使顧力士石畨以鐡鎚擊殺之聖乃仰頭向天而言曰吁嗟天知吾之寃乎忠而獲罪身死無辜以葬我以為直者不如相隨為柱提我至深山後世相屬為聲響於是吳王乃使門人提之蒸丘一名蒸山又名陽山在呉縣西北三十里豺狼食汝肉野火燒汝骨東風數至飛揚汝骸骨肉縻爛何能為聲響哉太宰嚭趨進曰賀大王喜災已滅矣因舉行觴兵可以行呉王乃使太宰嚭為右校司馬王孫駱為左校乃從勾踐之師伐齊伍子胥聞之諫曰臣聞興十萬之衆奉師千里百姓之費國家之出日數千金不念士民之死而爭一日之勝臣以為危國亾身之甚且與賊居不知其禍外復求怨徼幸他國猶治救瘑古禾切疽瘡也疥而棄心腹之疾發當死矣瘑疥皮膚之疾不足患也今齊陵遲千里之外更歴楚趙之界齊為疾其疥耳越之為病乃心腹也不發則傷動則有死願大王定越而後圖齊臣之言决矣敢不盡忠臣今年老耳目不聰以狂惑之心無能益國竊觀金匱第八其可傷也呉王曰何謂也子胥曰今年七月辛亥平旦大王以首事辛歲位也亥隂前之辰也合壬子歲前合也利以行武武决勝矣然徳在合斗擊丑丑辛之本也大吉為白虎而臨辛功曹為太常所臨亥大吉得辛為九醜又與白虎并重有人若以此首事前雖小勝后必大敗天地行殃禍不久矣呉王不聽遂九月使太宰嚭伐齊軍臨北郊呉王謂嚭曰行矣無忘有功無赦有罪愛民飬士視如赤子與智者謀與仁者友太宰嚭受命遂行呉王召大夫被離問曰汝常與子胥同心合志并慮一謀寡人興師伐齊子胥獨何言焉被離曰子胥欲盡誠於前王自謂老狂耳目不聰不知當世之所行無益呉國王遂伐齊齊與呉戰於艾陵齊地之上齊師敗績呉王既勝乃使行人成好於齊曰呉王聞齊有没水之慮帥軍來觀而齊興師蒲草呉不知所安集設陣為備不意頗傷齊師願結和親而去齊王曰寡人處此北邊無出境之謀今呉乃濟江淮踰千里而來我壤土戮我衆庶賴上帝哀存國猶不至顚隕王今讓以和親敢不如命呉齊遂盟而去呉王還乃讓子胥曰吾前王履徳明達於上帝垂功用力為子西結彊讎於楚今前王譬若農夫之艾與刈同漢書項羽傳斬将艾旗賈誼䇿若艾草菅並音刈殺四方蓬蒿以立名于荆蠻斯亦大夫之力今大夫昏耄而不自安生變起詐怨惡而出出則罪吾士衆亂吾法度欲以妖孽挫衂吾師賴天降哀齊師受服寡人豈敢自歸其功乃前王之遺徳神靈之祐福也若子於呉則何力焉伍子胥攘臂大怒釋劍而對曰昔吾前王有不庭之臣以能遂疑計不陷於大難今王播棄所患外不憂此孤僮之謀非霸王之事天所未棄必趨其小喜而近其大憂王若覺寤呉國世世存焉若不覺寤呉國之命斯促矣員不忍稱疾辟易乃見王之為擒員誠前死掛子胥傳作抉吾目於門以觀呉國之喪呉王不聽坐於殿上獨見四人向庭相背而倚王恠而視之羣臣問曰王何所見王曰吾見四人相背而倚聞人言則四分走矣子胥曰如王言將失衆矣呉王怒曰子言不祥子胥曰非惟不祥王亦亡矣後五日呉王復坐殿上望見兩人相對北向人殺南向人王問羣臣見乎曰無所見子胥曰王何見王曰前日所見四人今日又見二人相對北向人殺南向人子胥曰臣聞四人走叛也北向殺南向臣殺君也王不應呉王置酒文臺之上羣臣悉在太宰嚭執政越王侍坐子胥在焉王曰寡人聞之君不賤有功之臣父不憎有力之子今太宰嚭為寡人有功吾將爵之上賞越王慈仁忠信以孝事於寡人吾將復增其國以還助伐之功於衆大夫何如羣臣賀曰大王躬行至徳虚心養士羣臣竝進見難争死名號顯著威震四海有功蒙賞亾國復存霸功王事咸被羣臣於是子胥據地垂涕曰於乎哀哉遭此黙黙忠臣掩口讒夫在側政敗道壞諂諛無極邪説偽辭以曲為直舎讒攻忠將滅呉國宗廟既夷社稷不食城郭丘墟殿生荆棘呉王大怒曰老臣多詐為呉妖孽乃欲專權擅威獨傾呉國寡人以前王之故未忍行法今退自計無沮呉謀子胥曰今臣不忠不信不得為前王之臣臣不敢愛身恐吾國之亡矣昔者桀殺關龍逢紂殺王子比干今大王誅臣參於桀紂大王勉之臣請辭矣子胥歸謂被離曰吾貫弓接矢於鄭楚之界越渡江淮自致於斯前王聽從吾計破楚見凌之讎欲報前王之恩而至於此吾非自惜禍將及汝被離曰未諫不聽自殺何益何如亾乎子胥曰亾臣安往呉王聞子胥之怨恨也乃使人賜屬鏤之劍屬鏤劍名鏤力俱切又力侯切子胥受劍徒跣褰裳下堂中庭仰天呼怨曰吾始為汝父忠臣立呉設謀破楚南服勁越威加諸侯有霸王之功今汝不用吾言反賜我劒吾今日死呉宫為墟庭生蔓草越人掘汝社稷安㤀我乎昔前王不欲立汝我以死爭之卒得汝之願公子多怨於我我徒有功於呉今乃㤀我定國之恩反賜我死豈不謬哉呉王聞之大怒曰汝不忠信為寡人使齊託汝子於齊鮑氏有我外之心急令自裁孤不使汝得有所見子胥把劍仰天歎曰自我死後後世必以我為忠上配夏殷之世亦得與龍逢比干為友遂伏劍而死左傳哀公十一年呉王賜子胥屬鏤以死是為夫差十二年此書載其事於十三年或者子胥十二年使齊十三年反役左氏連書之耳呉王乃取子胥屍盛以䲭夷之器子胥傳盛以䲭夷革應劭曰取馬革為䲭夷䲭夷榼形投之於江中言曰胥汝一死之後何能有知即斷其頭置高樓上謂之曰日月炙汝肉飄風飄汝眼炙光燒汝骨魚鼈食汝肉汝骨變形灰有何所見乃棄其軀投之江中子胥因隨流揚波依潮來往蕩激崩岸於是呉王謂被離曰汝嘗與子胥論寡人之短乃髠被離而刑之王孫駱聞之不朝王召而問曰子何非寡人而不朝乎駱曰臣恐耳曰子以我殺子胥為重乎駱曰大王氣高子胥位下王誅之臣命何異於子胥臣以是恐也王曰非聽宰嚭以殺子胥胥圖寡人也駱曰臣聞人君者必有敢諫之臣在上位者必有敢言之交夫子胥先王之老臣也不忠不信不得為前王臣呉王中心悷然悔殺子胥豈非宰嚭之讒子胥而欲殺之駱曰不可王若殺嚭此為二子胥也於是不誅十四年夫差既殺子胥連年不熟民多怨恨呉王復伐齊闕闕義與掘同左傳闕地及泉是也國語解闕穿也為闕溝於商魯之間北屬蘄國語作沂者是西屬濟欲與魯晉合攻於黄池之上恐羣臣復諫乃令國中曰寡人伐齊有敢諫者死太子友知子胥忠而不用太宰嚭佞而專政欲切言之恐罹尤也乃以諷諫激於王清旦懷丸持彈從後園而來衣袷祫當作洽沾也履濡王怪而問之曰子何為袷衣濡履體如斯也太子友曰適游後園聞秋蜩之聲往而觀之夫秋蟬登高樹飲清露隨風撝撓長吟悲鳴自以為安不知螳蜋超枝縁條曵腰聳距而稷其形夫螳蜋翕心而進志在有利不知黄雀盈緑林徘徊枝隂微進欲啄螳蜋夫黄雀但知伺螳蜋之有味不知臣挾彈危擲蹭蹬飛丸而集其背今臣但虚心志在黄雀不知空埳其旁闇忽埳中陷於深井臣故袷體濡履幾為大王取笑王曰天下之愚莫過於斯但貪前利不覩后患太子曰天下之愚復有甚者魯承周公之末有孔子之教守仁抱徳無欲於鄰國而齊舉兵伐之不愛民命惟有所獲夫齊徒舉而伐魯不知呉悉境内之士盡府庫之財暴師千里而攻之夫呉徒知踰境征伐非吾之國不知越王將選死士出三江之口三江一説松江錢塘浦陽江也呉郡賦註松江下七十里分流東北入海者為婁江東南流者為東江併松江為三江今其地亦名三江口即范蠡乘舟所出之地入五湖之中五湖一説貢湖遊湖胥湖梅梁湖金鼎湖也韋昭曰胥湖蠡湖洮湖滆湖就太湖而五虞翻云太湖之水通五道謂之五湖屠我呉國滅我呉官天下之危莫過於斯也呉王不聽太子之諌遂北伐齊越王聞呉王伐齊使范蠡􅂥庸率師屯海通江以絶呉路敗太子友於始熊夷始當作姑國語敗王子友於姑熊夷韋昭解姑熊夷呉郊也通江淮轉襲呉遂入呉國燒姑胥臺徙其大舟即餘皇舟也呉敗齊師於艾陵之上還師臨晉與定公爭長未合邊候呉王夫差大懼合諸臣謀曰吾道遼逺無會前進孰利王孫駱曰不如前進則執諸侯之柄以求其志請王屬士以明其令勸之以高位辱之以不從令各盡其死夫差昏秣馬食音飼士服兵被甲勒馬銜枚出火於造闇行而進呉師皆文犀長盾扁諸之劍闔廬既鑄成干將莫耶二劍餘鑄得三千並號扁諸之劍方陣而行中校之軍皆白裳白髦素甲素羽之矰短矢韋昭曰矢名望之若荼周禮望而眡之欲其荼白也註韋革逺眡之當如茅秀之色詩有女如荼箋荼英荼也孔氏曰荼是茅草秀出之穗英是白貌王親秉鉞戴旗以陣而立左軍皆赤裳赤髦丹甲朱羽之矰望之若火右軍皆𤣥裳𤣥輿黑甲烏羽之矰望之如墨帶甲三萬六千鷄鳴而定陣去晉軍一里天尚未明王乃親鳴金鼓三軍譁吟以振其旅其聲動天徙地晉大驚不出反距堅壘乃令童褐請軍國語作董褐請事董褐晉大夫司馬演也請問也曰兩軍邊國語作偃兵接好日中無期今大國越次而造敝邑之軍壘敢請辭故國語辭作亂謂先期亂次之故呉王親對曰天子有命周室卑弱約諸侯貢獻莫入王府上帝鬼神而不可以告無姬姓之所振懼遣使來告冠葢不絶於道始周攸負於晉故忽於夷狄會晉今反叛如斯吾是以蒲服就君史記范睢傳膝行蒲服詩匍匐救之檀弓作扶服其義皆同言盡力也不肯長弟徒以爭彊孤進不敢去君不命長為諸侯笑孤之事君决决字疑衍在今其不得事君命命字當作亦在今日矣敢煩使者往來孤躬親聽命於藩籬之外童褐將還呉王躡左足與褐决矣及報與諸侯大夫列坐於晉定公前既以通命乃告趙鞅曰臣觀呉王之色𩔖有大憂小則嬖妾嫡子死否則呉國有難大則越人入不得還也其意有愁毒之憂進退輕難不可與戰主君宜許之以前期無以爭行而危國也然不可徒許必明其信趙鞅許諾入謁定公曰姬姓於周呉為先老可長以盡國禮定公許諾命童褐復命於是呉王愧晉之義乃退幕而㑹二國君臣並在呉王稱公前國語前字下有㰱字晉侯次之羣臣畢盟呉既長晉而還未踰於黄池越聞呉王乆留未歸乃悉士衆將踰章山章山即禹貢所謂内方在江夏郡竟陵縣東北今荆門長林縣濟三江而欲伐之呉又恐齊宋之為害乃命王孫駱告勞于周曰昔楚不承供貢辟逺兄弟之國吾前君闔閭不忍其惡帶劍挺鈹與楚昭王相逐於中原天舍其忠國語作衷楚師敗績今齊不賢國語作鑒於楚又不恭王命以逺辟兄弟之國夫差不忍其惡被甲帶劍徑至艾陵天福於呉齊師還鋒而退夫差豈敢自多其功是文武之徳所祐助時歸呉不熟於歲遂縁江泝淮縁當作沿順流而下泝逆流而上開溝深水出於商魯之間而歸告於天子執事周王答曰伯父令子來乎盟國一人則依矣余實嘉之伯父若能輔余一人則兼受永福周室何憂焉乃賜弓弩王阼以增號諡以上所記與國語大同小異帷太子友之諌國語不載呉王還歸自池池字上當有黄字息民散兵二十年越王興師伐呉吳與越戰於檇李呉師大敗軍散死者不可勝計越追破吳呉王困急使王孫駱稽首請成如越之來也越王對曰昔天以越賜呉吳不受也今天以呉賜越其可逆乎吾請獻勾甬東之地勾句章甬甬江東東境也杜預曰甬東會稽句章縣東海中洲也今鄞縣境句音勾又九具切吾與君為二君乎呉王曰吾之在周禮前王一飯如越王不􅁯周室之義而使為附邑亦寡人之願也行人請成列國之義惟君王有意焉大夫種曰呉為無道今幸擒之願王制其命越王曰吾將殘汝社稷夷汝宗廟呉王黙然請成七反越王不聽二十三年十月越王復伐呉魯哀公十二年十七年越一再伐呉二十年越圍呉皆夫差十四年十八年二十一年事此書皆不載史於夫差二十年書越復伐呉乃哀公十九年也傳止云侵楚誤吳杜預解誤吳使不為備初無伐吳事此云越復伐呉即哀公二十二年傳書越滅吳之歲也呉國困不戰士卒分散城門不守遂屠呉吳王率羣臣遁去晝馳夜走三日三夕達於秦餘杭山即陽山别名胸中愁憂目視茫茫行步猖狂腹餒口饑顧得生稻而食之伏地而飲水顧左右曰此何名也對曰是生稻也吳王曰是公孫聖所言不得火食走傽偟也王孫駱曰飽食而去前有胥山在呉縣西四十里子胥傳云呉王取子胥屍浮之江中呉人憐之為立祠於江上因命曰胥山寰宇記亦同西坂中可以匿止王行有頃因得生𤓰已熟呉王掇而食之謂左右曰何冬而生𤓰近道人不食何也左右曰謂糞種之物人不食也呉王曰何謂糞種左右曰盛夏之時人食生𤓰起居道旁子復生秋霜惡之故不食呉王歎曰子胥所謂且食者也謂太宰嚭曰吾戮公孫聖投胥山之巔吾以畏責天下之慙吾足不能進心不能往太宰嚭曰死與生敗與成故有避乎王曰然曾無所知乎子試前呼之聖在當即有應吳王止秦餘杭山呼曰公孫聖三反呼聖從山中應曰公孫聖三呼三應呉王仰天呼曰寡人豈可返乎寡人世世得聖也得字下當有事字越絶云今寡人得邦誠世世相事須㬰越兵至三圍呉范蠡在中行左手提鼓右手操枹而鼓之呉王書其矢而射種蠡之軍辭曰吾聞狡兎以死良犬就烹敵國如滅謀臣必亾今呉病矣大夫何慮乎大夫種相國蠡急而攻大夫種書矢射之曰上天蒼蒼若存若亾越君勾踐下臣種敢言之昔天以越賜呉吳不肯受是天所反勾踐敬天而功既得返國今上天報越之功敬而受之不敢㤀也且呉有大過六以至於亾王知之乎有忠臣伍子胥忠諫而身死大過一也公孫聖直説而無功大過二也太宰嚭愚而佞言輕而讒諛妄語恣口聽而用之大過三也夫齊晉無返逆行無僣侈之過而呉伐二國辱君臣毁社稷大過四也且呉與越同音共律上合星宿下共一理而呉侵伐大過五也昔越親戕呉之前王罪莫大焉而幸伐之不從天命而棄其仇後為大患大過六也徐天祐曰夫差惑於宰嚭之言㤀父之讎釋越不誅為不孝然在越則幸矣越欲責呉若曰囚辱吾君與君夫人使莝芻飬馬給水除糞猶為有辭今而曰越之罪莫大焉而以呉赦越為大過種也無乃失辭乎越王謹上列青天敢不如命大夫種謂越君曰中冬氣定天將殺戮不行天殺反受其殃越王敬拜曰諾今圖呉王將為何如大夫種曰君被五勝之衣帶步光之劍仗屈盧之矛瞋目大言以執之越王曰諾乃如大夫種辭呉王曰誠以今日聞命言有頃呉王不自殺越王復使謂曰何王之忍辱厚恥也世無萬歲之君死生一也今子尚有遺榮何必使吾師衆加刃於王呉王仍未肯自殺勾踐謂種蠡曰二子何不誅之種蠡曰臣人臣之位不敢加誅於人主願主急而命之天誅當行不可乆留越王復瞋目怒曰死者人之所惡惡者無罪於天不負於人今君抱六過之罪不知愧辱而欲求生豈不鄙哉呉王乃太息四顧而望言曰諾乃引劍而伏之死越王謂太宰嚭曰子為臣不忠無信亡國滅君乃誅嚭并妻子呉世家曰越王滅呉誅太宰嚭越世家亦曰越王乃葬呉王而誅太宰嚭此書又云并誅其妻子則呉王之自殺也嚭亦同時就誅矣徐天祐曰愚按越滅呉之後二年是為哀公二十四年公如越將妻公而多與之地季孫懼使因太宰嚭而納賂焉乃止然則呉之亾也嚭遂如越夫固無恙也史世家及此書所載何其與左氏相戻也且嚭貪而佞至於亾國喪君死有餘戮越人既生之又從而信任之豈以其實嘗私越而不以其不忠為罪耶漢丁公之戮可以教天下之為人臣者越於是乎失刑矣呉王臨欲伏劍顧謂左右曰吾生既慙死亦愧矣使死者有知吾羞前君地下不忍覩忠臣伍子胥及公孫聖使其無知吾負於生死必連繴國語組字上有結字組以罩吾目恐其不蔽願復重羅繡三幅以為掩明生不昭我死勿見我形吾何可哉越王乃葬呉王以禮於秦餘杭山卑猶越絶曰夫差冡在猶亭西卑猶位近太湖去縣十七里索隠曰猶亭亭名卑猶位三字共為地名呉地記曰餘杭山一名卑猶山是也越王使軍士集于我戎之功人一隰越絶隰作累土以葬之宰嚭亦葬卑猶之旁越絶言宰嚭之死者五曰擒夫差殺太宰嚭曰殺太宰嚭逢同與其妻子曰殺夫差而戮其相曰殺太宰嚭戮其妻子曰禽夫差而戮太宰嚭與其妻子又曰三臺者嚭妻子死所也常疑越絶書非子貢作特後人托名耳何以知其非子貢作越絶肉傳於説陳成恒之事終之曰子貢一出存魯亂齊破呉彊晉霸越楚也斯言也乃後之人多其功是非子貢之言也且他文亦不類或者所載未必盡實宰嚭得保首領以没葢幸而免前既備論之矣此書謂亦葬卑猶之旁豈其後嚭死於越而返葬於呉耶然呉時諸冢墓如巫臣要離干將之𩔖皆具載圖志獨不及宰嚭冡則何也
