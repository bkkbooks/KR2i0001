front:
  text: 勾踐歸國外傳第八越王勾踐臣吳至歸越勾踐七年也國語勾踐與范蠡入臣於吳三年而吳人遣之當魯哀公五年是為勾踐七年正與此合此書於勾踐五年書入吳事至是歸國首尾三年也百姓拜之於道曰君王獨無苦矣今王受天之福復於越國霸王之迹自斯而起王曰寡人不慎天教無徳於民今勞萬姓擁於岐路将何徳化以報國人顧謂范蠡曰今十有二月己巳之日時加禺中禺音隅禺中時加已也淮南曰臻于衡陽是謂禺中對于昆吾是謂正中孤欲以此到國何如蠡曰大王且留以臣卜日於是范蠡進曰闕異哉大王之擇日也王當疾趨車馳人走越王䇿馬飛輿遂復宫闕吳封地百里於越東至炭瀆越舊經炭瀆在㑹稽縣東六十里越絶曰勾踐稱炭聚載従炭瀆至鍊塘㑹稽志作炭浦西止周宗南造於山北薄於海越王謂范蠡曰孤獲辱連年勢足以死得相國之䇿再返南鄉今欲定國立城人民不足其功不可以興為之奈何范蠡對曰唐虞卜地夏殷封國古公營城周雒威折萬里徳致八極豈直欲破彊敵收鄰國乎越王曰孤不能承前君之制修徳自守亡衆棲於㑹稽之山請命乞恩受辱被恥囚結吳宫幸来歸國追以百里之封将遵前君之意復以㑹稽之上而宜釋吳之地范蠡曰昔公劉去邰而徳彰於夏亶父讓地而名發於岐今大王欲欲字下當有立字國樹都并敵國之境不處平易以豉切之都據四逹之地将焉於䖍切立霸王之業越王曰寡人之計未有决定欲築城立郭分設里閭欲委屬於相國於是范蠡乃觀天文擬法於紫宫築作小城周千一百二十一歩一圓三方西北立龍飛翼之樓以象天門東南伏漏石竇以象地户陵門四逹以象八風外郭築城而缺西北示服事吳也不敢壅塞内以取吳故缺西北而吳不知也北向稱臣委命吳國左右易處易音亦處上聲不得其位明臣屬也城既成而怪山自生者琅琊東武海中山也一夕自来故名怪山即龜山也在府東南二里一名飛来一名寶林一名怪山越絶曰龜山勾踐所起㳺臺也寰宇記龜山即琅瑘東武山一夕移於此范蠡曰臣之築城也其應天矣崑崙之象存焉越王曰寡人聞崑崙之山乃地之林上承皇天氣吐宇内下處后土禀受無外滋聖生神嘔養帝㑹故帝字上當有五字帝處其陽陸三王居其正地吾之國也扁扁疑當作偏天地之壤乗東南之維斗去極北非糞土之城何能與王者比隆盛哉范蠡曰君徒見外未見於内臣乃承天門制城合氣於后土嶽象已設崑崙故出越之霸也越王曰茍如相國之言孤之命也范蠡曰天地卒號以著其實名東武起游臺其上東南為司馬門立増樓増與層同冠其山巔以為靈臺水經註怪山者越起靈臺扵山上又作三層樓以望雲物起離宫於淮陽越絶曰離臺周五百六十步在淮陽里丘越舊經淮陽宫在㑹稽縣東南二里中宿臺在於髙平越絶宿作指云中指臺馬丘周六百步在髙平里越舊經巾宿在㑹稽縣東七里駕臺在於成丘越絶駕臺馳於離丘立苑於樂野越絶曰越王弋獵之處大樂故
