body:
  text: 謂樂野其山上石室越王所休謀也十道志樂野勾踐以此野為苑今有樂瀆村燕臺在於石室越舊經宴臺在州東南十里齋臺在於襟山按越境無襟山越絶曰稷山者勾踐齋戒臺也既曰齋臺則襟當作稷稷山在㑹稽縣東五十三里勾踐之出㳺也休息食室於氷厨一曰氷室所以備膳羞也越王乃召相國范蠡大夫種大夫郢問曰孤欲以今日上明堂臨國政專恩致令以撫百姓何日可矣惟三聖謂聖臣也指上三人而言子胥曰越有聖臣范蠡紀綱維持范蠡曰今日丙午日也丙陽将也是日吉矣又因良時臣愚以為可無始有終得天下之中大夫種曰前車已覆後車必戒願王深察范蠡曰夫子故不一二見也吾王今以丙午復初臨政解救其本是一宜夫金制始而火救其終是二宜蓄金之憂轉而及水是三宜君臣有差不失其理是四宜王相去聲俱起天下立矣是五宜臣願急升明堂臨政越王是日立政翼翼小心出不敢奢入不敢侈越王念復吳讎非一旦也苦身勞心夜以接日目臥則攻之以蓼足寒則漬之以水冬常抱氷夏還握火愁心苦志懸膽於户出入嘗之不絶於口中夜潛泣泣而復嘯越王曰吳王好服之離體吾欲采葛詩毛氏箋葛所以為絺綌使女工織細布獻之以求吳王之心於子何如羣臣曰善乃使國中男女入山采葛會稽縣東十里有葛山越絶曰勾踐種葛使越女治葛布獻吳王以作黄絲之布欲獻之未及遣使吳王聞越王盡心自守食不重味衣不重綵雖有五臺之游未嘗一日登翫吾欲因而賜之以書増之以封東至於勾甬西至於檇李南至於姑末即春秋越姑蔑之地姑蔑地名有二魯國下縣南有姑蔑城越之姑蔑至秦屬㑹稽為太末縣今衢州北至於平原越絶作武原今海鹽縣縦横八百餘里越王乃使大夫種索葛布十萬甘蜜丸党韻㑹引吳越春秋越以甘蜜丸欓報吳増封之禮謂欓為越椒今此書無丸欓二字詳下文文笥之𩔖皆以數計則甘蜜當作九瓽玉篇瓽丁盎切盆也此党字誤文笥七枚狐皮五雙晉竹十廋廋當作搜漢溝洫志漕船五百搜今文作艘音騷船總名也或作㮴以復封禮吴王得之曰以越僻狄狄當作狹之國無珍今舉其貢貨而以復禮此越小心念功不忘吳之效也夫越本興國千里吾雖封之未盡其國子胥聞之退臥於舎謂侍者曰吾君失其石室之囚縦於南林之中今但因虎豹之野而與荒外之草於吾之心其無損也吳王得葛布之獻乃復増越之封賜羽毛之飾机杖諸侯之服越國大悦采葛之婦傷越王用心之苦乃作苦之詩事𩔖引吴越春秋曰乃作若何之歌㑹稽賦註亦引此書曰乃作何苦之詩曰葛不連蔓葉台台音貽我君心苦命更之嘗膽不苦甘如飴事𩔖賦及越舊經所引皆作味若飴令我采葛以作絲文選註引采葛婦詩有饑不遑食四體疲一句此書無之闕文也女工織兮不敢遲弱於羅兮輕霏霏號絺素兮将獻之越王悦兮忘罪除吳王歡兮飛尺書増封益地賜羽竒机杖茵褥諸侯儀羣臣拜舞天顔舒我王何憂能不移於是越王内修其徳外布其道君不名教臣不名謀民不名使官不名事國中蕩蕩無有政令越王内實府庫墾其田疇民富國彊衆安道泰越王遂師八臣與其四友時問政焉大夫種曰愛民而已越王曰奈何種曰刑之無害成之無敗生之無殺與之無奪越王曰願聞種曰無奪民所好則利也民不失其時則成之省刑去罰則生之薄其賦斂則與之無多臺游則樂之静而無苛則喜之民失所好則害之農失其耕則敗之有罪不赦則殺之重賦厚斂則奪之多作臺游以罷音疲民則苦之勞擾民力則怒之詳文意上文與之無奪以下當有樂之無苦喜之無怒二句臣聞善為國者遇民如父母之愛其子如兄之愛其弟聞有饑寒為之哀見其勞苦為之悲越王乃緩刑薄罰省其賦斂於是人民殷富皆有帶甲之勇九年正月越王召五大夫而告之曰昔者越國遁棄宗廟身為窮虜恥聞天下辱流諸侯今寡人念吴猶躃者不忘走盲者不忘視孤未知䇿謀惟大夫誨之扶同曰昔之亡國流民天下莫不聞知今欲有計不宜前露其辭臣聞擊鳥之動故前俯伏此上八字文衍猛獸将擊必餌餌當作弭毛帖伏鷙鳥将搏必車飛戢翼聖人将動必順辭和衆聖人之謀不可見其象不可知其情臨事而伐故前無剽過之兵後無伏襲之患今大王臨敵破吳宜損之辭無令泄也臣聞吳王兵彊於齊晉而結怨於楚大王宜親於齊深結於晉隂固於楚而厚事於吳夫吳之志猛驕而自矜必輕諸侯而凌鄰國三國决權還為敵國必角勢交争越承其弊因而伐之可克也雖五帝之兵無以過此范蠡曰臣聞謀國破敵動觀其符孟津之㑹諸侯曰可武王辭之方今吳楚結讎構怨不解齊雖不親外為其救晉雖不附猶效其義夫内臣謀而决讎其䇿鄰國通而不絶其援斯正吳之興霸諸侯之上尊臣聞峻髙者隤亦作頽下墜也茂葉者摧曰中則移月滿則虧四時不並盛五行不俱馳隂陽更唱唱當作倡氣有盛衰故溢堤之水不掩其量熻乾之火不復其熾水静則無漚瀴之怒火消則無熹毛之􅉯今吳乗諸侯之威以號令於天下不知徳薄而恩淺道狭而怨廣權懸而智衰力竭而威折兵挫而軍退士散而衆解臣請按師整兵待其壊敗隨而襲之兵不血刃士不旋踵吳之君臣為虜矣臣願大王匿聲無見其動以觀其静大夫苦成曰夫水能浮草木亦能沉之地能生萬物亦能殺之江海能下谿谷亦能朝之聖人能從衆亦能使之今吳承闔閭之軍制子胥之典教政平未虧戰勝未敗大夫嚭者狂佞之人達於䇿慮輕於朝事子胥力於戰伐死於諫議二人權必有壊敗願王虚心自匿無示謀計則吳可滅矣大夫浩曰今吳君驕臣奢民飽軍勇外有侵境之敵内有争臣之震其可攻也大夫句如左傳國語皆作皋如曰天有四時人有五勝五徳迭相勝也史歴書秦滅六國頗據五勝而自以為獲水徳之瑞前漢律厯志同昔湯武乗四時之利而制夏殷桓繆據五勝之便而列六國此乗其時而勝者也王曰未有四時之利五勝之便願各就職也
