front:
  text: 勾踐入臣外傳第七越王勾踐五年五月與大夫種范蠡吕氏春秋髙誘解范蠡楚三户人也字少伯大夫種姓文氏字㑹楚之鄒人按鄒本邾子之國此云楚之鄒人盖鄒為楚所并爾又太史公素王妙論曰范蠡本南陽人列仙𫝊云徐人索隠曰大夫官種名也一云大夫姓猶司馬司空之比今按大夫官名如以為姓也則大夫逢同大夫皋如等豈皆其姓耶入臣於吴羣臣皆送至浙江之上臨水祖道祖餞行也軍陣固陵范蠡教兵城也水經註浙江又逕固陵城北昔范蠡築城扵浙江之濵言可以固守謂之固陵今之西陵也即今西興地大夫文種前為祝其辭曰皇天祐助前沉後揚禍為徳根憂為福堂威人者滅服從者昌王雖牽致其後無殃君臣生離感動上皇衆夫哀悲莫不感傷臣請薦脯行酒三觴越王仰天太息舉杯垂涕黙無所言種復前祝曰大王徳夀無疆無極乾坤受靈神祇輔翼我王厚之祉祐在側徳銷百殃利受其福去彼吴庭来歸越國觴酒既升請稱萬嵗越王曰孤承前王餘徳守國於邊幸䝉諸大夫之謀遂保前王丘墓今遭恥辱為天下笑将孤之罪耶諸大夫之責也吾不知其咎願二三子論其意大夫扶同史記作逢同曰何言之鄙也昔湯繫於夏臺史夏紀桀曰吾悔不遂殺湯扵夏臺索隠夏臺嶽名夏曰釣臺皇甫謐云地在陽翟伊尹不離其側文王囚扵石室地理志河内湯隂有姜里城西伯所拘處此云石室疑即所囚之室也羑音酉太公不棄其國興衰在天存亡繫於人湯改儀而媚扵桀文王服從而幸扵紂夏殷恃力而虐二聖兩君屈已以得天道故湯王不以窮自傷周文不以困為病越王曰昔堯任舜禹而天下治雖有洪水之害不為人災變異不及於民豈况於人君乎大夫苦成曰不如君王之言天有厯數徳有薄厚黄帝不讓堯𫝊天子三王臣弑其君五霸子弑其父徳有廣狭氣有髙下今之世猶人之市置貨以設詐抱謀以待敵不幸陷厄求伸而已大王不覽於斯而懐喜怒越王曰任人者不辱身自用者危其國大夫皆前圖未然之端傾敵破讎坐招泰山之福今寡人守窮若斯而云湯文困厄後必霸何言之違禮儀夫君子争寸隂而棄珠玉今寡人冀得免於軍旅之憂而復反係獲獲當作扵敵人之手身為傭隸妻為僕妾往而不返客死敵國若魂魄有此下當有知字謂於前君其無知體骨棄捐何大夫之言不合於寡人之意於是大夫種范蠡曰聞古人曰居不幽志不度形不愁思不逺聖王賢主皆遇困厄之難䝉不赦之恥身居而名尊軀辱而聲榮處卑而不以為惡居危而不以為薄五帝徳厚而而當作無窮厄之恨然尚有泛濫之憂此下疑有􅇅文三守暴困之辱不離三獄之困泣涕而受寃行哭而為𨽻演易作卦司馬遷書西伯拘而演周易天道祐之時過於期否終則泰諸侯並救王命見符朱鬛𤣥狐太公六韜曰商王拘周伯昌扵羑里太公與散宜生以金十鎰求天下珍物以免君之罪扵是得犬戎氏文馬豪毛朱鬛目如黄金名雞斯之乗又淮南子曰散宜生以千金得騶虞之乗𤣥玉百㲄大貝百朋𤣥豹黄熊青犴白虎文皮千合獻紂以免西伯羑里之囚此云𤣥狐當作𤣥豹輔臣結髪折獄破械反國修徳遂討其讎摧假海内若覆手背天下宗之功垂萬世大王屈厄臣誠盡謀夫截骨之劍無削剟之利臽鐡之矛無分髪之便建䇿之士無暴興之説今臣遂天文案墬籍二氣共崩存亡互處彼興則我辱我霸則彼亡二國争道未知所就大王之危天道之數何必自傷哉夫吉者凶之門福者禍之根今大王雖在危困之際孰知其非暢達之兆哉大夫計􅒍越絶􅒍作倪史貨殖𫝊越王勾踐困扵㑹稽之上乃用范蠡計然註徐廣曰計然者范蠡之師也名研故諺曰研桑心筭裴駰案范子曰計然者葵丘濮上人姓莘氏字文子其先晉國亾公子也南游扵越范蠡師事之蔡謨曰蠡所著書名計然盖非也漢書古今人表計然列在第四倪與研聲相近而相亂耳曰今君王國於㑹稽窮於入吴言悲辭苦羣臣泣之雖則恨悷之心莫不感動而君王何為漫辭譁説用而相欺臣誠不取越王曰寡人将去入吴以國累諸大夫願各自述吾将屬焉大夫皋如曰臣聞大夫種忠而善慮民親其知士樂為用今委明一人其道必守何順心佛命羣臣佛符勿切大也詩佛時仔肩音弼註亦作大言一人足矣何必従心所欲大命羣臣也大夫曵庸左傳作后庸國語作舌庸曰大夫文種者國之梁棟君之爪牙夫驥不可與匹馳日月不可並照君王委國於種則萬綱千紀無不舉者越王曰夫國者前王之國孤力弱勢劣不能遵守社稷奉承宗廟吾聞父死子代君亡臣親今事棄諸大夫客官於吴委國歸民以付二三子吾之由也亦子之憂也君臣同道父子共氣天性自然豈得以在者盡忠亡者為不信乎何諸大夫論事一合一離令孤懐心不定也夫推國任賢度功績成者君之命也奉教順理不失分去聲者臣之職也吾顧諸大夫以其所能而云委質而已於乎悲哉計􅒍曰君王所陳者固其理也昔湯入夏付國於文祀西伯之殷委國於一老今懐夏将滯志在於還夫適市之妻教嗣糞除出亡之君勅臣守禦子問以事臣謀以能今君王欲士之所志各陳其情舉其能者議其宜也越王曰大夫之論是也吾将逝矣願願下當有聞字諸君之風大夫種曰夫内修封疆之役外修耕戰之備荒無遺土百姓親附臣之事也大夫范蠡曰輔危主存亡國不恥屈厄之難安守被辱之地往而必反與君復讎者臣之事也大夫苦成曰發君之令眀君之徳窮與俱厄進與俱霸統煩理亂使民知分去聲臣之事也大夫曳庸曰奉令受使結和諸侯通命逹㫖賂往遺来解憂釋患使無所疑出不忘命入不被尤臣之事也大夫皓進曰一心齊志上與等之下不違令動従君命修徳履義守信温故臨非决疑君誤臣諌直心不撓舉過列平不阿親戚不私於外推身致君終始一分臣之事也大夫諸稽郢曰望敵設陣飛矢揚兵履腹涉屍血流滂滂貪進不退二師相當破敵攻衆威凌百邦臣之事也大夫皋如曰修徳行恵撫慰百姓身臨憂勞動輒躬親弔死存疾救活民命蓄陳儲新食不二味國富民實為君養噐臣之事也大夫計􅒍曰候天察地紀厯隂陽觀變參災分别妖祥日月含色五精錯行福見知吉妖出知凶臣之事也越王曰孤雖入於北國為吴窮虜有諸大夫懐徳抱術各守一分以保社稷孤何憂焉遂别於浙江之上羣臣垂泣莫不感哀越王仰天歎曰死者人之所畏若孤之聞死其於心胸中曽無􅇶惕遂登船徑去終不返顧越王夫人乃據船哭顧烏鵲啄江渚之蝦飛去復来因哭而歌之曰仰飛鳥兮烏鳶凌𤣥虚號號當作兮翩翩集洲渚兮優恣啄蝦矯翮兮雲間任厥此闕一字兮往還妾無罪兮負地有何辜兮譴天颿颿凡梵兩音馬疾步獨兮西往孰知返兮何年心惙惙憂也詩憂心惙惙兮若割淚泫泫胡犬切淚流貌兮雙懸又哀吟曰彼飛鳥兮鳶烏已迴翔兮翕蘇心在專兮素蝦何居食兮江湖徊復翔兮㳺颺去復返兮於乎始事君兮去家終我命兮君都終來遇兮何幸幸當作辜離我國兮去呉妻衣褐兮為婢夫去冕兮為奴嵗遥遥兮難極寃悲痛兮心惻腸千結兮服膺於乎哀兮忘食願我身兮如鳥身翺翔兮矯翼去我國兮心揺情憤惋兮誰識越王聞夫人怨歌心中内慟乃曰孤何憂吾之六翮備矣於是入呉見夫差稽首再拜稱臣曰東海賤臣勾踐上愧皇天下負后土不裁功力汚辱王之軍士抵罪邊境大王赦其深辜裁加役臣使執箕箒誠蒙厚恩得保須㬰之命不勝仰感俯愧臣勾踐叩頭頓首吴王夫差曰寡人於子亦過矣子不念先君之讎乎越王曰臣死則死矣惟大王原之伍胥在旁目若熛火聲如雷霆乃進曰夫飛鳥在青雲之上尚欲繳音灼生絲縷也微矢以射之豈况近臥於華池集於庭廡乎今越王放於南山之中㳺於不可存之地幸来渉我壤土入吾梐梱此乃厨宰之成事食也豈可失之乎吴王曰吾聞之誅降殺服禍及三世吾非愛越而不殺也畏皇天之咎教而赦之太宰嚭諫曰子胥明於一時之計不通安國之道願大王遂其所執無拘羣小之口夫差遂不誅越王令駕車養馬秘於石室之中三月吴王召越王入見越王伏於前范蠡立於後吴王謂范蠡曰寡人聞貞婦不嫁破亡之家仁賢不官絶滅之國今越王無道國已将亡社稷壊崩身死世絶為天下笑而子及主俱為奴僕来歸於吴豈不鄙乎吾欲赦子之罪子能改心自新棄越歸吴乎范蠡對曰臣聞亡國之臣不敢語政敗軍之将不敢語勇臣在越不忠不信今越王不奉大王命號用兵與大王相持至今獲罪君臣俱降䝉大王鴻恩得君臣相保願得入備掃除出給趨走臣之願也此時越王伏地流涕自謂遂失范蠡矣吴王知范蠡不可得為臣謂曰子既不移其志吾復置子於石室之中范蠡曰臣請如命吴王起入宫中越王范蠡趨入石室越王服犢鼻著樵頭夫人衣無縁之裳施左關之襦夫斫剉養馬妻給水除糞灑掃三年不愠怒面無恨色吴王登逺髙望見越王及夫人范蠡坐於馬糞之旁君臣之禮存夫婦之儀具王顧謂太宰嚭曰彼越王者一節之人范蠡一介之士雖在窮厄之地不失君臣之禮寡人傷之太宰嚭曰願大王以聖人之心哀窮孤之士吴王曰為子赦之後三月乃擇吉日而欲赦之召太宰嚭謀曰越之與吴同土連域勾踐愚黠親欲為賊寡人承天之神靈前王之遺徳誅討越冦囚之石室寡人心不忍見而欲赦之於子奈何太宰嚭曰臣聞無徳不復大王垂仁恩加越越豈敢不報哉願大王卒意終其意也越王聞之召范蠡告之曰孤聞於外心獨喜之又恐其不足也范蠡曰大王安心事将有意在玉門第一今年十二月戊寅之日時加日出戊囚日也寅隂後之辰也合庚辰嵗後㑹也夫以戊寅日聞喜不以其罪罰日也時加卯而賊戊功曹為騰蛇而臨戊謀利事在青龍青龍在勝光而臨酉死氣也而尅寅是時尅其日用又助之所求之事上下有憂此豈非天網四張萬物盡傷者乎王何喜焉果子胥諫吴王曰昔桀囚湯而不誅紂囚文王而不殺天道還反禍轉成福故夏為湯所誅殷為周所滅今大王既囚越君而不行誅臣謂大王惑之深也得無夏殷之患乎吴王遂召越王久之不見范蠡文種憂而占之曰吴王見擒也有頃太宰嚭出見大夫種范蠡而言越王復拘於石室伍子胥復諌吴王曰臣聞王者攻敵國克之則加以誅故後無報復之憂遂免子孫之患今越王已入石室宜早圖之後必為吴之患太宰嚭曰昔者齊桓割燕所至之地以貺燕公齊桓公救燕北伐山戎而還燕君送桓公出境桓公因割燕所至地予燕而齊君獲其美名宋襄濟河而戰宋襄公與楚成王戰于泓目夷曰及其未濟擊之公不聴已濟陣成宋人擊之宋師大敗公曰君子不困人於阨不鼓不成列春秋以多其義功立而名稱軍敗而徳存今大王誠赦越王則功冠於五霸名越扵前古吴王曰待吾疾愈方為太宰赦之後一月越王出出當作坐石室召范蠡曰吴王疾三月不愈吾聞人臣之道主疾臣憂且吴王遇孤恩甚厚矣疾之無瘳惟公卜焉范蠡曰吴王不死明矣到己巳日當瘳惟大王留意越王曰孤所以窮而不死者頼公之䇿耳中復猶豫豈孤之志哉可與不可惟公圖之范蠡曰臣竊見吴王真非人也數色角切言成湯之義而不行之願大王請求問疾得見因求其糞而嘗之觀其顔色當拜賀焉言其不死以瘳起日期之既言信後則大王何憂越王明日謂太宰嚭曰囚臣欲一見問疾太宰嚭即入言於吴王王召而見之適遇吴王之便平聲下同太宰嚭奉溲惡以出溲所九切惡遏各切下同溲即便也惡大溲也大小溲亦曰前後溲見史倉公傳逢户中越王因拜請嘗大王之溲以决吉凶即以手取其便與惡而嘗之因入曰下囚臣勾踐賀於大王王之疾至己巳日有瘳至三月壬申病愈吴王曰何以知之越王曰下臣嘗事師聞糞者順榖味遂時氣者死順時氣者生今者臣竊嘗大王之糞其惡味苦且楚酸是味也應春夏之氣臣以是知之吴王大悦曰仁人也乃赦越王得離其石室去就其宫室執牧養之事如故越王従嘗糞惡之後遂病口臭范蠡乃令左右皆食岑草以亂其氣㑹稽賦註岑草蕺也菜名擷之小有臭氣凶年民劚其根食之㑹稽志蕺山在府西北六里越王嘗採蕺於此其後吴王如越王期日疾愈心念其忠臨政之後大縦酒於文臺吴王出令曰今日為越王陳北面之坐羣臣以客禮事之伍子胥趨出到舎上不御坐酒酣太宰嚭曰異乎今日坐者各有其詞不仁者逃其仁者留臣聞同聲相和同心相求今國相剛勇之人意者内慚至仁之存也而不御坐其亦是乎吴王曰然於是范蠡與越王俱起為吴王夀其辭曰下臣勾踐従小臣范蠡奉觴上千嵗之夀辭曰皇在上令昭下四時并心察慈仁者大王躬親鴻恩立義行仁九徳四塞威服羣臣於乎休哉傳徳無極上感太陽降瑞翼翼大王延夀萬嵗長保吴國四海咸承諸侯賔服觴酒既升永受萬福於是吴王大悦明日伍子胥入諌曰昨日大王何見乎臣聞内懐虎狼之心外執美詞之説但為外情以存其身豺不可謂亷狼不可親今大王好聴須􅁷之説不慮萬嵗之患放棄忠直之言聴用讒夫之語不滅瀝血之仇不絶懐毒之怨猶縦毛爐炭之上幸其其當作不焦投卵千鈞之下望必全豈不殆哉臣聞桀登髙自知危然不知所以自安也前據白刃自知死而不知所以自存也惑者知返迷道不逺願大王察之吴王曰寡人有疾三月曽不聞相國一言是相國之不慈也又不進口之所嗜心不相思是相國之不仁也夫為人臣不仁不慈焉於䖍切何也能知其忠信者乎越王迷惑棄守邊之事親将其臣民来歸寡人是其義也躬親為虜妻親為妾不愠寡人寡人有疾親嘗寡人之溲是其慈也虚其府庫盡其實幣不念舊故是其忠信也三者既立以養寡人寡人曽聴相國而誅之是寡人之不智也而為相國快其意耶豈不負皇天乎子胥曰何大王之言反也夫虎之卑勢将以有擊也狸之卑身将求所取也雉以眩移拘於網魚以有悦死於餌且大王初臨政負玉門之第九誠事之敗無咎矣今年三月甲戌時加雞鳴甲戌嵗位之㑹将也青龍在酉徳在土刑在金是日賊其徳也知父将有不順之子君有逆節之臣大王以越王歸吴為義以飲溲食惡為慈以虚府庫為仁是故為無愛於人其不可親面聴貌觀以存其身今越王入臣於吴是其謀深也虛其府庫不見恨色是欺我王也下飲王之溲者是上食王之心也下嘗王之惡者是上食王之肝也大哉越王之崇吴吴将為所擒也惟大王留意察之臣不敢逃死以負前王一旦社稷丘墟宗廟荆棘其悔可追乎吴王曰相國置之勿復言矣寡人不忍復聞於是遂赦越王歸國送於蛇門之外羣臣祖道吴王曰寡人赦君使其返國必念終始王其勉之越王稽首曰今大王哀臣孤窮使得生全還國與種蠡之徒願死於轂下上天蒼蒼臣不敢負吴王曰於乎吾聞君子一言不再今已行矣王勉之越王再拜跪伏吴王乃引越王登車范蠡執御遂去至三津之上仰天歎曰嗟乎孤之屯厄誰念復生渡此津也謂范蠡曰今三月甲辰時加日昳徒結切日昃也梁元帝纂要日在未曰昳孤䝉上天之命還歸故鄉得無後患乎范蠡曰大王勿疑直眡道行越将有福吴當有憂至浙江之上望見大越山川重秀天地再清王與夫人歎曰吾已絶望永辭萬民豈料再還重復鄉國言竟掩面涕泣闌干文選註闌干多貌此時萬姓咸歡羣臣畢賀
