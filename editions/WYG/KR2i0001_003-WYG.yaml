front:
  text: 王僚使公子光傳第三二年王僚使公子光伐楚見左傳昭公十七年光諸樊子闔廬也以報前來誅慶封也呉師敗而亡舟舟名餘皇為楚所獲亦曰艅艎光懼因捨復得王舟而還捨字不通疑當作揜盖揜其不備取之以歸光欲謀殺王僚未有所與合議隂求賢乃命善相者為呉市吏五年楚之亡臣伍子胥來奔呉見左傳昭公二十年伍子胥者楚人也名員音云員父奢兄尚其前名曰伍舉前名當作前人舉即奢之父員之祖以直諫事楚荘王王即位三年不聽國政沉湎於酒淫於聲色左手擁秦姬右手抱越女身坐鐘鼓之間而令曰有敢諫者死於是伍舉進諫曰有一大鳥集楚國之庭三年不飛亦不鳴此何鳥也於是荘王曰此鳥不飛飛則冲天不鳴鳴則驚人伍舉曰不飛不鳴将為射者所圖絃矢卒音猝怱遽貌倉卒也發豈得冲天而驚人乎於是荘王棄其秦姬越女罷鐘鼓之樂用孫叔敖任以國政史記曰任伍舉蘇從以政國人大說遂霸天下威伏諸侯荘王卒靈王立建章華之臺杜預曰南郡華容縣有臺在城内與登焉王曰臺美伍舉曰臣聞國君服寵以為美安民以為樂克聽以為聰致逺以為明不聞以土木之崇髙蟲鏤之刻畫金石之清音絲竹之凄唳以之為美前荘王為抱居之臺髙不過望國氛祲氣也大不過容宴豆木不妨守備不妨城郭守備之材用不煩官府民不敗時務官不易朝常今君為此臺七年國人怨焉財用盡焉年穀敗焉百姓煩焉諸侯忿怨卿士訕謗豈前王之所盛人君之美者耶臣誠愚不知所謂也靈王即除工去飾不逰於臺由是伍氏三世為楚忠臣楚平王有太子名建平王以伍奢為太子太傅費無忌左傳作無極史記亦作無忌為少𫝊平王使無忌為太子娶於秦秦女美容無忌報王曰秦女天下無雙王可自取王遂納秦女為夫人而幸愛之生子珍而更為太子娶齊女無忌因去太子而事平王深念平王一旦卒而太子立當害已也乃復讒太子建建母蔡氏無寵乃使太子守城父服䖍曰城父楚北境邑杜預曰襄城城父縣備邊兵頃之無忌日夜言太子之短曰太子以秦女之故不能無怨望之心願王自備太子居城父将兵外交諸侯将入為亂平王乃召伍奢而按問之奢知無忌之讒因諫之曰王獨奈何以讒賊小臣而疎骨肉乎無忌承宴復言曰王今不制其事成矣王且見擒平王大怒因囚伍奢而使城父司馬奮揚往殺太子奮揚使人前告太子急去不然将誅三月太子奔宋無忌復言平王曰伍奢有二子皆賢不誅且為楚憂可以其父為質而召之王使使謂奢曰能致二子則生不然則死伍奢曰臣有二子長曰尚少曰胥尚為人慈温仁信若聞臣召輙來胥為人少好於文長習於武文治邦國武定天下執綱守戾蒙垢受恥雖寃不爭能成大事此前知之士安可致耶平王謂伍奢之譽二子即遣使者駕駟馬封函印綬往許召子尚子胥令曰賀二子父奢以忠信慈仁去難就免平王内慙囚繫忠臣外愧諸侯之恥反遇奢為國相封二子為侯尚賜鴻都侯胥賜盖侯相去不逺三百餘里奢久囚繫憂思二子故遣臣來奉進印綬尚曰父繫三年中心忉怛食不甘味嘗苦飢渇晝夜感思憂父不活惟父獲免何敢貪印綬哉使者曰父囚三年王今幸赦無以賞賜封二子為侯一言當至何所陳哉尚乃入報子胥曰父幸免死二子為侯使者在門兼封印綬汝可見使子胥曰尚且安坐為兄卦之今日甲子時加於已支傷日下氣不相受君欺其臣父欺其子今往方死何侯之有尚曰豈貪於侯思見父耳一面而别雖死而生子胥曰尚且無往父當我活楚畏我勇勢不敢殺兄若誤往必死不脫尚曰父子之愛恩從中出徼倖相見以自濟逹於是子胥歎曰與父俱誅何明於世寃讎不除恥辱日大尚從是往我從是决决當作訣别也尚泣曰吾之生也為世所笑終老地上而亦何之不能報仇畢為廢物汝懐文武勇於䇿謀父兄之讎汝可復也吾如得返是天祐之其遂沉埋亦吾所喜胥曰尚且行矣吾去不顧勿使臨難雖悔何追旋泣辭行與使俱往楚得子尚執而囚之復遣追捕子胥胥乃貫烏還切弓執矢去楚楚追之見其妻曰胥亡矣去三百里使者追及無人之野胥乃張弓布矢欲害使者使者俯伏而走胥曰報汝平王平字當去王在安得先稱其諡不則當作君王下文平王則後人追書也欲國不滅釋吾父兄若不爾者楚為墟矣使返報平王王聞之即發大軍追子胥至江失其所在不獲而返子胥行至大江仰天行哭林澤之中言楚王無道殺吾父兄願吾因於諸侯以報讎矣聞太子建在宋胥欲往之伍奢初聞子胥之亡曰楚之君臣且苦兵矣尚至楚就父俱戮於市伍員奔宋道遇申包胥謂曰楚王殺吾父兄為之奈何申包胥曰於乎吾欲教子報楚則為不忠教子不報則為無親友也子其行矣吾不容言子胥曰吾聞父母之讎不與戴天履地兄弟之讎不與同域接壤朋友之讎不與鄰鄉共里今吾将復楚辜以雪父兄之恥申包胥曰子能亡之吾能存之子能危之吾能安之胥遂奔宋宋元公無信於國國人惡之大夫華氏謀殺元公國人與華氏因作大亂華氏華亥華定也見左傳昭公二十年子胥乃與太子建俱奔鄭鄭人甚禮之太子建又適晉晉頃公曰太子既在鄭鄭信太子矣太子能為内應而滅鄭即以鄭封太子太子還鄭事未成㑹欲私其從者從者知其謀乃告之於鄭鄭定公與子産誅殺太子建建有子名勝伍員與勝奔呉到昭闗闗吏欲執之伍員因詐曰上所以索我者美珠也今我已亡矣将去取之闗吏因舎上聲之與勝行去追者在後㡬不得脫至江江中有漁父乗船從下方泝水而上子胥呼之謂曰漁父渡我如是者再漁父欲渡之適㑹旁有人窺之因而歌曰日月昭昭乎寖已馳與子期乎蘆之漪子胥即止蘆之漪漁父又歌曰日已夕兮予心憂悲月已馳兮何不渡為事寖急兮當奈何子胥入船漁父知其意也乃渡之千潯潯當作尋四尺曰仞倍仞曰尋之津子胥既渡漁父乃視之有飢色乃謂曰子俟我此樹下為子取餉漁父去後子胥疑之乃潛身於深葦之中有頃父來持麥飯鮑魚羮盎漿求之樹下不見因歌而呼之曰蘆中人蘆中人豈非窮士乎如是至再子胥乃出蘆中而應漁父曰吾見子有飢色為子取餉子何嫌哉子胥曰性命屬天今屬丈人豈敢有嫌哉二人飲食畢欲去胥乃解百金之劒以與漁者此吾前君之劒中有七星價直百金以此相答漁父曰吾聞楚之法令得伍胥者賜粟五萬石爵執圭豈圖取百金之劒乎遂辭不受謂子胥曰子急去勿留且為楚所得子胥曰請丈人姓字漁父曰今日凶凶兩賊相逢吾所謂渡楚賊也兩賊相得得形於黙何用姓字為子為蘆中人吾為漁丈人富貴莫相忘也子胥曰諾既去誡漁父曰掩子之盎漿無令其露漁父諾子胥行數步顧視漁者已覆船自沈於江水之中矣子胥黙然遂行至呉疾於中道乞食溧陽今建康屬邑適㑹女子擊綿於瀨水之上筥中有飯子胥遇之謂曰夫人可得一餐乎女子曰妾獨與母居三十年未嫁飯不可得子胥曰夫人賑窮途少飯亦何嫌哉女子知非恒人遂許之發其簞筥飯其盎漿長跪而與之子胥再餐而止女子曰君有逺逝之行何不飽而餐之子胥已餐而去又謂女子曰掩夫人之壺漿無令其露女子歎曰嗟乎妾獨與母居三十年自守貞明不願從適何宜饋飯而與丈夫越虧禮儀妾不忍也子行矣子胥行反顧女子已自投於瀨水矣於乎貞明執操其丈夫女哉子胥之呉乃被髪佯狂跣足塗面行乞於市市人觀㒺有識者翌日翌明也明日呉市吏善相者見之曰吾之相人多矣未嘗見斯人也非異國之亡臣乎乃白呉王僚具陳其狀王宜召之王僚曰與之俱入公子光聞之私喜曰吾聞楚殺忠臣伍奢其子子胥勇而且智彼必復父之讎來入於呉隂欲養之市吏於是與子胥俱入見王王僚怪其状偉身長一丈腰十圍眉間一尺王僚與語三日辭無復者王曰賢人也子胥知王好之毎入語語遂有勇壯之氣稍道其讎而有切切之色王僚知之欲為興師復讎公子謀殺王僚恐子胥前親於王而害其謀因讒伍胥之諫諫當作謀伐楚者非為呉也但欲自復私讎耳王無用之子胥知公子光欲害王僚乃曰彼光有内志未可說音稅以外事入見王僚曰臣聞諸侯不為匹夫興師用兵於北國王僚曰何以言之子胥曰諸侯専為政非以意救急後興師今大王踐國制威為匹夫興兵其義非也臣固不敢如王之命呉王乃止子胥退耕於野求勇士薦之公子光欲以自媚乃得勇士專諸左傳作鱄設諸専諸者堂邑呉地漢地理志為臨淮郡堂邑縣人也伍胥之亡楚如呉時遇之於途専諸方與人鬬将就敵其怒有萬人之氣甚不可當其妻一呼即還子胥怪而問其状何夫子之怒盛也聞一女子之聲而折道寧有說乎専諸曰子視吾之儀寧𩔖愚者也何言之鄙也夫屈一人之下必伸萬人之上子胥因相其貌碓顙而深目虎膺而熊背戾於從難知其勇士隂而結之欲以為用遭公子光之有謀也而進之公子光光既得専諸而禮待之公子光曰天以夫子輔孤之失根也專諸曰前王餘昧卒僚立自其分也公子何因而欲害之乎光曰前君夀夢有子四人長曰諸樊名遏史記索隠曰遏是其名諸樊是其號則光之父也次曰餘祭次曰餘昧春秋作夷末㳄曰季札札之賢也将卒傳付適長以及季札念季札為使去聲亡在諸侯未還餘昧卒國空有立者適長也適長之後即光之身也今僚何以當代立乎吾力弱無助於掌事之間非用有力徒能安吾志吾雖代立季子東還不吾廢也專諸曰何不使近臣從容言於王側陳前王之命以諷其意令知國之所歸何須私備劒士以捐先王之徳光曰僚素貪而恃力知進之利不覩退讓吾故求同憂之士欲與之并力惟夫子詮擇言斯義也專諸曰君言甚露乎於公子何意也光曰不也此社稷之言也小人不能奉行惟委命矣專諸曰願公子命之公子光曰時未可也專諸曰凡欲殺人君必前求其所好呉王何好光曰好味專諸曰何味所甘光曰好嗜魚之炙也專諸乃去從太湖學炙魚三月得其味安坐待公子命之八年僚遣公子伐楚大敗楚師因迎故太子建母於鄭鄭君送建母珠玉簪珥欲以解殺建之過左傳昭公二十三年楚太子建之母在呉太子諸樊入取楚夫人與其實器以歸杜預解諸樊呉王僚之太子按春秋襄公二十五年呉子遏伐楚門於巢卒杜預解遏諸樊也𫝊亦書呉子諸樊卒諸樊之死於是三十年矣此書云僚遣公子當是公子光之父諸樊也諸樊於僚為世父亦不得云王僚太子也豈傳與杜解俱誤耶九年呉使光伐楚拔居巢鍾離左傳昭公二十四年呉遂滅巢及鍾離而還世家所記與此合巢今無為巢縣呉所以相攻者初楚之邊邑脾梁史記作卑梁之女與呉邊邑處女蠶爭界上之桑史記曰小童爭桑伍子胥𫝊兩女子爭桑二家相攻呉國不勝遂更相伐滅呉之邊邑呉怒故伐楚取二邑而去十二年冬楚平王卒左傳昭公二十六年九月楚平王卒索隠曰按年表及左傳合在僚十一年此書作十二年又以秋為冬皆誤伍子胥謂白公勝即太子建之子其後惠王召勝歸楚使居邊邑服䖍曰白楚邑名大夫皆稱公杜預曰汝隂褒信縣西南有白亭勝奔呉事見前曰平王卒吾志不悉矣然楚國存吾何憂矣白公黙然不對伍子胥坐泣於室十三年索隠曰據表及左氏僚止合有十二年事今史記世家乃書云十三年此書似承世家之誤春呉欲因楚葬而伐之左傳呉子欲因楚喪而伐之世家同喪作器字此書葬字恐是喪字之誤使公子盖餘燭傭左傳盖作掩傭作庸皆王僚母弟以兵圍楚使季札於晉以觀諸侯之變楚發兵絶呉後呉兵不得還於是公子光心動伍胥知光之見機也乃說光曰今呉王伐楚二弟将兵未知吉凶專諸之事於斯急矣時不再來不可失也於是公子見專諸曰今二弟伐楚季子未還當此之時不求何獲時不可失且光真王嗣也專諸曰僚可殺也母老子弱弟伐楚楚絶其後方今呉外困於楚内無骨鯁之臣是無如我何也四月公子光伏甲士於窋室中左傳作堀室史記作窋室具酒而請王僚僚白其母曰公子光為我具酒來請期無變悉乎母曰光心氣怏怏常有愧恨之色不可不慎王僚乃被棠銕之甲三重使兵衛陳於道自宫門至於光家之門階席左右皆王僚之親戚使坐立侍皆操長㦸交軹酒酣公子光佯為足疾入窋室裹足使專諸置魚腸劒炙魚中進之既至王僚前專諸乃擘炙魚因推匕首立㦸交軹倚專諸胷㦸有枝兵也周禮㦸長丈六尺増韻雙枝為㦸單枝為戈軹說文車輪小穿周禮大馭祭兩軹註軹謂兩轊詩詁曰車軸之耑貫轂者為槥轂末之小穿容轊者為軹此言立㦸交軹謂㦸之立如軹之交倚専諸之胷也胷斷臆開匕首如故以刺王僚貫甲逹背王僚既死左右共殺專諸衆士擾動公子光伏其甲士以攻僚衆盡滅之遂自立是為呉王闔閭也乃封專諸之子拜為客卿季札使還至呉闔閭以位讓季札曰茍前君無廢社稷以奉君也吾誰怨乎哀死待生以俟天命非我所亂立者從之是前人之道命哭僚墓復位而待公子盖餘燭傭二人将兵遇圍於楚者聞公子光殺王僚自立乃以兵降楚楚封之於舒按左傳掩餘奔徐燭傭奔鍾吾呉使徐人執掩餘鍾吾人執燭庸二公子奔楚此言以兵降楚與傳不合史記亦云奔楚世家與伍子胥傳皆云降楚舒春秋舒國為楚所滅漢屬廬江郡今廬州有舒城縣
