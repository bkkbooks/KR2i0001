  hash: sha256:51a75f4634dfa8598a0a1436da0b7764830edd1f3a97661222387da2fe2b38d1
body:
  text: 漢趙煜撰呉太伯傳第一呉之前君太伯者論語作泰伯后稷之苖裔也后稷其母台氏之女姜嫄韓詩章句姜姓嫄字說文邰炎帝之後姜姓封邰國晉語曰黄帝以姬水成炎帝以姜水成故黄帝為姬炎帝為姜是姜者炎帝之姓史記嫄作原台作邰邰國在京兆武功縣所治釐城漢地理志作斄與邰同為帝嚳元妃年少未孕出逰於野見大人跡而觀之中心歡然喜其形像因履而踐之身動意若為人所感後姙娠恐被淫泆之禍遂祭祀以求謂無子履上帝之跡詩生民篇所謂履帝武是也天猶令有之姜嫄怪而棄於阨狹之巷牛馬過者折折疑當作辟易而避之詩云誕置之隘巷牛羊腓字之復棄於林中適㑹伐木之人多詩云誕置之平林㑹伐平林復置於澤中氷上衆鳥以羽覆之詩云誕置之寒氷鳥覆翼之后稷遂得不死姜嫄以為神收而養之長因名棄為兒時好種樹樹亦種也禾黍桑麻五穀相去聲五土之宜青赤黄黒陵陸地水髙下粢稷黍禾蕖麥豆稻各得其理堯遭洪水人民泛濫遂遂疑當作逐髙而居堯聘棄使教民山居隨地造區妍窮也營種之術三年餘行人無飢乏之色乃拜棄為農師封之台號為后稷姓姬氏后稷就國為諸侯卒子不窋立帝王世紀后稷納姞氏生不窋括地志曰不窋故城在慶州𢎞化縣南三里遭夏氏世衰失官奔戎狄之間其孫公劉周本紀不窋卒子鞠立鞠卒子公劉立公劉慈仁行不履生草運車以避葭葦公劉避夏桀於戎狄變易風俗民化其政公劉卒子慶節立其後八世而得古公亶甫慶節子皇僕皇僕子差弗差弗子毁隃世本隃作榆毁隃子公非公非子髙圉髙圉子亞圉世本作亞圉雲都皇甫謐曰雲都亞圉字亞圉子公叔祖𩔖公叔祖𩔖子古公亶甫毛詩史記甫皆作父甫父通自慶節至是為八世脩公劉后稷之業積徳行義為狄人所慕薰鬻戎姤而伐之薰鬻孟子作獯鬻史記作薫育漢匈奴傳作葷粥音同古公事之以犬馬牛羊其伐不止事以皮幣金玉重寳而亦伐之不止古公問何所欲曰欲其土地古公曰君子不以養害害所養孟子曰君子不以其所以養人者害人國所以亡也而為身害吾所不居也古公乃杖䇿去邠踰梁山而處岐周徐廣曰新平漆縣東北有豳亭杜預云豳在新平漆縣東北索隠曰􅃎即邠也又徐廣曰岐山在扶風美陽西北其南有周原顔師古曰梁山在夏陽岐山在美陽即今岐州岐山縣箭括嶺也曰彼君與我何異邠人父子兄弟相帥負老􅂝㓜掲釜甑而歸古公居三月成城郭一年成邑二年成都而民五倍其初古公三子長曰太伯次曰仲雍雍一名呉仲史記作虞仲少曰季歴太姜生少子季歴即王季也季歴娶妻太任氏音泰壬詩大明篇摯仲氏任毛氏箋摯國任姓仲中女也史記作太任列女傳太任摯任氏之中女生子昌昌有聖瑞尚書緯帝命驗曰季秋之月甲子赤爵銜丹書入於酆止於昌戸其書云云此盖聖瑞丹書文多不載古公知昌聖欲傳國以及昌曰興王業者其在昌乎因更名曰季歴太伯仲雍望風知指曰歴者適也知古公欲以國及昌古公病二人託名採藥於衡山南岳遂之荆蠻斷髮文身為夷狄之服示不可用古公卒太伯仲雍歸赴喪畢還荆蠻國民君而事之自號為勾呉漢地理志太伯奔荆蠻號曰勾呉顔師古注夷俗語發聲猶越為于越也呉人或問何像像疑當作據而為勾呉太伯曰吾以伯長居國絶嗣者也其當有封者呉仲也故自號勾呉非其方乎荆蠻義之從而歸之者千有餘家共立以為勾呉數年之間民人殷富遭殷之末世衰中國侯王數用兵恐及以荆蠻故太伯起城周三里二百步外郭三百餘里在西北隅名曰故呉太伯所都謂之呉城在梅里平墟今無錫縣境人民皆耕田其中古公病將卒令季歴讓國於太伯而三讓不受故云太伯三以天下讓於是季歴蒞政脩先王之業守仁義之道季歴卒子昌立號曰西伯按孔叢子羊容問子思曰周自后稷封為王者之後至太王王季文王此為諸侯奚得為西伯乎子思曰吾聞諸子夏曰殷帝乙之時王季以九命作伯於西受圭瓉秬鬯之賜故文王因之得專征伐此諸侯為伯猶召公分陕謂之召伯也遵公劉古公之術業於養老天下歸之西伯致太平伯夷自海濵而往西伯卒太子發立發武王名任周召周公旦召公奭而伐殷天下已安乃稱王追諡古公為太王追封太伯於呉太伯殂卒葬於梅里平墟即太伯故城之地劉昭云無錫縣東皇山有太伯冢去墓十里有舊宅其井猶存皇覽云太伯墓在呉縣北梅里聚二說不同此云平墟當以劉說為正仲雍立是為呉仲雍仲雍卒子季簡簡子叔逹逹子周章章子熊熊子遂遂子柯相相子疆鳩夷夷子餘喬疑吾吾子柯廬廬子周繇繇子屈羽羽子夷吾吾子禽處處子專專子頗髙髙子句畢立史記世家熊子遂作熊遂喬作橋廬作盧專作轉譙周古史考作柯轉畢作卑是時晉獻公滅周北虞虞公以開晉之伐虢氏畢子去齊齊子夀夢立夢左傳莫公切史記正義同而呉益彊稱王凡從太伯至夀夢之世與中國時通朝㑹而國斯霸焉呉王夀
