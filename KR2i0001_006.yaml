body:
  text: 越王無余外傳第六越之前君無余者夏禹之末封也禹父鯀者帝顓頊之後鯀娶於有莘氏之女名曰女嬉年壯未孳嬉於砥山得薏苡而吞之意若為人所感因而妊孕剖脅而産高密家於西羌地曰石紐石紐在蜀西川也帝堯之時遭洪水滔滔天下沉漬九州閼塞四瀆壅閉帝乃憂中國之不康悼黎元之罹咎乃命四嶽乃舉賢良將任治水自中國至於條方莫薦人帝靡所任四嶽乃舉鯀而薦之於堯帝曰鯀負命毀族不可四嶽曰等之群臣未有如鯀者堯用治水受命九載功不成帝怒曰朕知不能也乃更求之得舜使攝行天子之政巡狩觀鯀之治水無有形狀乃殛鯀于羽山鯀投于水化為黃能因為羽淵之神舜與四嶽舉鯀之子高密四嶽謂禹曰舜以治水無功舉爾嗣考之勳禹曰俞小子敢悉考績以統天意惟委而已禹傷父功不成循江泝河盡濟甄淮乃勞身焦思以行七年聞樂不聽過門不入冠挂不顧履遺不躡功未及成愁然沉思乃案黃帝中經曆蓋聖人所記曰在于九山東南天柱號曰宛委赤帝在闕其巖之巔承以文玉覆以磐石其書金簡青玉為字編以白銀皆瑑其文禹乃東巡登衡嶽血白馬以祭不幸所求禹乃登山仰天而嘯因夢見赤繡衣男子自稱玄夷蒼水使者聞帝使文命于斯故來候之非厥歲月將告以期無為戲吟故倚歌覆釜之山東顧謂禹曰欲得我山神書者齊於黃帝巖嶽之下三月庚子登山發石金簡之書存矣禹退又齊三月庚子登宛委山發金簡之書案金簡玉字得通水之理復返歸嶽乘四載以行川始於霍山徊集五嶽詩云信彼南山惟禹甸之遂巡行四瀆與益夔共謀行到名山大澤召其神而問之山川脈理金玉所有鳥獸昆蟲之類及八方之民俗殊國異域土地里數使益疏而記之故名之曰山海經禹三十未娶行到塗山恐時之暮失其度制乃辭云吾娶也必有應矣乃有白狐九尾造於禹禹曰白者吾之服也其九尾者王之證也塗山之歌曰綏綏白狐九尾痝痝我家嘉夷來賓為王成家成室我造彼昌天人之際於茲則行明矣哉禹因娶塗山謂之女嬌取辛壬癸甲禹行十月女嬌生子啓啓生不見父晝夕呱呱啼泣禹行使太章步東西豎亥度南北暢八極之廣旋天地之數禹濟江南省水理黃龍負舟舟中人怖駭禹乃啞然而笑曰我受命於天竭力以勞萬民生性也死命也爾何為者顏色不變謂舟人曰此天所以為我用龍曳尾舍舟而去南到計於蒼梧而見縳人禹撫其背而哭益曰斯人犯罪自合如此哭之何也禹曰天下有道民不罹辜天下無道罪及善人吾聞一男不耕有受其饑一女不桑有受其寒吾為帝統治水土調民安居使得其所今乃罹法如斯此吾德薄不能化民證也故哭之悲耳於是周行寓內東造絶迹西延積石南踰赤岸北過寒谷徊崑崙察六扈脈地理名金石寫流沙於西隅決弱水於北漢青泉赤淵分入洞穴通江東流至於碣石疏九河於潛淵開五水於東北鑿龍門闢伊闕平易相土觀地分州殊方各進有所納貢民去崎嶇歸於中國堯曰俞以固冀於此乃號禹曰伯禹官曰司空賜姓姒氏領統州伯以巡十二部堯崩禹服三年之喪如喪考妣晝哭夜泣氣不屬聲堯禪位於舜舜薦大禹改官司徒內輔虞位外行九伯舜崩禪位命禹禹服三年形體枯槁面目黎黑讓位商均退處陽山之南陰阿之北萬民不附商均追就禹之所狀若驚鳥揚天駭魚入淵晝歌夜吟登高號呼曰禹棄我如何所戴禹三年服畢哀民不得已即天子之位三載考功五年政定周行天下歸還大越登茅山以朝四方群臣觀示中州諸侯防風後至斬以示衆示天下悉屬禹也乃大會計治國之道內美釜山中慎之功外演聖德以應天心遂更名茅山曰會稽之山因傳國政休養萬民國號曰夏后封有功爵有德惡無細而不誅功無微而不賞天下喁喁若兒思母子歸父而留越恐群臣不從言曰吾聞食其實者不傷其枝飲其水者不濁其流吾獲覆釜之書得以除天下之災令民歸於里閭其德彰彰若斯豈可忘乎乃納言聽諫安民治室居靡山伐木為邑畫作印橫木為門調權衡平斗斛造井示民以為法度鳳凰棲於樹鸞鳥巢於側麒麟步於庭百鳥佃於澤遂已耆艾將老歎曰吾晏歲年暮壽將盡矣止絶斯矣命群臣曰吾百世之後葬我會稽之山葦椁桐棺穿壙七尺下無及泉墳高三尺土階三等葬之後曰無改畝以為居之者樂為之者苦禹崩之後衆瑞並去天美禹德而勞其功使百鳥還為民田大小有差進退有行一盛一衰往來有常禹崩傳位與益益服三年思禹未嘗不言喪畢益避禹之子啓於箕山之陽諸侯去益而朝啓曰吾君帝禹子也啓遂即天子之位治國於夏遵禹貢之美悉九州之土以種五穀纍歲不絶啓使使以歲時春秋而祭禹於越立宗廟於南山之上禹以下六世而得帝少康少康恐禹祭之絶祀乃封其庶子於越號曰無余余始受封人民山居雖有鳥田之利租貢才給宗廟祭祀之費乃復隨陵陸而耕種或逐禽鹿而給食無余質朴不設宮室之飾從民所居春秋祠禹墓於會稽無余傳世十餘末君微劣不能自立轉從衆庶為編戶之民禹祀斷絶十有餘歲有人生而言語其語曰鳥禽呼咽喋咽喋指天向禹墓曰我是無余君之苗末我方修前君祭祀復我禹墓之祀為民請福於天以通鬼神之道衆民悅喜皆助奉禹祭四時致貢因共封立以承越君之後復夏王之祭安集鳥田之瑞以為百姓請命自後稍有君臣之義號曰無壬壬生無䁺䁺專心守國不失上天之命無䁺卒或為夫談夫談生允常常立當吳王壽夢諸樊闔閭之時越之興霸自允常矣
