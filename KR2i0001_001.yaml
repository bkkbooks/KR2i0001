body:
  text: 吳太伯傳第一吳之前君太伯者后稷之苗裔也后稷其母台氏之女姜嫄為帝嚳元妃年少未孕出游於野見大人跡而觀之中心歡然喜其形像因履而踐之身動意若為人所感後妊娠恐被淫泆之禍遂祭祀以求謂無子履上帝之跡天猶令有之姜嫄怪而棄于厄狹之巷牛馬過者折易而避之復棄於林中適會伐木之人多復置於澤中冰上衆鳥以羽覆之后稷遂得不死姜嫄以為神收而養之長因名棄為兒時好種樹禾黍桑麻五穀相五土之宜青赤黃黑陵水高下粢稷黍禾蕖麥豆稻各得其理堯遭洪水人民泛濫遂高而居堯聘棄使教民山居隨地造區妍營種之術三年餘行人無饑乏之色乃拜棄為農師封之台號為后稷姓姬氏后稷就國為諸侯卒子不窋立遭夏氏世衰失官奔戎狄之間其孫公劉公劉慈仁行不履生草運車以避葭葦公劉避夏桀於戎狄變易風俗民化其政公劉卒子慶節立其後八世而得古公亶甫修公劉后稷之業積德行義為狄人所慕薰鬻戎姤而伐之古公事之以犬馬牛羊其伐不止事以皮幣金玉重寶而亦伐之不止古公問何所欲曰欲其土地古公曰君子不以養害害所養國所以亡也而為身害吾所不居也古公乃杖策去邠踰梁山而處岐周曰彼君與我何異邠人父子兄弟相帥負老攜幼揭釜甑而歸古公居三月成城郭一年成邑二年成都而民五倍其初古公三子長曰太伯次曰仲雍雍一名吳仲少曰季歷季歷娶妻太任氏生子昌昌有聖瑞古公知昌聖欲傳國以及昌曰興王業者其在昌乎因更名曰季歷太伯仲雍望風知指曰歷者適也知古公欲以國及昌古公病二人託名採藥於衡山遂之荊蠻斷髮文身為夷狄之服示不可用古公卒太伯仲雍歸赴喪畢還荊蠻國民君而事之自號為勾吳吳人或問何像而為勾吳太伯曰吾以伯長居國絶嗣者也其當有封者吳仲也故自號勾吳非其方乎荊蠻義之從而歸之者千有餘家共立以為勾吳數年之間民人殷富遭殷之末世衰中國侯王數用兵恐及於荊蠻故太伯起城周三里二百步外郭三百餘里在西北隅名曰故吳人民皆耕田其中古公病將卒令季歷讓國於太伯而三讓不受故云太伯三以天下讓於是季歷蒞政修先王之業守仁義之道季歷卒子昌立號曰西伯遵公劉古公之術業於養老天下歸之西伯致太平伯夷自海濱而往西伯卒太子發立任周召而伐殷天下已安乃稱王追諡古公為太王追封太伯於吳太伯祖卒葬於梅里平墟仲雍立是為吳仲雍仲雍卒子季簡簡子叔達達子周章章子熊熊子遂遂子柯相相子彊鳩夷夷子餘喬疑吾吾子柯廬廬子周繇繇子屈羽羽子夷吾吾子禽處處子專專子頗高高子句畢立是時晉獻公滅周北虞虞公以開晉之伐虢氏畢子去齊齊子壽夢立而吳益彊稱王凡從太伯至壽夢之世與中國時通朝會而國斯霸焉
