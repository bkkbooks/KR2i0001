  - {type: variant, offset: 7346, length: 0, content: '', SBCK: 誅太􅈗嚭越世家亦吳世家曰越王滅吳嚭亦同時就誅矣徐天祜曰愚按越滅吳之後二年是爲哀公二十四年曰越王乃葬吳王而誅太􅈗嚭此書又云并誅其妻子則吳王之自殺也之亡也嚭遂臣越夫固無恙也史世家及此書所載何其與左氏相戾也公如越將妻公而多與之地季孫懼使因太􅈗嚭而納賂焉乃止然則吳其實嘗􅀻越而不以其不忠為罪耶漢丁公之戮可以教天下之為人臣且嚭貪而佞至於亡國喪君死有餘戮越人既生之又從而信任之豈以乎失刑矣者越於是}
  - {type: page-break, offset: 7346, content: '', id: KR2i0001_SBCK_005-25a}
  - {type: variant, offset: 7346, length: 1, content: 吳, WYG: 呉世家曰越王滅呉誅太宰嚭越世家亦曰越王乃葬呉王而誅太宰嚭此書又云并誅其妻子則呉王之自殺也嚭亦同時就誅矣徐天祐曰愚按越滅呉之後二年是為哀公二十四年公如越將妻公而多與之地季孫懼使因太宰嚭而納賂焉乃止然則呉之亾也嚭遂如越夫固無恙也史世家及此書所載何其與左氏相戻也且嚭貪而佞至於亾國喪君死有餘戮越人既生之又從而信任之豈以其實嘗私越而不以其不忠為罪耶漢丁公之戮可以教天下之為人臣者越於是乎失刑矣呉}
