  - {type: variant, offset: 7448, length: 0, content: '', krp: 亭名卑猶位三字共爲地名吳地記曰徐杭山一名卑猶山是也越絶曰夫差冡在猶亭西卑猶位近太湖去縣十七里索隠曰猶亭}
