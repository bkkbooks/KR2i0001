  - {type: variant, offset: 7071, length: 0, content: '', SBCK: 則􅄑矣越欲責吳若曰囚辱吾君與君夫人使莝芻養馬給水除糞徐天祜曰夫差惑於􅈗嚭之言忘父之讎釋越不誅爲不孝然在越以吳赦越為大過種也無乃失辭乎猶為有辭今而曰越之罪莫大焉而}
  - {type: variant, offset: 7071, length: 0, content: '', WYG: 徐天祐曰夫差惑於宰嚭之言㤀父之讎釋越不誅為不孝然在越則幸矣越欲責呉若曰囚辱吾君與君夫人使莝芻飬馬給水除糞猶為有辭今而曰越之罪莫大焉而以呉赦越為大過種也無乃失辭乎}
