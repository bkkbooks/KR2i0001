  - {type: xml-element, offset: 7474, content: '', id: KR2i0001_CHANT_005-bkkxmlele12}
  - {type: variant, offset: 7474, length: 0, content: '', SBCK: 太􅈗嚭曰殺太􅈗嚭逄同與其妻子越絶言􅈗嚭之死者五曰擒夫差殺其妻子又曰三臺者嚭妻子死所也常疑越絶書非子貢作特後人托曰殺夫差而戮其相曰殺太宰嚭戮其妻子曰禽夫差而戮太宰嚭與出存魯􅅍齊破吳彊􅀳霸越是也斯言也乃後之人多其功是非子貢名耳何以知其非子貢作越絶内傳於􅀃陳成恒之事終之曰子貢一而免前既備論之矣此書謂亦葬卑猶之旁豈其後嚭死於越而返葬之言也且他文亦不􅁼或者所載未必盡實宰嚭得保首領以􅃿蓋幸嚭􅃁何也於吳耶然吳時諸􅃁墓如巫臣要離干將之􅁼皆具載圖志獨不及􅈗吳越春秋夫差内傳第五}
  - {type: page-break, offset: 7474, content: '', id: KR2i0001_SBCK_005-25b}
  - {type: page-break, offset: 7474, content: '', id: KR2i0001_SBCK_005-26a}
  - {type: variant, offset: 7474, length: 0, content: '', WYG: 越絶言宰嚭之死者五曰擒夫差殺太宰嚭曰殺太宰嚭逢同與其妻子曰殺夫差而戮其相曰殺太宰嚭戮其妻子曰禽夫差而戮太宰嚭與其妻子又曰三臺者嚭妻子死所也常疑越絶書非子貢作特後人托名耳何以知其非子貢作越絶肉傳於説陳成恒之事終之曰子貢一出存魯亂齊破呉彊晉霸越楚也斯言也乃後之人多其功是非子貢之言也且他文亦不類或者所載未必盡實宰嚭得保首領以没葢幸而免前既備論之矣此書謂亦葬卑猶之旁豈其後嚭死於越而返葬於呉耶然呉時諸冢墓如巫臣要離干將之𩔖皆具載圖志獨不及宰嚭冡則何也吳越春秋卷三欽定四庫全書吳越春秋卷四漢趙煜撰越王無余外傳第六}
  - {type: page-break, offset: 7474, content: '', id: KR2i0001_WYG_004-1a, image: WYG0463/WYG0463-0038a.png}
  - {type: variant, offset: 7474, length: 0, content: '', krp: 太宰嚭曰殺太宰嚭逄同與其妻子越絶言宰嚭之死者五曰擒夫差殺其妻子又曰三臺者嚭妻子死所也常疑越絶書非子貢作特後人托曰殺夫差而戮其相曰殺太宰嚭戮其妻子曰禽夫差而戮太宰嚭與出存魯亂齊破吳彊晉霸越是也斯言也乃後之人多其功是非子貢名耳何以知其非子貢作越絶内傳於說陳成恒之事終之曰子貢一而免前既備論之矣此書謂亦葬卑猶之旁豈其後嚭死於越而返葬之言也且他文亦不類或者所載未必盡實宰嚭得保首領以沒蓋幸嚭冡何也於吳耶然吳時諸冡墓如巫臣要離干將之類皆具載圖志獨不及宰吳越春秋夫差内傳第五}
