  - {type: variant, offset: 22, length: 0, content: '', SBCK: 解范蠡楚三尸吕氏春秋髙誘之鄒人蓋鄒爲楚所并爾又太史公素王妙論曰范蠡本南陽人列仙人也字少伯大夫種姓文氏字㑹楚之鄒人按鄒本邾子之國此云楚按大夫官名如以爲姓也則大夫逢同大夫臯如等豈皆其姓耶傳云徐人索􅀮曰大夫官種名也一云大夫姓猶司馬司空之此今}
  - {type: variant, offset: 22, length: 0, content: '', WYG: 吕氏春秋髙誘解范蠡楚三户人也字少伯大夫種姓文氏字㑹楚之鄒人按鄒本邾子之國此云楚之鄒人盖鄒為楚所并爾又太史公素王妙論曰范蠡本南陽人列仙𫝊云徐人索隠曰大夫官種名也一云大夫姓猶司馬司空之比今按大夫官名如以為姓也則大夫逢同大夫皋如等豈皆其姓耶}
