  - {type: variant, offset: 781, length: 0, content: '', SBCK: 周自后稷封爲王者之後按孔叢子羊容問子思曰殷帝乙之時王季以九命作伯扵西受圭瓉秬鬯之賜故文王因之至太王王季文王此爲諸侯奚得為西伯乎子思曰吾聞諸子夏曰召公分陜謂之召伯也得專征伐此諸侯爲伯猶}
  - {type: variant, offset: 781, length: 0, content: '', WYG: 按孔叢子羊容問子思曰周自后稷封為王者之後至太王王季文王此為諸侯奚得為西伯乎子思曰吾聞諸子夏曰殷帝乙之時王季以九命作伯於西受圭瓉秬鬯之賜故文王因之得專征伐此諸侯為伯猶召公分陕謂之召伯也}
