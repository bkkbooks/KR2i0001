  - {type: variant, offset: 702, length: 0, content: '', SBCK: 八年慶封奔吳左傳襄公二十卒則二十八年賜慶封邑不得是夷昧但句餘或别是一人今按春秋吳句餘予之朱方杜預云句餘吳子夷昧也索隠曰餘祭}
  - {type: variant, offset: 702, length: 0, content: '', WYG: 左傳襄公二十八年慶封奔呉呉句餘子之朱方杜預云句餘呉子夷昧也索隠曰餘祭以二十九年卒則二十八年賜慶封邑不得是夷昧但句餘或别是一人今按春秋於明年書閽弑呉子餘祭又年表餘祭四年守閽殺餘祭則句餘非别為一人矣世家年表皆在餘祭三年即襄公二十八年也年表既云餘祭四年卒此乃書十二年何也十二十三年皆當刪十字十七年亦改從四年可也朱方呉邑秦改丹徒今屬鎮江}
