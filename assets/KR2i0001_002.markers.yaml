  - {type: variant, offset: 703, length: 1, content: 效, SBCK: 二十九年為一人矣世家年表皆在餘祭三年即襄公二十八年也年表旣云餘於明年書閽弑吳子餘祭又年表餘祭四年守閽殺餘祭則句餘非别十七年亦改從四年可也朱方吳邑秦改丹徒今屬鎮江祭四年卒此乃書十二年何也十二十三年皆當刪十字以効}
