  - {type: variant, offset: 1066, length: 0, content: '', SBCK: 習戰教士謂常所教練之兵也君子謂君所子養有㤙恵者諸御謂諸史記俊士作教士索隱曰虞書云流宥五刑習流謂流放之罪人使之勝此所謂習流是即習水戰之兵若曰使罪人習戰越一小國流放者何理事之官在軍有職掌者徐天祐曰笠澤之戰越以三軍潜涉蓋以舟師人哉至二千}
  - {type: page-break, offset: 1066, content: '', id: KR2i0001_SBCK_010-4b}
  - {type: variant, offset: 1066, length: 0, content: '', WYG: 史記俊士作教士索隠曰虞書云流宥五刑習流謂流放之罪人使之習戰教士謂常所教練之兵也君子謂君所子養有恩恵者諸御謂諸理事之官在軍有職掌者徐天祐曰笠澤之戰越以三軍潛涉盖以舟師勝此所謂習流是即習水戰之兵若曰使罪人習戰越一小國流放者何至二千人哉}
  - {type: variant, offset: 1066, length: 0, content: '', krp: 習戰教士謂常所教練之兵也君子謂君所子養有㤙恵者諸御謂諸史記俊士作教士索隱曰虞書云流宥五刑習流謂流放之罪人使之勝此所謂習流是即習水戰之兵若曰使罪人習戰越一小國流放者何理事之官在軍有職掌者徐天祐曰笠澤之戰越以三軍潜涉蓋以舟師人哉至二千}
