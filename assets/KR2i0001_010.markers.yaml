  - {type: variant, offset: 5535, length: 0, content: '', SBCK: 二十五年卽魯哀公二十三年也此書謂已誅忠臣居徐天祐曰越滅吳之明年大夫種賜劒以死是爲勾踐然昔者夫子將見趙簡子聞竇鳴犢舜華之死臨河而不濟爲其殺賢無幾求賢士孔子聞之奉雅琴禮樂奏於越皆是年事也竊獨以爲不在聞種之死愚知其不入越也而况奏雅琴以干時君乎按春秋哀公大夫而諱傷其􅀋也至作爲陬操以哀之文種非賢大夫歟使夫子尚子之卒已八年矣謂夫子以是年入越非也十六年夏四月書孔丘卒由文種之死上距夫}
  - {type: variant, offset: 5535, length: 0, content: '', WYG: 徐天祐曰越滅吳之明年大夫種賜劒以死是為勾踐二十五年即魯哀公二十三年也此書謂已誅忠臣居無幾求賢士孔子聞之奉雅琴禮樂奏扵越皆是年事也竊獨以為不然昔者夫子将見趙簡子聞竇鳴犢舜華之死臨河而不濟為其殺賢大夫而諱傷其𩔖也至作為陬操以哀之文種非賢大夫歟使夫子尚在聞種之死愚知其不入越也而况奏雅琴以干時君乎按春秋哀公十六年夏四月書孔丘卒由文種之死上距夫子之卒已八年矣謂夫子以是年入越非也}
  - {type: variant, offset: 5535, length: 0, content: '', krp: 二十五年卽魯哀公二十三年也此書謂已誅忠臣居徐天祐曰越滅吳之明年大夫種賜劒以死是爲勾踐然昔者夫子將見趙簡子聞竇鳴犢舜華之死臨河而不濟爲其殺賢無幾求賢士孔子聞之奉雅琴禮樂奏於越皆是年事也竊獨以爲不在聞種之死愚知其不入越也而况奏雅琴以干時君乎按春秋哀公大夫而諱傷其類也至作爲陬操以哀之文種非賢大夫歟使夫子尚子之卒已八年矣謂夫子以是年入越非也十六年夏四月書孔丘卒由文種之死上距夫}
