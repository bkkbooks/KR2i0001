  - {type: variant, offset: 6143, length: 0, content: '', SBCK: 世次自勾此書載越自稱爲君或者卽王之侯也世家曰王無彊時楚威王興兵大敗越殺踐五傳至王無彊以世家考之則七世矣無彊王之侯之子所謂王侯亡凡一百五十三年通鑑書之顯王三十五年此云勾踐至于親歷八無􅆠盡取越地越以此散徐廣曰周顯王四十六年今自勾踐卒至越及紀年皆不合若如世家所載則無彊之死衆散久矣非王親時失衆主稱霸二百二十四年親衆皆失去琅邪徙於吳爲楚所滅與史世家吳則越之徙吳已久亦非王親時也亡國也又記年曰王翳三十三年遷于吳越春秋勾踐伐吳外傳第十大德十年歲在丙午三月音註越六月書成刋板十二月畢工前文林郎國子監書庫官徐天祜音註紹興路儒學學録留埾紹興路儒學學正陳昺伯紹興路儒學教授梁相正議大夫紹興路總管提調學校官劉克昌}
  - {type: page-break, offset: 6143, content: '', id: KR2i0001_SBCK_010-22a}
  - {type: page-break, offset: 6143, content: '', id: KR2i0001_SBCK_010-22b}
  - {type: variant, offset: 6143, length: 0, content: '', WYG: 此書載越世次自勾踐五傳至王無彊以世家考之則十世矣無彊王之侯之子所謂王侯自稱為君或者即王之侯也世家曰王無彊時楚威王興兵大敗越殺無彊盡取越地越以此散徐廣曰周顕王四十六年今自勾踐卒至越亡凡一百五十三年通鑑書之顯王三十五年此云勾踐至于親歴八主稱霸二百二十四年親衆皆失去鄉邪徙於吳為楚所滅與史世家及紀年皆不合若如世家所載則無彊之死衆散久矣非王親時失衆亡國也又記年曰王翳三十三年遷于吳則越之徙吳已久亦非王親時也吳越春秋卷六}
