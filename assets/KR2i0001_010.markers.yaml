  - {type: variant, offset: 5341, length: 0, content: '', SBCK: 卒以越霸諸臣雖與有力而種蠡之功居多蠡見幾而作可謂明且哲徐天祐曰勾踐脫囚虜之辱苦身劳思君臣相與謀報吳者二十餘年於地下謀吳之前人是何言歟令死者有知謀之地下何益如其無知矣種之死也無罪而越王誅之也無名其辭乃曰幸以餘術爲􅀌前王報此種所以仰天而歎又自笑也焉用謀之夫大功不賞而滛刑以}
  - {type: variant, offset: 5341, length: 0, content: '', WYG: 徐天祐曰勾踐脱囚虜之辱苦身勞思君臣相與謀報吳者二十餘年卒以越霸諸臣雖與有力而種蠡之功居多蠡見幾而作可謂明且哲矣種之死也無罪而越王誅之也無名其辭乃曰幸以餘術為孤前王於地下謀吳之前人是何言歟令死者有知謀之地下何益如其無知焉用謀之夫大功不賞而淫刑以報此種所以仰天而歎又自笑也}
  - {type: variant, offset: 5341, length: 0, content: '', krp: 卒以越霸諸臣雖與有力而種蠡之功居多蠡見幾而作可謂明且哲徐天祐曰勾踐脫囚虜之辱苦身劳思君臣相與謀報吳者二十餘年於地下謀吳之前人是何言歟令死者有知謀之地下何益如其無知矣種之死也無罪而越王誅之也無名其辭乃曰幸以餘術爲孤前王報此種所以仰天而歎又自笑也焉用謀之夫大功不賞而滛刑以}
