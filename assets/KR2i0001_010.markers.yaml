  - {type: variant, offset: 3289, length: 0, content: '', SBCK: 吳是爲勾踐二十二年左傳哀公二十年越圍三年吳師自潰越世家亦曰留圍之三年吳師敗與左傳合此書繫其哀公二十二年越滅吳爲勾踐二十四年蓋首尾三年也國語曰居軍守一年而滅吳誤也事於一十一年以爲圍}
