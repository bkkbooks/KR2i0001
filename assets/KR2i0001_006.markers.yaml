  - {type: variant, offset: 72, length: 0, content: '', SBCK: 禹所封國世紀曰鯀妻脩已見流星貫􅄧夢接意感又吞世本曰鯀娶有辛氏女謂之女志是生髙密宋忠曰髙密之名孔安國謂禹爲名張晏謂禹爲字今並存之神珠薏苡而生禹名文命字密史記以文命爲禹}
