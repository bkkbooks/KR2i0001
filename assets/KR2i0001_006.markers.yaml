  - {type: variant, offset: 242, length: 0, content: '', SBCK: 寢門子産曰昔堯殛鯀於羽山其神化左傳昭公七年晋侯有疾夢黄熊入於足鼈也按說文及字林皆云能熊屬足似鹿然則能旣熊屬又爲鼈􅀋爲黄熊以入于羽淵杜預解熊音雄獸名亦作能如字一音奴來切三熊白及鼈爲膳豈鯀化爲二物乎作能者勝也東海人􅀕禹廟不用}
  - {type: variant, offset: 242, length: 0, content: '', WYG: 左傳昭公七年晉侯有疾夢黄熊入扵寝門子産曰昔堯殛鯀於羽山其神化為黄熊以入于羽淵杜預解熊音雄獸名亦作能如字一音奴来切三足鼈也按説文及字林皆云能熊屬足似鹿然則能既熊屬又為鼈𩔖作能者勝也東海人祭禹廟不用熊白及鼈為膳豈鯀化為二物乎}
