  - {type: variant, offset: 521, length: 0, content: '', SBCK: 禹未嘗兩徐天祐曰禹治水時未嘗親至南方故也孟子曰禹八年于外而禹貢云作十有至越其至越在㑹計之時非治水時也禹貢記南方山川多與今不合三年而八州平是十二年而八州平十三年而兖州平兖州平在舜受三載乃同或者以爲比禹治水之年通鯀九載言之也馬融曰禹治水及成乃東巡登宛委發金簡之書得通水之理使禹之治水七年而後終之年然則禹之成功不過三四年間耳此書謂勞身焦思七年功未脱乎諸若此􅀋蓋傳疑尚矣得神書始知通水之理不已}
  - {type: variant, offset: 521, length: 0, content: '', WYG: 徐天祐曰禹未嘗兩至越其至越在㑹計之時非治水時也禹貢記南方山川多與今不合禹治水時未嘗親至南方故也孟子曰禹八年扵外而禹貢云作十三載乃同或者以為比禹治水之年通鯀九載言之也馬融曰禹治水三年而八州平是十二年而八州平十三年而兖州平兖州平在舜受終之年然則禹之成功不過三四年間耳此書謂勞身焦思七年功未及成乃東巡登宛委發金簡之書得通水之理使禹之治水七年而後得神書始知通水之理不已晚乎諸若此𩔖盖傳疑尚矣}
  - {type: variant, offset: 521, length: 0, content: '', krp: 禹未嘗兩徐天祐曰禹治水時未嘗親至南方故也孟子曰禹八年于外而禹貢云作十有至越其至越在㑹計之時非治水時也禹貢記南方山川多與今不合三年而八州平是十二年而八州平十三年而兖州平兖州平在舜受三載乃同或者以爲比禹治水之年通鯀九載言之也馬融曰禹治水及成乃東巡登宛委發金簡之書得通水之理使禹之治水七年而後終之年然則禹之成功不過三四年間耳此書謂勞身焦思七年功未脱乎諸若此類蓋傳疑尚矣得神書始知通水之理不已}
