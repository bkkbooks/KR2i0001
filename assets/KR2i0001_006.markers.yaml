  - {type: variant, offset: 621, length: 0, content: '', SBCK: 縣西北四十五里蘇㑹稽志塗山在山隂氏昭公四年傳穆有塗山之㑹哀公七年傳禹合諸侯于塗山杜預觧鶚演義塗山有四一㑹稽二渝州巴南舊江州三濠州四當塗縣按左法復㑹于是山然則禹與穆王皆嘗㑹諸侯於塗山矣然非必皆壽春並云在壽春東北説者曰今濠州也栁宗元塗山銘序曰周穆遐追遺廟塗君祠廟銘存焉常璩􅁃仲雍並言禹娶於此越絶等書乃云禹娶也若禹之所娶則未詳何地水經注江州縣水北岸有塗山南有夏禹蓋㑹稽實禹㑹侯計功之地非所娶之國下文兼載白狐九尾之異尤一㑹稽塗山應劭曰在永興北永興今蕭山縣也又與郡志所載不同疑爲可}
  - {type: page-break, offset: 621, content: '', id: KR2i0001_SBCK_006-4a}
  - {type: variant, offset: 621, length: 0, content: '', WYG: 㑹稽志塗山在山隂縣西北四十五里蘇鶚演義塗山有四一㑹稽二渝州已南舊江州三濠州四當塗縣按左氏昭公四年傳穆有塗山之㑹哀公七年𫝊禹合諸侯于塗山杜預解並云在夀春東北説者曰今濠州也栁宗元塗山銘序曰周穆遐追遺法復㑹于是山然則禹與穆王皆嘗㑹諸侯於塗山矣然非必皆夀春也若禹之所娶則未詳何地水經注江州縣水北岸有塗山南有夏禹廟塗君祠廟銘存焉常璩庾仲雍並言禹娶扵此越絶等書乃云禹娶于㑹稽塗山應劭曰在永興北永興今蕭山縣也又與郡志所載不同盖㑹稽實禹㑹侯計功之地非所娶之國下文兼載白狐九尾之異尤為可疑}
