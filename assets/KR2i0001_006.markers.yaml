  - {type: variant, offset: 30, length: 0, content: '', SBCK: 顓頊之子字熈連帝王世紀曰鯀帝以鯀為顓頊子漢律歷志則曰顓頊五世而生鯀通鑑外紀從之古史山易曰鯀封於崇故國語謂之崇伯鯀史記曰鯀之父帝顓頊世本亦近得之此書以爲顓頊之後曰後者可以通子孫言之也曰太史公以鯀爲顓頊之子其世太廹班同以為五世孫}
  - {type: variant, offset: 30, length: 0, content: '', WYG: 帝王世紀曰鯀帝顓頊之子字熈連山易曰鯀封於崇故國語謂之崇伯鯀史記曰鯀之父帝顓頊世本亦以鯀為顓頊子漢律厯志則曰顓頊五世而生鯀通鑑外紀従之古史曰太史公以鯀為顓頊之子其世太廹班固以為五世孫近得之此書以為顓頊之後曰後者可以通子孫言之也}
