  - {type: variant, offset: 1195, length: 0, content: '', SBCK: 左傳昭公元年楚公子圍殺太宰伯州犂于郟郄當作郤詳此書似以伯州犂郤宛爲一人按子曰郤宛郤宛之子曰伯嚭宛亦姓伯又别氏郤吳世家曰楚誅伯州春秋昭公二十七年楚殺其大夫郤宛自是二人又按徐廣曰州犂之伯州犂號郤宛非也犂其孫伯嚭奔呉此云}
  - {type: variant, offset: 1195, length: 0, content: '', WYG: 郄當作郤味此書似以伯州犂郤宛為一人按左傳昭公元年楚公子圍殺太宰伯州犂于郟春秋昭公二十七年楚殺其大夫郤宛自是二人又按徐廣曰州犂之子曰郤宛郤宛之子曰伯嚭宛亦姓伯又别氏郤呉世家曰楚誅伯州犂其孫伯嚭奔呉此云伯州犂號郤宛非也}
