  - {type: variant, offset: 6375, length: 0, content: '', SBCK: 多亡臣也析公雍徐天祜曰楚何其之奔鄭也将遂奔晉頼聲子有言益其爵禄而反之子孫復仕於楚子子靈賁皇奔晉迭為謀主楚是以有繞角靡角巢鄢陵之敗伍舉之出亡所以報楚入郢讎其舊君而甘心焉是舉也隨與鄭亦與有由是世為忠臣其後伍奢伍尚卒困䜛口無罪而父子就戮此子胥䜛人㒺極交亂四􅀦其是之謂歟聴言者可以監矣憂而唐卒受禍㣲申包胥以秦師至楚何以能國詩云}
  - {type: variant, offset: 6375, length: 0, content: '', WYG: 徐天祐曰楚何其多亡臣也析公雍子子靈賁皇奔晉迭為謀主楚是以有繞角靡角巢鄢陵之敗伍舉之奔鄭也将遂奔晉賴聲子有言益其爵禄而反之子孫復仕於楚由是世為忠臣其後伍奢伍尚卒困讒口無罪而父子就戮此子胥之出亡所以報楚入郢讎其舊君而甘心焉是舉也随與鄭亦與有憂而唐卒受禍微申包胥以秦師至楚何以能國詩云讒人㒺極交亂四國其是之謂歟聴言者可以監矣}
  - {type: variant, offset: 6375, length: 0, content: '', krp: 多亡臣也析公雍徐天祜曰楚何其之奔鄭也将遂奔晉頼聲子有言益其爵禄而反之子孫復仕於楚子子靈賁皇奔晉迭為謀主楚是以有繞角靡角巢鄢陵之敗伍舉之出亡所以報楚入郢讎其舊君而甘心焉是舉也隨與鄭亦與有由是世為忠臣其後伍奢伍尚卒困䜛口無罪而父子就戮此子胥䜛人㒺極交亂四國其是之謂歟聴言者可以監矣憂而唐卒受禍㣲申包胥以秦師至楚何以能國詩云}
