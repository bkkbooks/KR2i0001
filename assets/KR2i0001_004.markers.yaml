  - {type: variant, offset: 7178, length: 0, content: '', SBCK: 陽縣属九江音婆秦為鄱楚子重子反一歲七奔命而昭王即位無嵗不有吳師則亡臣伍貟伯嚭為郡今饒州也徐天祜曰呉楚世為仇敵呉自伐巢以至取番大小二十餘戰鵲岸房鍾州来雞艾之戰此書皆畧而不載云之也其間釐虺棘櫟麻五邑乏役與庸浦皐舟}
  - {type: variant, offset: 7178, length: 0, content: '', WYG: 晉邑漢為鄱陽縣屬九江郡今饒州也徐天祐曰呉楚世為仇敵呉自伐巢以至取番大小二十餘戰楚子重子反一嵗七奔命而昭王即位無嵗不有呉師皆亡臣伍員伯嚭為之也其間釐虺棘櫟麻伍邑之役與庸浦皋舟鵲岸房鍾州來雞父之戰此書皆略而不載云}
