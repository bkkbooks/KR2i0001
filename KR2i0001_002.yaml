body:
  text: 吳王壽夢傳第二壽夢元年朝周適楚觀諸侯禮樂魯成公會於鍾離深問周公禮樂成公悉為陳前王之禮樂因為詠歌三代之風壽夢曰孤在夷蠻徒以椎髻為俗豈有斯之服哉因歎而去曰於乎哉禮也二年楚之亡大夫申公巫臣適吳以為行人教吳射御導之伐楚楚莊王怒使子反將敗吳師二國從斯結讎於是吳始通中國而與諸侯為敵五年伐楚敗子反十六年楚恭王怨吳為巫臣伐之也乃舉兵伐吳至衡山而還十七年壽夢以巫臣子狐庸為相任以國政二十五年壽夢病將卒有子四人長曰諸樊次曰餘祭次曰餘昧次曰季札季札賢壽夢欲立之季札讓曰禮有舊制柰何廢前王之禮而行父子之私乎壽夢乃命諸樊曰我欲傳國及札爾無忘寡人之言諸樊曰周之太王知西伯之聖廢長立少王之道興今欲授國於札臣誠耕於野王曰昔周行之德加於四海今汝於區區之國荊蠻之鄉奚能成天子之業乎且今子不忘前人之言必授國以次及于季札諸樊曰敢不如命壽夢卒諸樊以適長攝行事當國政吳王諸樊元年已除喪讓季札曰昔前王未薨之時嘗晨昧不安吾望其色也意在於季札又復三朝悲吟而命我曰吾知公子札之賢欲廢長立少重發言於口雖然我心已許之然前王不忍行其私計以國付我我敢不從命乎今國者子之國也吾願達前王之義季札謝曰夫適長當國非前王之私乃宗廟社稷之制豈可變乎諸樊曰苟可施於國何先王之命有太王改為季歷二伯來入荊蠻遂成為國周道就成前人誦之不絕於口而子之所習也札復謝曰昔曹公卒庶存適亡諸侯與曹人不義而立於國子臧聞之行吟而歸曹君懼將立子臧子臧去之以成曹之道札雖不才願附子臧之義吾誠避之吳人固立季札季札不受而耕於野吳人舍之諸樊驕恣輕慢鬼神仰天求死將死命弟餘祭曰必以國及季札乃封季札於延陵號曰延陵季子餘祭十二年楚靈王會諸侯伐吳圍朱方誅慶封慶封數為吳伺祭故晉楚伐之也吳王餘祭怒曰慶封窮來奔吳封之朱方以效不恨士也即舉兵伐楚取二邑而去十三年楚怨吳為慶封故伐之心恨不解伐吳至乾谿吳擊之楚師敗走十七年餘祭卒餘昧立四年卒欲授位季札季札讓逃去曰吾不受位明矣昔前君有命已附子臧之義潔身清行仰高履尚惟仁是處富貴之於我如秋風之過耳遂逃歸延陵吳人立餘昧子州于號為吳王僚也
