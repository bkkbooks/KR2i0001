body:
  text: 闔閭內傳第四闔閭元年始任賢使能施恩行惠以仁義聞於諸侯仁未施恩未行恐國人不就諸侯不信乃舉伍子胥為行人以客禮事之而與謀國政闔閭謂子胥曰寡人欲彊國霸王何由而可伍子胥膝進垂淚頓首曰臣楚國之亡虜也父兄棄捐骸骨不葬魂不血食蒙罪受辱來歸命於大王幸不加戮何敢與政事焉闔閭曰非夫子寡人不免於縶禦之使今幸奉一言之教乃至於斯何為中道生進退耶子胥曰臣聞謀議之臣何足處於危亡之地然憂除事定必不為君主所親闔閭曰不然寡人非子無所盡議何得讓乎吾國僻遠顧在東南之地險阻潤濕又有江海之害君無守禦民無所依倉庫不設田疇不墾為之柰何子胥良久對曰臣聞治國之道安君理民是其上者闔閭曰安君治民其術柰何子胥曰凡欲安君治民興霸成王從近制遠者必先立城郭設守備實倉廩治兵庫斯則其術也闔閭曰善夫築城郭立倉庫因地制宜豈有天氣之數以威鄰國者乎子胥曰有闔閭曰寡人委計於子子胥乃使相土嘗水象天法地造築大城周廻四十七里陸門八以象天八風水門八以法地八聰築小城周十里陵門三不開東面者欲以絕越明也立閶門者以象天門通閶闔風也立蛇門者以象地戶也闔閭欲西破楚楚在西北故立閶門以通天氣因復名之破楚門欲東并大越越在東南故立蛇門以制敵國吳在辰其位龍也故小城南門上反羽為兩鯢鱙以象龍角越在巳地其位蛇也故南大門上有木蛇北向首內示越屬於吳也城郭以成倉庫以具闔閭復使子胥屈蓋餘燭傭習術戰騎射御之巧未有所用請干將鑄作名劍二枚干將者吳人也與歐冶子同師俱能為劍越前來獻三枚闔閭得而寶之以故使劍匠作為二枚一曰干將二曰莫耶莫耶干將之妻也干將作劍采五山之鐵精六合之金英候天伺地陰陽同光百神臨觀天氣下降而金鐵之精不銷淪流於是干將不知其由莫耶曰子以善為劍聞於王使子作劍三月不成其有意乎干將曰吾不知其理也莫耶曰夫神物之化須人而成今夫子作劍得無得其人而後成乎干將曰昔吾師作冶金鐵之類不銷夫妻俱入冶爐中然後成物至今後世即山作冶麻絰葌服然後敢鑄金於山今吾作劍不變化者其若斯耶莫耶曰師知爍身以成物吾何難哉於是干將妻乃斷髮剪爪投於爐中使童女童男三百人鼓橐裝炭金鐵乃濡遂以成劍陽曰干將陰曰莫耶陽作龜文陰作漫理干將匿其陽出其陰而獻之闔閭甚重既得寶劍適會魯使季孫聘於吳闔閭使掌劍大夫以莫耶獻之季孫拔劍之鍔中缺者大如黍米歎曰美哉劍也雖上國之師何能加之夫劍之成也吳霸有缺則亡矣我雖好之其可受乎不受而去闔閭既寶莫耶復命於國中作金鉤令曰能為善鉤者賞之百金吳作鉤者甚眾而有之貪王之重賞也殺其二子以血舋金遂成二鉤獻於闔閭詣宮門而求賞王曰為鉤者眾而子獨求賞何以異於眾夫子之鉤乎作鉤者曰吾之作鉤也貪而殺二子舋成二鉤王乃舉眾鉤以示之何者是也王鉤甚多形體相類不知其所在於是鉤師向鉤而呼二子之名吳鴻扈稽我在於此王不知汝之神也聲絕於口兩鉤俱飛著父之胸吳王大驚曰嗟乎寡人誠負於子乃賞百金遂服而不離身六月欲用兵會楚之白喜來奔吳王問子胥曰白喜何如人也子胥曰白喜者楚白州犁之孫平王誅州犁喜因出奔聞臣在吳而來也闔閭曰州犁何罪子胥曰白州犁楚之左尹號曰郄宛事平王平王幸之常與盡日而語襲朝而食費無忌望而妬之因謂平王曰王愛幸宛一國所知何不為酒一至宛家以示群臣於宛之厚平王曰善乃具酒於郄宛之舍無忌教宛曰平王甚毅猛而好兵子必故陳兵堂下門庭宛信其言因而為之及平王往而大驚曰宛何等也無忌曰殆且有篡殺之憂王急去之事未可知平王大怒遂殺郄宛諸侯聞之莫不歎息喜聞臣在吳故來請見之闔閭見白喜而問曰寡人國僻遠東濱海側聞子前人為楚荊之暴怒費無忌之讒口不遠吾國而來於斯將何以教寡人喜曰楚國之失虜前人無罪橫被暴誅臣聞大王收伍子胥之窮厄不遠千里故來歸命惟大王賜其死闔閭傷之以為大夫與謀國事吳大夫被離承宴問子胥曰何見而信喜子胥曰吾之怨與喜同子不聞河上歌乎同病相憐同憂相救驚翔之鳥相隨而集瀨下之水因復俱流胡馬望北風而立越鷰向日而熙誰不愛其所近悲其所思者乎被離曰君之言外也豈有內意以決疑乎子胥曰吾不見也被離曰吾觀喜之為人鷹視虎步專功擅殺之性不可親也子胥不然其言與之俱事吳王二年吳王前既殺王僚又憂慶忌之在鄰國恐合諸侯來伐問子胥曰昔專諸之事於寡人厚矣今聞公子慶忌有計於諸侯吾食不甘味臥不安席以付於子子胥曰臣不忠無行而與大王圖王僚於私室之中今復欲討其子恐非皇天之意闔閭曰昔武王討紂而後殺武庚周人無怨色今若斯議何乃天子子胥曰臣事君王將遂吳統又何懼焉臣之所厚其人者細人也願從於謀吳王曰吾之憂也其敵有萬人之力豈細人之所能謀乎子胥曰其細人之謀事而有萬人之力也王曰其為何誰子以言之子胥曰姓要名離臣昔嘗見曾拆辱壯士椒丘訴也王曰辱之柰何子胥曰椒丘訴者東海上人也為齊王使於吳過淮津欲飲馬於津津吏曰水中有神見馬即出以害其馬君勿飲也訴曰壯士所當何神敢干乃使從者飲馬於津水神果取其馬馬沒椒丘訴大怒袒裼持劍入水求神決戰連日乃出眇其一目遂之吳會於友人之喪訴恃其與水戰之勇也於友人之喪席而輕傲於士大夫言辭不遜有陵人之氣要離與之對坐合坐不忍其溢於力也時要離乃挫訴曰吾聞勇士之鬭也與日戰不移表與神鬼戰者不旋踵與人戰者不達聲生往死還不受其辱今子與神鬭於水亡馬失御又受眇目之病形殘名勇勇士所恥不即喪命於敵而戀其生猶傲色於我哉於是椒丘訴卒於詰責恨怒並發暝即往攻要離於是要離席闌至舍誡其妻曰我辱壯士椒丘訴於大家之喪餘恨蔚恚暝必來也慎無閉吾門至夜椒丘訢果往見其門不閉登其堂不關入其室不守放髮僵臥無所懼訴乃手劍而捽要離曰子有當死之過者三子知之乎離曰不知訴曰子辱我於大家之眾一死也歸不關閉二死也臥不守御三死也子有三死之過欲無得怨要離曰吾無三死之過子有三不肖之愧子知之乎訴曰不知要離曰吾辱子於千人之眾子無敢報一不肖也入門不咳登堂無聲二不肖也前拔子劍手挫捽吾頭乃敢大言三不肖也子有三不肖而威於我豈不鄙哉於是椒丘訴投劍而嘆曰吾之勇也人莫敢眥占者離乃加吾之上此天下壯士也臣聞要離若斯誠以聞矣吳王曰願承宴而待焉子胥乃見要離曰吳王聞子高義惟一臨之乃與子胥見吳王王曰子何為者要離曰臣國東千里之人臣細小無力迎風則僵負風則伏大王有命臣敢不盡力吳王心非子胥進此人良久默然不言要離即進曰大王患慶忌乎臣能殺之王曰慶忌之勇世所聞也筋骨果勁萬人莫當走追奔獸手接飛鳥骨騰肉飛拊膝數百里吾嘗追之於江駟馬馳不及射之闇接矢不可中今子之力不如也要離曰王有意焉臣能殺之王曰慶忌明智之人歸窮於諸侯不下諸侯之士要離曰臣聞安其妻子之樂不盡事君之義非忠也懷家室之愛而不除君之患者非義也臣詐以負罪出奔願王戮臣妻子斷臣右手慶忌必信臣矣王曰諾要離乃詐得罪出奔吳王乃取其妻子焚棄於市要離乃奔諸侯而行怨言以無罪聞於天下遂如衛求見慶忌見曰闔閭無道王子所知今戮吾妻子焚之於市無罪見誅吳國之事吾知其情願因王子之勇闔閭可得也何不與我東之於吳慶忌信其謀後三月揀練士卒遂之吳將渡江於中流要離力微坐與上風因風勢以矛鉤其冠順風而刺慶忌慶忌顧而揮之三捽其頭於水中乃加於膝上嘻嘻哉天下之勇士也乃敢加兵刃於我左右欲殺之慶忌止之曰此是天下勇士豈可一日而殺天下勇士二人哉乃誡左右曰可令還吳以旌其忠於是慶忌死要離渡至江陵愍然不行從者曰君何不行要離曰殺吾妻子以事其君非仁也為新君而殺故君之子非義也重其死不貴無義今吾貪生棄行非義也夫人有三惡以立於世吾何面目以視天下之士言訖遂投身於江未絕從者出之要離曰吾寧能不死乎從者曰君且勿死以俟爵祿要離乃自斷手足伏劍而死三年吳將欲伐楚未行伍子胥白喜相謂曰吾等為王養士畫其策謀有利於國而王故伐楚出其令託而無興師之意柰何有頃吳王問子胥白喜曰寡人欲出兵於二子何如子胥白喜對曰臣願用命吳王內計二子皆怨楚深恐以兵往破滅而已登臺向南風而嘯有頃而嘆群臣莫有曉王意者子胥深知王之不定乃薦孫子於王孫子者名武吳人也善為兵法辟隱深居世人莫知其能胥乃明知鑒辯知孫子可以折衝銷敵乃一旦與吳王論兵七薦孫子吳王曰子胥託言進士欲以自納而召孫子問以兵法每陳一篇王不知口之稱善其意大悅問曰兵法寧可以小試耶孫子曰可可以小試於後宮之女王曰諾孫子曰得大王寵姬二人以為軍隊長各將一隊令三百人皆被甲兜鍪操劍盾而立告以軍法隨鼓進退左右廻旋使知其禁乃令曰一鼓皆振二鼓操進三鼓為戰形於是宮女皆掩口而笑孫子乃親自操枹擊鼓三令五申其笑如故孫子顧視諸女連笑不止孫子大怒兩目忽張聲如駭虎髮上衝冠項旁絕纓顧謂執法曰取鈇鑕孫子曰約束不明申令不信將之罪也既以約束三令五申卒不卻行士之過也軍法如何執法曰斬武乃令斬隊長二人即吳王之寵姬也吳王登臺觀望正見斬二愛姬馳使下之令曰寡人已知將軍用兵矣寡人非此二姬食不甘味宜勿斬之孫子曰臣既已受命為將將法在軍君雖有令臣不受之孫子復撝鼓之當左右進退廻旋規矩不敢瞬目二隊寂然無敢顧者於是乃報吳王曰兵已整齊願王觀之惟所欲用使赴水火猶無難矣而可以定天下吳王忽然不悅曰寡人知子善用兵雖可以霸然而無所施也將軍罷兵就舍寡人不願孫子曰王徒好其言而不用其實子胥諫曰臣聞兵者凶事不可空試故為兵者誅伐不行兵道不明今大王虔心思士欲興兵戈以誅暴楚以霸天下而威諸侯非孫武之將而誰能涉淮踰泗越千里而戰者乎於是吳王大悅因鳴鼓會軍集而攻楚孫子為將拔舒殺吳亡將二公子蓋餘燭傭謀欲入郢孫武曰民勞未可恃也楚聞吳使孫子伍子胥白喜為將楚國苦之群臣皆怨咸言費無忌讒殺伍奢白州犁而吳侵境不絕於寇楚國郡臣有一朝之患於是司馬成乃謂子常曰太傅伍奢左尹白州犁邦人莫知其罪君與王謀誅之流謗於國至於今日其言不絕誠惑之蓋聞仁者殺人以掩謗者猶弗為也今子殺人以興謗於國不亦異乎夫費無忌楚之讒口民莫知其過今無辜殺三賢士以結怨於吳內傷忠臣之心外為鄰國所笑且郄伍之家出奔於吳吳新有伍員白喜秉威銳志結讎於楚故彊敵之兵日駭楚國有事子即危矣夫智者除讒以自安愚者受佞以自亡今子受讒國以危矣子常曰是瓦之罪也敢不圖之九月子常與昭王共誅費無忌遂滅其族國人乃謗止吳王有女滕玉因謀伐楚與夫人及女會蒸魚王前嘗半而與女女怒曰王食魚辱我不忘久生乃自殺闔閭痛之葬於國西閶門外鑿池積土文石為椁題湊為中金鼎玉杯銀樽珠襦之寶皆以送女乃舞白鶴於吳市中令萬民隨而觀之還使男女與鶴俱入羨門因發機以掩之殺生以送死國人非之湛盧之劍惡闔閭之無道也乃去而出水行如楚楚昭王臥而窹得吳王湛盧之劍於床昭王不知其故乃召風湖子而問曰寡人臥覺而得寶劍不知其名是何劍也風湖子曰此謂湛盧之劍昭王曰何以言之風湖子曰臣聞吳王得越所獻寶劍三枚一曰魚腸二曰磐郢三曰湛盧魚腸之劍已用殺吳王僚也磐郢以送其死女今湛盧入楚也昭王曰湛盧所以去者何也風湖子曰臣聞越王允常使歐冶子造劍五枚以示薛燭燭對曰魚腸劍逆理不順不可服也臣以殺君子以殺父故闔閭以殺王僚一名磐郢亦曰豪曹不法之物無益於人故以送死一名湛盧五金之英太陽之精寄氣託靈出之有神服之有威可以折衝拒敵然人君有逆理之謀其劍即出故去無道以就有道今吳王無道殺君謀楚故湛盧入楚昭王曰其直幾何風湖子曰臣聞此劍在越之時客有酬其直者有市之鄉三十駿馬千匹萬戶之都二是其一也薛燭對曰赤堇之山已令無雲若耶之溪深而莫測群臣上天歐冶死矣雖傾城量金珠玉盈河猶不能得此寶而況有市之鄉駿馬千匹萬戶之都何足言也昭王大悅遂以為寶闔閭聞楚得湛盧之劍因斯發怒遂使孫武伍胥白喜伐楚子胥陰令宣言於楚曰楚用子期為將吾即得而殺之子常用兵吾即去之楚聞之因用子常退子期吳拔六與潛二邑五年吳王以越不從伐楚南伐越越王允常曰吳不信前日之盟棄貢賜之國而滅其交親闔閭不然其言遂伐破檇里六年楚昭王使公子囊瓦伐吳報潛六之役吳使伍胥孫武擊之圍於豫章吳王曰吾欲乘危入楚都而破其郢不得入郢二子何功於是圍楚師於豫章大破之遂圍巢克之獲楚公子繁以歸為質九年吳王謂子胥孫武曰始子言郢不可入今果何如二將曰夫戰借勝以成其威非常勝之道吳王曰何謂也二將曰楚之為兵天下彊敵也今臣與之爭鋒十亡一存而王入郢者天也臣不敢必吳王曰吾欲復擊楚柰何而有功伍胥孫武曰囊瓦者貪而多過於諸侯而唐蔡怨之王必伐得唐蔡何怨二將曰昔蔡昭公朝於楚有美裘二枚善珮二枚各以一枚獻之昭王王服之以臨朝昭公自服一枚子常欲之昭公不與子常三年留之不使歸國唐成公朝楚有二文馬子常欲之公不與亦三年止之唐成相與謀從成公從者請馬以贖成公飲從者酒醉之竊馬而獻子常常乃遣成公歸國群臣誹謗曰君以一馬之故三年自囚願賞竊馬之功於是成公常思報楚君臣未嘗絕口蔡人聞之固請獻裘珮於子常蔡侯得歸如晉告訴以子元與太子質而請伐楚故曰得唐蔡而可伐楚吳王於是使使謂唐蔡曰楚為無道虐殺忠良侵食諸侯困辱二君寡人欲舉兵伐楚願二君有謀唐侯使其子乾為質於吳三國合謀伐楚舍兵於淮汭自豫章與楚夾漢水為陣子常遂濟漢而陣自小別山至於大別山三不利自知不可進欲奔亡史皇曰今子常無故與王共殺忠臣三人天禍來下王之所致子常不應十月楚二師陣於柏舉闔閭之弟夫概晨起請於闔閭曰子常不仁貪而少恩其臣下莫有死志追之必破矣闔閭不許夫概曰所謂臣行其志不待命者其謂此也遂以其部五千人擊子常大敗之子常走奔鄭楚師大亂吳師乘之遂破楚眾楚人未濟漢會楚人食吳因奔而擊破之雍滯五戰徑至於郢王追於吳寇出固將亡與妹季羋出河濉之間楚大夫尹固與王同舟而去吳師遂入郢求昭王王涉濉濟江入于雲中暮宿群盜攻之以戈擊王頭大夫尹固隱王以背受之中肩王懼奔鄖大夫種建負季羋以從鄖公辛得昭王大喜欲還之其弟懷怒曰昭王是我讎也欲殺之謂其兄辛曰昔平王殺我父吾殺其子不亦可乎辛曰君討其臣敢讎之者夫乘人之禍非仁也滅宗廢祀非孝也動無令名非智也懷怒不解辛陰與其季弟巢以王奔隨吳兵逐之謂隨君曰周之子孫在漢水上者楚滅之謂天報其禍加罰於楚君何寶之周室何罪而隱其賊能出昭王即重惠也隨君卜昭王與吳王不吉乃辭吳王曰今隨之僻小密近於楚楚實存我有盟至今未改若今有難而棄之今且安靜楚敢不聽命吳師多其辭乃退是時大夫子期雖與昭王俱亡陰與吳師為市欲出昭王王聞之得免即割子期心以與隨君盟而去吳王入郢止留伍胥以不得昭王乃掘平王之墓出其屍鞭之三百左足踐腹右手抉其目誚之曰誰使汝用讒諛之口殺我父兄豈不冤哉即令闔閭妻昭王夫人伍胥孫武白喜亦妻子常司馬成之妻以辱楚之君臣也遂引軍擊鄭鄭定公前殺太子建而困迫子胥自此鄭定公大懼乃令國中曰有能還吳軍者吾與分國而治漁者之子應募曰臣能還之不用尺兵斗糧得一橈而行歌道中即還矣公乃與漁者之子橈子胥軍將至當道扣橈而歌曰蘆中人如是再子胥聞之愕然大驚曰何等謂與語公為何誰矣曰漁父者子吾國君懼怖令於國有能還吳軍者與之分國而治臣念前人與君相逢於途今從君乞鄭之國子胥歎曰悲哉吾蒙子前人之恩自致於此上天蒼蒼豈敢忘也於是乃釋鄭國還軍守楚求昭王所在日急申包胥亡在山中聞之乃使人謂子胥曰子之報讎其以甚乎子故平王之臣親北面事之今至於僇屍之辱豈道之極乎子胥曰為我謝申包胥曰日暮路遠倒行而逆施之於道也申包胥知不可乃之於秦求救楚晝馳夜趨足踵蹠劈裂裳裹膝鶴倚哭於秦庭七日七夜口不絕聲秦哀公素沉湎不恤國事申包胥哭已歌曰吳為無道封豕長蛇以食上國欲有天下政從楚起寡君出在草澤使來告急如此七日哀公大驚楚有賢臣如是吳猶欲滅之寡人無臣若斯者其亡無日矣為賦無衣之詩曰豈曰無衣與子同袍王于興師與子同仇包胥曰臣聞戾德無厭王不憂鄰國疆埸之患逮吳之未定王其取分焉若楚遂亡於秦何利則亦亡君之土也願王以神靈存之世以事王秦伯使辭焉曰寡人聞命矣子且就館將圖而告包胥曰寡君今在草野未獲所伏臣何敢即安復立於庭倚牆而哭日夜不絕聲水不入口秦伯為之垂涕即出師而送之十年秦師未出越王允常恨闔閭破之檇里興兵伐吳吳在楚越盜掩襲之六月申包胥以秦師至秦使公子子蒲子虎率車五百乘救楚擊吳二子曰吾未知吳道使楚師前與吳戰而自稷會之大敗夫概七月楚司馬子成秦公子子蒲與吳王相守私以間兵伐唐滅之子胥久留楚求昭王不去夫概師敗卻退九月潛歸自立為吳王闔閭聞之乃釋楚師欲殺夫概奔楚昭王封夫概於棠溪闔閭遂歸子胥孫武白喜留敗楚師於淮澨秦師又敗吳師楚子期將焚吳軍子西曰吾國父兄身戰暴骨草野焉不收又焚之其可乎子期曰亡國失眾存沒所在又何殺生以愛死死如有知必將乘煙起而助我如其無知何惜草中之骨而亡吳國遂焚而戰吳師大敗子胥等相謂曰彼楚雖敗我餘兵未有所損我者孫武曰吾以吳干戈西破楚逐昭王而屠荊平王墓割戮其屍亦已足矣子胥曰自霸王已來未有人臣報讎如此者也行去矣吳軍去後昭王反國樂師扈子非荊王信讒佞殺伍奢白州犁而寇不絕於境至乃掘平王墓戮屍姦喜以辱楚君臣又傷昭王困迫幾為天下大鄙然已愧矣乃援琴為楚作窮劫之曲以暢君之迫厄之暢達也其詞曰王耶王耶何乖烈不顧宗廟聽讒孽任用無忌多所殺誅夷白氏族幾滅二子東奔適吳越吳王哀痛助忉怛垂涕舉兵將西伐伍胥白喜孫武決三戰破郢王奔發留兵縱騎虜荊闕楚荊骸骨遭發掘鞭辱腐屍恥難雪幾危宗廟社稷滅嚴王何罪國幾絕卿士悽愴民惻悷吳軍雖去怖不歇願王更隱撫忠節勿為讒口能謗褻昭王垂涕深知琴曲之情扈子遂不復鼓矣子胥等過溧陽瀨水之上乃長太息曰吾嘗饑於此乞食於一女子女子飼我遂投水而亡將欲報以百金而不知其家乃投金水中而去有頃一老嫗行哭而來人問曰何哭之悲嫗曰吾有女子守居三十不嫁往年擊綿於此遇一窮途君子而輒飯之而恐事泄自投於瀨水今聞伍君來不得其償自傷虛死是故悲耳人曰子胥欲報百金不知其家投金水中而去矣嫗遂取金而歸子胥歸吳吳王聞三師將至治魚為鱠將到之日過時不至魚臭須臾子胥至闔閭出鱠而食不知其臭王復重為之其味如故吳人作鱠者自闔閭之造也諸將既從還楚因更名閶門曰破楚門復謀伐齊齊子使女為質於吳吳王因為太子波聘齊女女少思齊日夜號泣因乃為病闔閭乃起北門名曰望齊門令女往遊其上女思不止病日益甚乃至殂落女曰令死者有知必葬我於虞山之巔以望齊國闔閭傷之正如其言乃葬虞山之巔是時太子亦病而死闔閭謀擇諸公子可立者未有定計波太子夫差日夜告於伍胥曰王欲立太子非我而誰當立此計在君耳伍子胥曰太子未有定我入則決矣闔閭有頃召子胥謀立太子子胥曰臣聞祀廢於絕後興於有嗣今太子不祿早失侍御今王欲立太子者莫大乎波秦之子夫差闔閭曰夫差愚而不仁恐不能奉統於吳國子胥曰夫差信以愛人端於守節敦於禮義父死子代經之明文闔閭曰寡人從子立夫差為太子使太子屯兵守楚留止自治宮室立射臺於安里華池在平昌南城宮在長樂闔閭出入游臥秋冬治於城中春夏治於城外治姑蘇之臺旦食䱉山晝游蘇臺射於鷗陂馳於游臺興樂石城走犬長洲斯且闔閭之霸時於是太子定因伐楚破師拔番楚懼吳兵復往乃去郢徙于蒍若當此之時吳以子胥白喜孫武之謀西破彊楚北威齊晉南伐於越
