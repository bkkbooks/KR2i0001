body:
  text: 勾踐歸國外傳第八越王勾踐臣吳至歸越勾踐七年也百姓拜之於道曰君王獨無苦矣今王受天之福復於越國霸王之迹自斯而起王曰寡人不慎天教無德於民今勞萬姓擁於岐路將何德化以報國人顧謂范蠡曰今十有二月己巳之日時加禺中孤欲以此到國何如蠡曰大王且留以臣卜日於是范蠡進曰異哉大王之擇日也王當疾趨車馳人走越王策馬飛輿遂復宮闕吳封地百里於越東至炭瀆西止周宗南造於山北薄於海越王謂范蠡曰孤獲辱連年勢足以死得相國之策再返南鄉今欲定國立城人民不足其功不可以興為之奈何范蠡對曰唐虞卜地夏殷封國古公營城周雒威折萬里德致八極豈直欲破彊敵收鄰國乎越王曰孤不能承前君之制修德自守亡衆棲於會稽之山請命乞恩受辱被恥囚結吳宮幸來歸國追以百里之封將尊前君之意復以會稽之上而宜釋吳之地范蠡曰昔公劉去邰而德彰於夏亶父讓地而名發於岐今大王欲國樹都并敵國之境不處平易之都據四達之地將焉立霸王之業越王曰寡人之計未有決定欲築城立郭分設里閭欲委屬於相國於是范蠡乃觀天文擬法於紫宮築作小城周千一百二十一步一圓三方西北立龍飛翼之樓以象天門東南伏漏石竇以象地戶陵門四達以象八風外郭築城而缺西北示服事吳也不敢壅塞內以取吳故缺西北而吳不知也北向稱臣委命吳國左右易處不得其位明臣屬也城既成而怪山自生者琅琊東武海中山也一夕自來故名怪山范蠡曰臣之築城也其應天矣崑崙之象存焉越王曰寡人聞崑崙之山乃地之柱上承皇天氣吐宇內下處后土稟受無外滋聖生神嘔養帝會故帝處其陽陸三王居其正地吾之國也扁天地之壤乘東南之維斗去極北非糞土之城何能與王者比隆盛哉范蠡曰君徒見外未見於內臣乃承天門制城合氣於后土嶽象已設崑崙故出越之霸也越王曰苟如相國之言孤之命也范蠡曰天地卒號以著其實名東武起游臺其上東南為司馬門立增樓冠其山巔以為靈臺起離宮於淮陽中宿臺在於高平駕臺在於成丘立苑於樂野燕臺在於石室齊臺在於稷山勾踐之出游也休息食室於冰廚越王乃召相國范蠡大夫種大夫郢問曰孤欲以今日上明堂臨國政專恩致令以撫百姓何日可矣惟三聖紀綱維持范蠡曰今日丙午日也丙陽將也是日吉矣又因良時臣愚以為可無始有終得天下之中大夫種曰前車已覆後車必戒願王深察范蠡曰夫子故不一二見也吾王今以丙午復初臨政解救其本是一宜夫金制始而火救其終是二宜蓄金之憂轉而及水是三宜君臣有差不失其理是四宜王相俱起天下立矣是五宜臣願急升明堂臨政越王是日立政翼翼小心出不敢奢入不敢侈越王念復吳讎非一旦也苦身勞心夜以接日目臥則攻之以蓼足寒則漬之以水冬常抱冰夏還握火愁心苦志懸膽於戶出入嘗之不絶於口中夜潛泣泣而復嘯越王曰吳王好服之離體吾欲采葛使女工織細布獻之以求吳王之心於子何如群臣曰善乃使國中男女入山采葛以作黃絲之布欲獻之未及遣使吳王聞越王盡心自守食不重味衣不重綵雖有五臺之游未嘗一日登玩吾欲因而賜之以書增之以封東至於勾甬西至於檇李南至於姑末北至於平原縱橫八百餘里越王乃使大夫種索葛布十萬甘蜜九党文笥七枚狐皮五雙晉竹十廋以復封禮吳王得之曰以越僻狄之國無珍今舉其貢貨而以復禮此越小心念功不忘吳之效也夫越本興國千里吾雖封之未盡其國子胥聞之退臥於舍謂侍者曰吾君失其石室之囚縱於南林之中今但因虎豹之野而與荒外之草於吾之心其無損也吳王得葛布之獻乃復增越之封賜羽毛之飾機杖諸侯之服越國大悅采葛之婦傷越王用心之苦乃作苦之詩曰葛不連蔓棻台台我君心苦命更之嘗膽不苦甘如飴令我采葛以作絲女工織兮不敢遲弱於羅兮輕霏霏號絺素兮將獻之越王悅兮忘罪除吳王歡兮飛尺書增封益地賜羽奇機杖茵褥諸侯儀群臣拜舞天顏舒我王何憂能不移於是越王內修其德外布其道君不名教臣不名謀民不名使官不名事國中蕩蕩無有政令越王內實府庫墾其田疇民富國彊衆安道泰越王遂師八臣與其四友時問政焉大夫種曰愛民而已越王曰奈何種曰利之無害成之無敗生之無殺與之無奪越王曰願聞種曰無奪民所好則利也民不失其時則成之省刑去罰則生之薄其賦斂則與之無多臺游則樂之靜而無苛則喜之民失所好則害之農失其時則敗之有罪不赦則殺之重賦厚斂則奪之多作臺游以罷民則苦之勞擾民力則怒之臣聞善為國者遇民如父母之愛其子如兄之愛其弟聞有饑寒為之哀見其勞苦為之悲越王乃緩刑薄罰省其賦斂於是人民殷富皆有帶甲之勇九年正月越王召五大夫而告之曰昔者越國遁棄宗廟身為窮虜恥聞天下辱流諸侯今寡人念吳猶躄者不忘走盲者不忘視孤未知策謀惟大夫誨之扶同曰昔者亡國流民天下莫不聞知今欲有計不宜前露其辭臣聞擊鳥之動故前俯伏猛獸將擊必弭毛帖伏鷙鳥將搏必卑飛戢翼聖人將動必順辭和衆聖人之謀不可見其象不可知其情臨事而伐故前無剽過之兵後無伏襲之患今大王臨敵破吳宜損之辭無令泄也臣聞吳王兵彊於齊晉而怨結於楚大王宜親於齊深結於晉陰固於楚而厚事於吳夫吳之志猛驕而自矜必輕諸侯而凌鄰國三國決權還為敵國必角勢交爭越承其弊因而伐之可克也雖五帝之兵無以過此范蠡曰臣聞謀國破敵動觀其符孟津之會諸侯曰可武王辭之方今吳楚結讎構怨不解齊雖不親外為其救晉雖不附猶效其義夫內臣謀而決讎其策鄰國通而不絶其援斯正吳之興霸諸侯之上尊臣聞峻高者隤葉茂者摧日中則移月滿則虧四時不並盛五行不俱馳陰陽更唱氣有盛衰故溢堤之水不淹其量熻乾之火不復其熾水靜則無漚瀴之怒火消則無熹毛之熱今吳乘諸侯之威以號令於天下不知德薄而恩淺道狹而怨廣權懸而智衰力竭而威折兵銼而軍退士散而衆解臣請按師整兵待其壞敗隨而襲之兵不血刃士不旋踵吳之君臣為虜矣臣願大王匿聲無見其動以觀其靜大夫苦成曰夫水能浮草木亦能沉之地能生萬物亦能殺之江海能下溪谷亦能朝之聖人能從衆亦能使之今吳承闔閭之軍制子胥之典教政平未虧戰勝未敗大夫嚭者狂佞之人達於策慮輕於朝事子胥力於戰伐死於諫議二人權必有壞敗願王虛心自匿無示謀計則吳可滅矣大夫浩曰今吳君驕臣奢民飽軍勇外有侵境之敵內有爭臣之震其可攻也大夫句如曰天有四時人有五勝昔湯武乘四時之利而制夏殷桓繆據五勝之便而列六國此乘其時而勝者也王曰未有四時之利五勝之便願各就職也
