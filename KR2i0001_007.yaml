body:
  text: 勾踐入臣外傳第七越王勾踐五年五月與大夫種范蠡入臣於吳群臣皆送至浙江之上臨水祖道軍陳固陵大夫文種前為祝其詞曰皇天祐助前沉後揚禍為德根憂為福堂威人者滅服從者昌王雖牽致其後無殃君臣生離感動上皇衆天悲哀莫不感傷臣請薦脯行酒三觴越王仰天太息舉杯垂涕默無所言種復前祝曰大王德壽無疆無極乾坤受靈神祇輔翼我王厚之祉祐在側德銷百殃利受其福去彼吳庭來歸越國觴酒既升請稱萬歲越王曰孤承前王餘德守國於邊幸蒙諸大夫之謀遂保前王丘墓今遭辱恥為天下笑將孤之罪耶諸大夫之責也吾不知其咎願二三子論其意大夫扶同曰何言之鄙也昔湯繫於夏臺伊尹不離其側文王囚於石室太公不棄其國興衰在天存亡繫於人湯改儀而媚於桀文王服從而幸於紂夏殷恃力而虐二聖兩君屈己以得天道故湯王不以窮自傷周文不以困為病越王曰昔堯任舜禹而天下治雖有洪水之害不為人災變異不及於民豈況於人君乎大夫苦成曰不如君王之言天有曆數德有薄厚黃帝不讓堯傳天子三王臣弒其君五霸子弒其父德有廣狹氣有高下今之世猶人之市置貨以設詐抱謀以待敵不幸陷厄求伸而已大王不覽於斯而懷喜怒越王曰任人者不辱身自用者危其國大夫皆前圖未然之端傾敵破讎坐招泰山之福今寡人守窮若斯而云湯文困厄後必霸何言之違禮儀夫君子爭寸陰而棄珠玉今寡人冀得免於軍旅之憂而復反係獲敵人之手身為傭隸妻為僕妾往而不返客死敵國若魂魄有知愧於前君其無知體骨棄捐何大夫之言不合於寡人之意於是大夫種范蠡曰聞古人曰居不幽志不廣形不愁思不遠聖王賢主皆遇困厄之難蒙不赦之恥身拘而名尊軀辱而聲榮處卑而不以為惡居危而不以為薄五帝德厚無窮厄之恨然尚有泛濫之憂三守暴困之辱不離三嶽之困泣涕而受冤行哭而為隸演易作卦天道祐之時過於期否終則泰諸侯並救王命見符朱鬣玄狐輔臣結髮拆嶽破械反國修德遂討其讎擢假海內若覆手背天下宗之功垂萬世大王屈厄臣誠盡謀夫截骨之劍無削剟之利臽鐵之矛無分髮之便建策之士無暴興之説今臣遂天文案墜籍二氣共萌存亡異處彼興則我辱我霸則彼亡二國爭道未知所就君王之危天道之數何必自傷哉夫吉者凶之門福者禍之根今大王雖在危困之際孰知其非暢達之兆哉大夫計研曰今君王國於會稽窮於入吳言悲辭苦群臣泣之雖則恨悷之心莫不感動而君王何為謾辭譁説用而相欺臣誠不取越王曰寡人將去入吳以國纍諸侯大夫願各自述吾將屬焉大夫皋如曰臣聞大夫種忠而善慮民親其知士樂為用今委國一人其道必守何順心佛命群臣大夫曳庸曰大夫文種者國之梁棟君之爪牙夫驥不可與匹馳日月不可並照君王委國於種則萬綱千紀無不舉者越王曰夫國者前王之國孤力弱勢劣不能遵守社稷奉承宗廟吾聞父死子代君亡臣親今事棄諸大夫客官於吳委國歸民以付二三子吾之由也亦子之憂也君臣同道父子共氣天性自然豈得以在者盡忠亡者為不信乎何諸大夫論事一合一離令孤懷心不定也夫推國任賢度功績成者君之命也奉教順理不失分者臣之職也吾顧諸大夫以其所能而云委質而已於乎悲哉計研曰君王所陳者固其理也昔湯入夏付國於文祀西伯之殷委國於一老今懷夏將滯志在於還夫適市之妻教嗣糞除出亡之君勑臣守禦子問以事臣謀以能今君王欲士之所志各陳其情舉其能者議其宜也越王曰大夫之論是也吾將逝矣願諸君之風大夫種曰夫內修封疆之役外修耕戰之備荒無遺土百姓親附臣之事也大夫范蠡曰輔危主存亡國不恥屈厄之難安守被辱之地往而必反與君復讎者臣之事也大夫苦成曰發君之令明君之德窮與俱厄進與俱霸統煩理亂使民知分臣之事也大夫曳庸曰奉令受使結和諸侯通命達旨賂往遺來解憂失患使無所疑出不忘命入不被尤臣之事也大夫皓進曰一心齊志上與等之下不違令動從君命修德履義守信溫故臨非決疑君誤臣諫直心不撓舉過列平不阿親戚不私於外推身致君終始一分臣之事也大夫諸稽郢曰望敵設陳飛矢揚兵履腹涉尸血流滂滂貪進不退二師相當破敵攻衆威凌百邦臣之事也大夫皋如曰修德行惠撫慰百姓身臨憂勞動輒躬親弔死存疾救活民命蓄陳儲新食不二味國富民實為君養器臣之事也大夫計研曰候天察地紀歷陰陽觀變參災分別妖祥日月含色五精錯行福見知吉妖出知凶臣之事也越王曰孤雖入於北國為吳窮虜有諸大夫懷德抱術各守一分以保社稷孤何憂焉遂別於浙江之上群臣垂泣莫不咸哀越王仰天歎曰死者人之所畏若孤之聞死其於心胸中會無怵惕遂登船徑去終不返顧越王夫人乃據船哭顧烏鵲啄江渚之蝦飛去復來因哭而歌之曰仰飛鳥兮烏鳶凌玄虛號翩翩集洲渚兮優恣啄蝦矯翮兮雲間任厥兮往還妾無罪兮負地有何辜兮譴天帆帆獨兮西往孰知返兮何年心惙惙兮若割淚泫泫兮雙懸又哀吟曰彼飛鳥兮鳶烏已回翔兮翕蘇心在專兮素蝦何居食兮江湖徊復翔兮遊揚去復返兮於乎始事君兮去家終我命兮君都終來遇兮何幸離我國兮去吳妻衣褐兮為婢夫去冕兮為奴歲遙遙兮難極冤悲痛兮心惻腸千結兮服膺於乎哀兮忘食願我身兮如鳥身翱翔兮矯翼去我國兮心搖情憤惋兮誰識越王聞夫人怨歌心中內慟乃曰孤何憂吾之六翮備矣於是入吳見夫差稽首再拜稱臣曰東海賤臣勾踐上愧皇天下負后土不裁功力污辱王之軍士抵罪邊境大王赦其深辜裁加役臣使執箕帚誠蒙厚恩得保須臾之命不勝仰感俯愧臣勾踐叩頭頓首吳王夫差曰寡人於子亦過矣子不念先君之讎乎越王曰臣死則死矣惟大王原之伍胥在旁目若熛火聲如雷霆乃進曰夫飛鳥在青雲之上尚欲繳微矢以射之豈況近臥於華池集於庭廡乎今越王放於南山之中遊於不可存之地幸來涉我壤土入吾梐梱此乃廚宰之成事食也豈可失之乎吳王曰吾聞誅降殺服禍及三世吾非愛越而不殺也畏皇天之咎教我赦之太宰嚭諫曰子胥明於一時之計不通安國之道願大王遂其所執無拘群小之口夫差遂不誅越王令駕車養馬祕於宮室之中三月吳王召越王入見越王伏於前范蠡立於後吳王謂范蠡曰寡人聞貞婦不嫁破亡之家仁賢不官絶滅之國今越王無道國已將亡社稷壞崩身死世絶為天下笑而子及主俱為奴僕來歸於吳豈不鄙哉吾欲赦子之罪子能改心自新棄越歸吳乎范蠡對曰臣聞亡國之臣不敢語政敗軍之將不敢語勇臣在越不忠不信今越王不奉大王命號用兵與大王相持至今獲罪君臣俱降蒙大王鴻恩得君臣相保願得入備掃除出給趨走臣之願也此時越王伏地流涕自謂遂失范蠡矣吳王知范蠡不可得為臣謂曰子既不移其志吾復置子於石室之中范蠡曰臣請如命吳王起入宮中越王范蠡趨入石室越王服犢鼻著樵頭夫人衣無緣之裳施左關之襦夫斫銼養馬妻給水除糞灑掃三年不慍怒面無恨色吳王登遠臺望見越王及夫人范蠡坐於馬糞之旁君臣之禮存夫婦之儀具王顧謂太宰嚭曰彼越王者一節之人范蠡一介之士雖在窮厄之地不失君臣之禮寡人傷之太宰嚭曰願大王以聖人之心哀窮孤之士吳王曰為子赦之後三月乃擇吉日而欲赦之召太宰嚭謀曰越之與吳同土連域勾踐愚黯親欲為賊寡人承天之神靈前王之遺德誅討越寇囚之石室寡人心不忍見而欲赦之於子奈何太宰嚭曰臣聞無德不復大王垂仁恩加越越豈敢不報哉願大王卒意越王聞之召范蠡告之曰孤聞於外心獨喜之又恐其不卒也范蠡曰大王安心事將有意在玉門第一今年十二月戊寅之日時加日出戊囚日也寅陰後之辰也合庚辰歲後會也夫以戊寅日聞喜不以其罪罰日也時加卯而賊戊功曹為騰蛇而臨戊謀利事在青龍青龍在勝先而臨酉死氣也而剋寅是時剋其日用又助之所求之事上下有憂此豈非天網四張萬物盡傷者乎王何喜焉果子胥諫吳王曰昔桀囚湯而不誅紂囚文王而不殺天道還反禍轉成福故夏為湯所誅殷為周所滅今大王既囚越君而不行誅臣謂大王惑之深也得無夏殷之患乎吳王遂召越王久之不見范蠡文種憂而占之曰吳王見擒也有頃太宰嚭出見大夫種范蠡而言越王復拘於石室伍子胥復諫吳王曰臣聞王者攻敵國克之則加以誅故後無報復之憂遂免子孫之患今越王已入石室宜早圖之後必為吳之患太宰嚭曰昔者齊桓割燕所至之地以貺燕公而齊君獲其美名宋襄濟河而戰春秋以多其義功立而名稱軍敗而德存今大王誠赦越王則功冠於五霸名越於前古吳王曰待吾疾愈方為太宰赦之後一月越王出石室召范蠡曰吳王疾三月不愈吾聞人臣之道主疾臣憂且吳王遇孤恩甚厚矣疾之無瘳惟公卜焉范蠡曰吳王不死明矣到己巳日當瘳惟大王留意越王曰孤所以窮而不死者賴公之策耳中復猶豫豈孤之志哉可與不可惟公圖之范蠡曰臣竊見吳王真非人也數言成湯之義而不行之願大王請求問疾得見因求其糞而嘗之觀其顏色當拜賀焉言其不死以瘳起日期之既言信後則大王何憂越王明日謂太宰嚭曰囚臣欲一見問疾太宰嚭即入言於吳王王召而見之適遇吳王之便太宰嚭奉溲惡以出逢戶中越王因拜請嘗大王之溲以決吉凶即以手取其便與惡而嘗之因入曰下囚臣勾踐賀於大王王之疾至己巳日有瘳至三月壬申病愈吳王曰何以知之越王曰下臣嘗事師聞糞者順穀味逆時氣者死順時氣者生今者臣竊嘗大王之糞其惡味苦且楚酸是味也應春夏之氣臣以是知之吳王大悅曰仁人也乃赦越王得離其石室去就其宮室執牧養之事如故越王從嘗糞惡之後遂病口臭范蠡乃令左右皆食岑草以亂其氣其後吳王如越王期日疾愈心念其忠臨政之後大縱酒於文臺吳王出令曰今日為越王陳北面之坐群臣以客禮事之伍子胥趨出到舍上不御坐酒酣太宰嚭曰異乎今日坐者各有其詞不仁者逃其仁者留臣聞同聲相和同心相求今國相剛勇之人意者內慚至仁之存也而不御坐其亦是乎吳王曰然於是范蠡與越王俱起為吳王壽其辭曰下臣勾踐從小臣范蠡奉觴上千歲之壽辭曰皇在上令昭下四時并心察慈仁者大王躬親鴻恩立義行仁九德四塞威服群臣於乎休哉傳德無極上感太陽降瑞翼翼大王延壽萬歲長保吳國四海咸承諸侯賓服觴酒既升永受萬福於是吳王大悅明日伍子胥入諫曰昨日大王何見乎臣聞內懷虎狼之心外執美詞之説但為外情以存其身豺不可謂廉狼不可親今大王好聽須臾之説不慮萬歲之患放棄忠直之言聽用讒夫之語不滅瀝血之仇不絶懷毒之怨猶縱毛爐炭之上幸其焦投卵千鈞之下望必全豈不殆哉臣聞桀登高自知危然不知所以自安也前據白刃自知死而不知所以自存也惑者知返迷道不遠願大王察之吳王曰寡人有疾三月曾不聞相國一言是相國之不慈也又不進口之所嗜心不相思是相國之不仁也夫為人臣不仁不慈焉能知其忠信者乎越王迷惑棄守邊之事親將其臣民來歸寡人是其義也躬親為虜妻親為妾不慍寡人寡人有疾親嘗寡人之溲是其慈也虛其府庫盡其寶幣不念舊故是其忠信也三者既立以養寡人寡人曾聽相國而誅之是寡人之不智也而為相國快私意耶豈不負皇天乎子胥曰何大王之言反也夫虎之卑勢將以有擊也狸之卑身將求所取也雉以眩移拘於網魚以有悅死於餌且大王初臨政負玉門之第九誡事之敗無咎矣今年三月甲戌時加雞鳴甲戌歲位之會將也青龍在酉德在土刑在金是日賊其德也知父將有不順之子君有逆節之臣大王以越王歸吳為義以飲溲食惡為慈以虛府庫為仁是故為無愛於人其不可親面聽貌觀以存其身今越王入臣於吳是其謀深也虛其府庫不見恨色是欺我王也下飲王之溲者是上食王之心也下嘗王之惡者是上食王之肝也大哉越王之崇吳吳將為所擒也惟大王留意察之臣不敢逃死以負前王一旦社稷丘墟宗廟荊棘其悔可追乎吳王曰相國置之勿復言矣寡人不忍復聞於是遂赦越王歸國送於蛇門之外群臣祖道吳王曰寡人赦君使其返國必念終始王其勉之越王稽首曰今大王哀臣孤窮使得生全還國與種蠡之徒願死於轂下上天蒼蒼臣不敢負吳王曰於乎吾聞君子一言不再今已行矣王勉之越王再拜跪伏吳王乃引越王登車范蠡執御遂去至三津之上仰天歎曰嗟乎孤之屯厄誰念復生渡此津也謂范蠡曰今三月甲辰時加日昳孤蒙上天之命還歸故鄉得無後患乎范蠡曰大王勿疑直視道行越將有福吳當有憂至浙江之上望見大越山川重秀天地再清王與夫人歎曰吾已絶望永辭萬民豈料再還重復鄉國言竟掩面涕泣闌干此時萬姓咸歡群臣畢賀
